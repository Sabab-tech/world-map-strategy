<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Modern Age 3 - European Precision Map</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/openlayers/8.2.0/dist/ol.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/openlayers/8.2.0/ol.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html, #map { width: 100%; height: 100%; overflow: hidden; background-color: #0b1521; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(registrations => {
                for (let r of registrations) { r.unregister(); }
            });
        }

        const map = new ol.Map({
            target: 'map',
            layers: [
                new ol.layer.Tile({ 
                    source: new ol.source.XYZ({ 
                        url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
                        maxZoom: 19
                    }) 
                }),
                new ol.layer.Vector({
                    declutter: true, 
                    source: new ol.source.Vector({
                        url: 'https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson',
                        format: new ol.format.GeoJSON()
                    }),
                    style: function (feature, resolution) {
                        let name = feature.get('ADMIN') || feature.get('name') || '';
                        const zoom = Math.log2(156543.03392 / resolution);

                        // গিটহাবের ডেটাবেজে যুক্তরাজ্যের নাম "United Kingdom" হিসেবে থাকে
                        if (name === "United Kingdom") name = "UK";

                        // ফ্রান্স, ইতালি এবং যুক্তরাজ্যকে একই জুম লেভেলে একসাথে দেখানোর বিশেষ নিয়ম
                        const priorityCountries = ["France", "Italy", "UK", "United Kingdom"];
                        
                        // সাধারণ ছোট দেশগুলোর ফিল্টার
                        if (zoom < 4.2 && ["Lebanon", "Qatar", "Kuwait", "Israel", "Gambia", "Singapore", "Bangladesh"].includes(name)) {
                            return null; 
                        }

                        // হলিউড স্টাইল ডায়নামিক ফন্ট সাইজ
                        let fontSize = 12 + (zoom - 3.8) * 4;
                        if (fontSize > 26) fontSize = 26;
                        if (fontSize < 11) fontSize = 11;

                        // লম্বালম্বি দেশের রোটেশন
                        let textRotation = 0;
                        if (name === "Lebanon") textRotation = -1.35; 
                        else if (name === "Chile") textRotation = -1.45;
                        else if (name === "Vietnam") textRotation = -1.15;
                        else if (name === "Norway") textRotation = -1.25;

                        // ইতালির নাম সিসিলি থেকে সরিয়ে মাঝখানে আনার জন্য এবং প্রাঞ্জল রেন্ডারিংয়ের জন্য স্টাইল
                        let textPlacement = 'point';
                        if (priorityCountries.includes(name)) {
                            textPlacement = 'point'; // পয়েন্ট রাখলে নাম একদম নির্দিষ্ট কোঅর্ডিনেটে লক থাকে
                        } else {
                            textPlacement = feature.getGeometry().getType() === 'MultiPolygon' ? 'polygon' : 'point';
                        }

                        const baseStyle = new ol.style.Style({
                            stroke: new ol.style.Stroke({
                                color: 'rgba(255, 255, 255, 0.45)', // আপনার পছন্দ করা সেই স্বাভাবিক হালকা বর্ডার
                                width: 1.4 
                            }),
                            text: new ol.style.Text({
                                text: name.toUpperCase(),
                                font: `900 ${fontSize}px "Impact", "Arial Black", sans-serif`,
                                fill: new ol.style.Fill({ color: '#ffffff' }),
                                stroke: new ol.style.Stroke({ color: '#000000', width: 4.5 }), // খাড়া হলিউড লুক
                                rotation: textRotation,
                                placement: textPlacement,
                                textAlign: 'center',
                                textBaseline: 'middle',
                                overflow: priorityCountries.includes(name) ? true : false // এই তিন দেশের নাম যেন কোনোভাবেই হাইড না হয়
                            })
                        });

                        // বিশেষ লজিক: ইতালির নামটিকে ম্যানুয়ালি সিসিলি থেকে একটু ওপরে (মূল ভূখণ্ডে) পুশ করা
                        if (name === "Italy") {
                            const italyCenter = ol.proj.fromLonLat([12.6, 42.5]); // এটি ইতালির মূল ভূখণ্ডের নিখুঁত কেন্দ্র
                            const italyStyle = baseStyle.clone();
                            italyStyle.setGeometry(new ol.geom.Point(italyCenter));
                            return italyStyle;
                        }

                        return baseStyle;
                    }
                })
            ],
            view: new ol.View({
                center: ol.proj.fromLonLat([25.0, 42.0]),
                zoom: 3.8,
                minZoom: 3.8,
                maxZoom: 8.5,
                enableRotation: false
            }),
            controls: []
        });
    </script>
</body>
</html>
