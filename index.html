<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Modern Age 3 - Global Cities Update</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/openlayers/8.2.0/dist/ol.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/openlayers/8.2.0/ol.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html, #map { width: 100%; height: 100%; overflow: hidden; background-color: #0b1521; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(r => r.forEach(reg => reg.unregister()));
        }

        // ==========================================
        // ১. দেশের বর্ডার এবং নামের পার্মানেন্ট লজিক
        // ==========================================
        function countryStyle(feature, resolution) {
            const name = feature.get('ADMIN') || feature.get('name') || '';
            const zoom = Math.log2(156543.03392 / resolution);
            const blacklist = ["British Indian Ocean Territory", "Christmas Island", "Cocos Islands", "Norfolk Island", "Niue", "Tokelau", "Palestine", "Western Sahara"];
            if (blacklist.includes(name)) return null;

            const borderStyle = new ol.style.Stroke({ color: 'rgba(255, 255, 255, 0.4)', width: 1.2 });
            const invisibleFill = new ol.style.Fill({ color: 'rgba(0, 0, 0, 0.001)' });

            let dName = name;
            if (name === "Democratic Republic of the Congo") dName = "DR CONGO";
            else if (name === "United Kingdom") dName = "UK";
            else if (name === "United States of America") dName = "USA";

            const smallOnes = ["Luxembourg", "Liechtenstein", "Singapore", "Fiji", "Vanuatu", "Solomon Islands", "Marshall Islands", "Qatar", "Kuwait", "Lebanon"];
            if (zoom < 6.0 && smallOnes.includes(name)) return new ol.style.Style({ stroke: borderStyle, fill: invisibleFill });

            let fSize = 12 + (zoom - 3.8) * 3;
            if (fSize > 24) fSize = 24; if (fSize < 11) fSize = 11;

            return new ol.style.Style({
                stroke: borderStyle, fill: invisibleFill,
                text: new ol.style.Text({
                    text: dName.toUpperCase(), font: `900 ${fSize}px "Impact", sans-serif`,
                    fill: new ol.style.Fill({ color: '#ffffff' }), stroke: new ol.style.Stroke({ color: '#000000', width: 4 }),
                    placement: 'point', textAlign: 'center', textBaseline: 'middle', overflow: false
                })
            });
        }

        function selectStyle(feature, resolution) {
            const name = feature.get('ADMIN') || feature.get('name') || '';
            const zoom = Math.log2(156543.03392 / resolution);
            let dName = name;
            if (name === "Democratic Republic of the Congo") dName = "DR CONGO";
            else if (name === "United Kingdom") dName = "UK";
            else if (name === "United States of America") dName = "USA";

            let fSize = 12 + (zoom - 3.8) * 3; if (fSize > 24) fSize = 24;

            return new ol.style.Style({
                fill: new ol.style.Fill({ color: 'rgba(255, 255, 255, 0.12)' }),
                stroke: new ol.style.Stroke({ color: 'rgba(255, 255, 255, 0.8)', width: 2.0 }),
                text: new ol.style.Text({
                    text: dName.toUpperCase(), font: `900 ${fSize}px "Impact", sans-serif`,
                    fill: new ol.style.Fill({ color: '#ffff33' }), stroke: new ol.style.Stroke({ color: '#000000', width: 4.5 }),
                    placement: 'point', textAlign: 'center', textBaseline: 'middle'
                })
            });
        }

        const countryLayer = new ol.layer.Vector({
            declutter: true,
            source: new ol.source.Vector({ url: 'https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson', format: new ol.format.GeoJSON() }),
            style: countryStyle
        });

        // ==========================================
        // ২. গ্লোবাল মেগা সিটি ডাটাবেজ (পৃথিবীর সব দেশ)
        // ==========================================
        const cityData = {
            // South Asia
            "Bangladesh": [{ n: "Dhaka", c: [90.4125, 23.8103], t: "cap" }, { n: "Chattogram", c: [91.8315, 22.3569], t: "city" }],
            "India": [{ n: "New Delhi", c: [77.2090, 28.6139], t: "cap" }, { n: "Mumbai", c: [72.8777, 19.0760], t: "city" }, { n: "Kolkata", c: [88.3639, 22.5726], t: "city" }, { n: "Chennai", c: [80.2707, 13.0827], t: "city" }],
            "Pakistan": [{ n: "Islamabad", c: [73.0479, 33.6844], t: "cap" }, { n: "Karachi", c: [67.0011, 24.8607], t: "city" }],
            "Sri Lanka": [{ n: "Colombo", c: [79.8612, 6.9271], t: "cap" }], "Nepal": [{ n: "Kathmandu", c: [85.3240, 27.7172], t: "cap" }], "Bhutan": [{ n: "Thimphu", c: [89.6390, 27.4712], t: "cap" }],
            
            // Asia & Middle East
            "China": [{ n: "Beijing", c: [116.4074, 39.9042], t: "cap" }, { n: "Shanghai", c: [121.4737, 31.2304], t: "city" }, { n: "Hong Kong", c: [114.1694, 22.3193], t: "city" }],
            "Japan": [{ n: "Tokyo", c: [139.6917, 35.6895], t: "cap" }, { n: "Osaka", c: [135.5023, 34.6937], t: "city" }],
            "South Korea": [{ n: "Seoul", c: [126.9780, 37.5665], t: "cap" }], "North Korea": [{ n: "Pyongyang", c: [125.7625, 39.0392], t: "cap" }],
            "Indonesia": [{ n: "Jakarta", c: [106.8456, -6.2088], t: "cap" }], "Malaysia": [{ n: "Kuala Lumpur", c: [101.6869, 3.1390], t: "cap" }],
            "Saudi Arabia": [{ n: "Riyadh", c: [46.7386, 24.7136], t: "cap" }, { n: "Jeddah", c: [39.1925, 21.4858], t: "city" }],
            "United Arab Emirates": [{ n: "Abu Dhabi", c: [54.3667, 24.4667], t: "cap" }, { n: "Dubai", c: [55.2708, 25.2048], t: "city" }],
            "Iran": [{ n: "Tehran", c: [51.3890, 35.6892], t: "cap" }], "Iraq": [{ n: "Baghdad", c: [44.3615, 33.3152], t: "cap" }],
            "Israel": [{ n: "Jerusalem", c: [35.2137, 31.7683], t: "cap" }], "Turkey": [{ n: "Ankara", c: [32.8597, 39.9334], t: "cap" }, { n: "Istanbul", c: [28.9784, 41.0082], t: "city" }],
            
            // Europe
            "United Kingdom": [{ n: "London", c: [-0.1276, 51.5072], t: "cap" }, { n: "Manchester", c: [-2.2426, 53.4808], t: "city" }],
            "France": [{ n: "Paris", c: [2.3522, 48.8566], t: "cap" }, { n: "Marseille", c: [5.3698, 43.2965], t: "city" }],
            "Germany": [{ n: "Berlin", c: [13.4050, 52.5200], t: "cap" }, { n: "Munich", c: [11.5820, 48.1351], t: "city" }],
            "Italy": [{ n: "Rome", c: [12.4964, 41.9028], t: "cap" }, { n: "Milan", c: [9.1900, 45.4642], t: "city" }],
            "Russia": [{ n: "Moscow", c: [37.6173, 55.7558], t: "cap" }, { n: "St. Petersburg", c: [30.3086, 59.9311], t: "city" }, { n: "Novosibirsk", c: [82.9204, 55.0084], t: "city" }, { n: "Vladivostok", c: [131.8869, 43.1198], t: "city" }],
            "Ukraine": [{ n: "Kyiv", c: [30.5234, 50.4501], t: "cap" }], "Spain": [{ n: "Madrid", c: [-3.7038, 40.4168], t: "cap" }],
            
            // Americas
            "United States of America": [{ n: "Washington D.C.", c: [-77.0369, 38.9072], t: "cap" }, { n: "New York", c: [-74.0060, 40.7128], t: "city" }, { n: "Los Angeles", c: [-118.2437, 34.0522], t: "city" }, { n: "Chicago", c: [-87.6298, 41.8781], t: "city" }],
            "Canada": [{ n: "Ottawa", c: [-75.6972, 45.4215], t: "cap" }, { n: "Toronto", c: [-79.3832, 43.6532], t: "city" }, { n: "Vancouver", c: [-123.1207, 49.2827], t: "city" }],
            "Brazil": [{ n: "Brasilia", c: [-47.9292, -15.7801], t: "cap" }, { n: "Sao Paulo", c: [-46.6333, -23.5505], t: "city" }, { n: "Rio de Janeiro", c: [-43.1729, -22.9068], t: "city" }],
            "Argentina": [{ n: "Buenos Aires", c: [-58.3816, -34.6037], t: "cap" }], "Mexico": [{ n: "Mexico City", c: [-99.1332, 19.4326], t: "cap" }],
            
            // Africa & Oceania
            "Egypt": [{ n: "Cairo", c: [31.2357, 30.0444], t: "cap" }], "South Africa": [{ n: "Pretoria", c: [28.1881, -25.7479], t: "cap" }, { n: "Cape Town", c: [18.4232, -33.9249], t: "city" }],
            "Nigeria": [{ n: "Abuja", c: [7.4951, 9.0579], t: "cap" }, { n: "Lagos", c: [3.3792, 6.5244], t: "city" }],
            "Australia": [{ n: "Canberra", c: [149.1287, -35.2809], t: "cap" }, { n: "Sydney", c: [151.2093, -33.8688], t: "city" }, { n: "Melbourne", c: [144.9631, -37.8136], t: "city" }],
            "New Zealand": [{ n: "Wellington", c: [174.7762, -41.2865], t: "cap" }], "Fiji": [{ n: "Suva", c: [178.4415, -18.1416], t: "cap" }]
        };

        const cityFeatures = [];
        for (const country in cityData) {
            cityData[country].forEach(city => {
                cityFeatures.push(new ol.Feature({
                    geometry: new ol.geom.Point(ol.proj.fromLonLat(city.c)),
                    name: city.n, countryName: country, type: city.t
                }));
            });
        }

        let activeCountry = "";

        // ==========================================
        // ৩. ডাইনামিক গাইড লজিক (Disorientation Fix)
        // ==========================================
        const cityLayer = new ol.layer.Vector({
            source: new ol.source.Vector({ features: cityFeatures }),
            declutter: true,
            style: function(feature, resolution) {
                if (feature.get('countryName') !== activeCountry) return null; // দেশ সিলেক্ট না থাকলে কিছুই দেখাবে না
                
                const zoom = Math.log2(156543.03392 / resolution);
                const isCap = feature.get('type') === 'cap';

                // মাস্টার স্ট্রোক: রাজধানী (গাইড) সবসময় দেখাবে, অন্য শহরগুলো জুম ৪.৮ এর পর দেখাবে
                if (!isCap && zoom < 4.8) return null; 

                const dotColor = isCap ? '#ff2a2a' : '#ffb732'; // রাজধানী উজ্জ্বল লাল, শহর কমলা
                const dotSize = isCap ? 5 : 3.5;
                let fSize = 10 + (zoom - 3.8) * 2; if(fSize > 16) fSize = 16;

                return new ol.style.Style({
                    image: new ol.style.Circle({
                        radius: dotSize,
                        fill: new ol.style.Fill({ color: dotColor }),
                        stroke: new ol.style.Stroke({ color: '#ffffff', width: 1.5 })
                    }),
                    text: new ol.style.Text({
                        text: feature.get('name').toUpperCase(),
                        font: `900 ${fSize}px "Arial Black", sans-serif`,
                        fill: new ol.style.Fill({ color: '#ffffff' }),
                        stroke: new ol.style.Stroke({ color: '#000000', width: 3.5 }),
                        offsetY: -12
                    })
                });
            }
        });

        const map = new ol.Map({
            target: 'map',
            layers: [
                new ol.layer.Tile({ source: new ol.source.XYZ({ url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}' }) }),
                countryLayer, cityLayer
            ],
            view: new ol.View({ center: ol.proj.fromLonLat([25.0, 42.0]), zoom: 3.8, minZoom: 3.8, maxZoom: 8.5, enableRotation: false })
        });

        const selectInteraction = new ol.interaction.Select({ style: selectStyle, layers: [countryLayer] });
        map.addInteraction(selectInteraction);

        selectInteraction.on('select', function(e) {
            if (e.selected.length > 0) activeCountry = e.selected[0].get('ADMIN') || e.selected[0].get('name') || '';
            else activeCountry = ""; 
            cityLayer.changed(); 
        });

    </script>
</body>
    </html>
