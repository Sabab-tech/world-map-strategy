<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Modern Age 3 - Tactical Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #0b1015; }
        #map { height: 100vh; background: #0b1015; }
        
        /* গেমের মতো টেক্সট স্টাইল */
        .country-label {
            color: #ffffff;
            font-family: 'Roboto Condensed', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            text-shadow: 1px 1px 2px #000, 0 0 5px rgba(0,0,0,0.5);
            pointer-events: none;
            text-align: center;
            opacity: 0.85;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // ক্যানভাস রেন্ডারার ব্যবহার করে স্মুথ বর্ডার
        const map = L.map('map', { 
            center: [20, 0], zoom: 3, 
            renderer: L.canvas() 
        });

        // স্যাটেলাইট লুক
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png', {
            attribution: 'Map'
        }).addTo(map);

        fetch('https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson')
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, {
                    style: { color: "#ffffff", weight: 0.8, fillOpacity: 0.1 },
                    onEachFeature: function (feature, layer) {
                        let name = feature.properties.ADMIN.toUpperCase();
                        let center = layer.getBounds().getCenter();
                        
                        L.marker(center, {
                            icon: L.divIcon({
                                className: 'country-label',
                                html: `<div style="font-size: 10px;">${name}</div>`,
                                iconSize: [100, 20]
                            })
                        }).addTo(map);
                    }
                }).addTo(map);
            });
    </script>
</body>
</html>
