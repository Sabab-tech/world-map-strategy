    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body, html {
            width: 100%;
            height: 100%;
            background-color: #0d1117;
            overflow: hidden;
        }
        #map {
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        /* Dashboard Control UI */
        .control-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(13, 17, 23, 0.9);
            border: 2px solid #30363d;
            border-radius: 8px;
            padding: 15px;
            z-index: 1000;
            color: #c9d1d9;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            max-width: 300px;
        }
        .control-panel h3 {
            margin-bottom: 12px;
            color: #58a6ff;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #30363d;
            padding-bottom: 5px;
        }
        .layer-btn {
            display: flex;
            align-items: center;
            width: 100%;
            padding: 8px 12px;
            margin: 5px 0;
            background: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s ease;
            text-align: left;
        }
        .layer-btn:hover {
            background: #30363d;
            border-color: #8b949e;
        }
        .layer-btn.active {
            background: #1f6feb;
            border-color: #58a6ff;
            color: #ffffff;
            font-weight: bold;
        }
        .layer-btn span {
            margin-right: 10px;
            font-size: 16px;
        }
        /* Custom Popup Styling */
        .leaflet-popup-content-wrapper {
            background: #161b22 !important;
            color: #c9d1d9 !important;
            border: 1px solid #30363d;
            border-radius: 6px;
        }
        .leaflet-popup-tip {
            background: #161b22 !important;
        }
        .popup-title {
            font-weight: bold;
            color: #58a6ff;
            font-size: 14px;
            margin-bottom: 4px;
        }
        .popup-meta {
            font-size: 11px;
            color: #8b949e;
            text-transform: uppercase;
        }
        .popup-status {
            display: inline-block;
            margin-top: 5px;
            padding: 2px 6px;
            font-size: 10px;
            border-radius: 4px;
            font-weight: bold;
        }
        .status-unlocked { background: #238636; color: white; }
        .status-locked { background: #da3633; color: white; }
    </style>
</head>
