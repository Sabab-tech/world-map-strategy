<!DOCTYPE html>
<html>
<head>
    <title>Ultimate 3D Strategy Map Engine</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; }
        #map { height: 100vh; width: 100%; background: #000; }
        
        /* থ্রিডি টাইপ প্রফেশনাল গেম টেক্সট স্টাইল */
        .game-country-label {
            background: none !important;
            border: none !important;
            box-shadow: none !important;
            color: #f1f5f9;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.8px;
            white-space: nowrap;
            pointer-events: none;
            transition: opacity 0.2s ease;
            
            /* মাল্টিপল লেয়ার শ্যাডো দিয়ে তৈরি ৩ডি ইফেক্ট */
            text-shadow: 
                1px 1px 0px #334155,
                2px 2px 0px #1e293b,
                3px 3px 5px rgba(0, 0, 0, 0.9),
                -1px -1px 2px rgba(0,0,0,0.5);
        }

        /* জিপিইউ এক্সিলারেশন এবং লকিং */
        .leaflet-zoom-animated, .leaflet-pane {
            will-change: transform, opacity;
            transform-style: preserve-3d;
            backface-visibility: hidden;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // ক্যানভাস রেন্ডারার (বর্ডার লকিংয়ের জন্য)
        var ultimateRenderer = L.canvas({ padding: 0.1, tolerance: 5 });

        // ওয়ার্ল্ড বাউন্ডারি লকিং
        var bounds = L.latLngBounds(L.latLng(-60, -180), L.latLng(85, 180));

        var map = L.map('map', { 
            zoomControl: false,
            minZoom: 3.8,      // সর্বোচ্চ উচ্চতা লক
            maxZoom: 9,
            zoomSnap: 0.1,
            zoomDelta: 1,
            maxBounds: bounds, 
            maxBoundsViscosity: 1.0, 
            inertia: false,
            renderer: ultimateRenderer
        }).setView([20, 0], 3.8);

        // স্যাটেলাইট বেস লেয়ার
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Strategy Map',
            maxNativeZoom: 19,
            keepBuffer: 4,
            updateWhenIdle: true
        }).addTo(map);

        var geojsonLayer;
        var selectedLayer = null;
        var renderedCountries = new Set(); // ডুপ্লিকেট নাম ট্র্যাকার ম্যাট্রিক্স

        // লম্বা বা বাঁকা দেশগুলোর নাম কাত করার জন্য অ্যাঙ্গেল ক্যালকুলেটর (যেমন: চিলি, ইতালি)
        function calculateTextRotation(bounds) {
            var northEast = bounds.getNorthEast();
            var southWest = bounds.getSouthWest();
            var latDiff = northEast.lat - southWest.lat;
            var lngDiff = northEast.lng - southWest.lng;
            
            // যদি দেশটা চওড়ার চেয়ে লম্বায় বেশি বড় হয়, তবে নাম কাত হবে
            if (latDiff > lngDiff * 1.5) {
                var angle = Math.atan2(latDiff, lngDiff) * (180 / Math.PI);
                return (angle > 90) ? angle - 180 : angle - 65; // পারফেক্ট ডাউন-সেন্টার অ্যাঙ্গেল
            }
            return 0; // সাধারণ দেশের জন্য সোজা টেক্সট
        }

        // জিও-জেসন ডাটা লোড ও প্রসেসিং
        fetch('https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson')
            .then(res => res.json())
            .then(data => {
                geojsonLayer = L.geoJSON(data, {
                    // ১. শুধুমাত্র জাতিসংঘ স্বীকৃত দেশ ফিল্টার
                    filter: function(feature) {
                        var name = feature.properties.ADMIN;
                        var code = feature.properties.ISO_A3;
                        return code !== "-99" && name !== "Somaliland" && name !== "Western Sahara";
                    },
                    // ২. সাধারণ অবস্থায় সূক্ষ্ম সাদা বর্ডার
                    style: function(feature) {
                        return {
                            color: "#ffffff",
                            weight: map.getZoom() > 5.5 ? 2.3 : 0.9,
                            opacity: 0.4,
                            fillColor: "#ffffff",
                            fillOpacity: 0.01 
                        };
                    },
                    onEachFeature: function(feature, layer) {
                        var countryName = feature.properties.ADMIN;
                        
                        if (layer.getBounds) {
                            var center = layer.getBounds().getCenter();
                            var countryBounds = layer.getBounds();

                            // ৩. ডুপ্লিকেট নাম আসা চিরতরে বন্ধ করার লজিক
                            if (!renderedCountries.has(countryName)) {
                                renderedCountries.add(countryName);

                                // ৪. লম্বা দেশের নাম কাত করার হিসাব চালু
                                var rotationAngle = calculateTextRotation(countryBounds);

                                // থ্রিডি টেক্সট মার্কার তৈরি
                                var labelMarker = L.marker(center, {
                                    icon: L.divIcon({
                                        className: 'game-country-label',
                                        html: `<div style="transform: rotate(${rotationAngle}deg);">${countryName}</div>`,
                                        iconSize: [100, 20]
                                    }),
                                    interactive: false // নামের ওপর টাচ করলেও যেন নিচে সিলেক্ট কাজ করে
                                });

                                // ৫. জুম লেভেল ফিল্টার (ছোট দেশগুলো জুম করলে দৃশ্যমান হবে)
                                var isSmallCountry = countryBounds.getNorthEast().lat - countryBounds.getSouthWest().lat < 4;
                                
                                if (!isSmallCountry || map.getZoom() > 5.2) {
                                    labelMarker.addTo(map);
                                }

                                // জুম ইভেন্টে ছোট দেশের নাম অন/অফ করার ট্র্যাকার
                                map.on('zoomend', function() {
                                    if (isSmallCountry) {
                                        if (map.getZoom() > 5.2) {
                                            if (!map.hasLayer(labelMarker)) labelMarker.addTo(map);
                                        } else {
                                            if (map.hasLayer(labelMarker)) map.removeLayer(labelMarker);
                                        }
                                    }
                                });
                            }

                            // ৬. টাচ/ক্লিক ইন্টারঅ্যাকশন: গাঢ় সাদা ও হালকা সবুজ সিলেকশন বর্ডার
                            layer.on({
                                click: function(e) {
                                    if (selectedLayer) {
                                        geojsonLayer.resetStyle(selectedLayer);
                                    }

                                    selectedLayer = e.target;
                                    
                                    selectedLayer.setStyle({
                                        color: "#e6fffa", // গাঢ় সাদা সাথে একদম হালকা সবুজ আভা
                                        weight: map.getZoom() > 5.5 ? 3.5 : 2.5,
                                        opacity: 0.9,
                                        fillColor: "#e6fffa",
                                        fillOpacity: 0.1
                                    });

                                    if (!L.Browser.ie && !L.Browser.opera && !L.Browser.edge) {
                                        selectedLayer.bringToFront();
                                    }

                                    console.log("Selected Country: " + countryName);
                                }
                            });
                        }
                    }
                }).addTo(map);
            });

        // জুম চেঞ্জের সাথে সাথে বর্ডারের বোল্ডনেস ডাইনামিক রেন্ডারিং
        map.on('zoomend', function() {
            if (geojsonLayer) {
                var currentZoom = map.getZoom();
                geojsonLayer.eachLayer(function(layer) {
                    if (layer !== selectedLayer) {
                        layer.setStyle({
                            weight: currentZoom > 5.5 ? 2.3 : 0.9
                        });
                    } else {
                        layer.setStyle({
                            weight: currentZoom > 5.5 ? 3.5 : 2.5
                        });
                    }
                });
            }
        });
    </script>
</body>
</html>
