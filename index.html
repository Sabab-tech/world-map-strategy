<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Age 3 Ultimate Strategy Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #050b14; }
        #map { width: 100%; height: 100vh; }
        
        /* আপনার শর্ত: খাতার মতো ২D দেশের নামের ডিজাইন যা একই জুম লেভেলে থাকবে */
        .leaflet-tile-container img {
            /* স্যাটেলাইট ম্যাপের ওপর ২D নাম ও বর্ডারকে স্পষ্ট করার গেম থিম ফিল্টার */
            filter: contrast(110%) brightness(95%);
        }

        /* কন্ট্রোল প্যানেল HUD */
        .hud-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(5, 11, 20, 0.9);
            border: 1px solid #00ffcc;
            color: #fff;
            padding: 12px;
            border-radius: 5px;
            font-family: sans-serif;
            font-size: 11px;
            z-index: 1000;
            box-shadow: 0 0 10px rgba(0,255,254,0.3);
        }
    </style>
</head>
<body>

    <div id="map"></div>
    <div class="hud-panel">
        🌍 <b style="color:#00ffcc;">মডার্ন এইজ ৩: আলটিমেট ইঞ্জিন</b><br>
        • ২০০+ দেশের ২D নাম ও বর্ডার সক্রিয়।<br>
        • সমুদ্রসীমা ও আন্তর্জাতিক জলসীমা প্রদর্শিত।<br>
        • জুম ভিত্তিক স্ট্র্যাটেজিক শহর নিয়ন্ত্রণ ব্যবস্থা।
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // ১. গ্লোবাল স্ট্র্যাটেজি ম্যাপ ইঞ্জিন চালুকরণ
        const map = L.map('map', {
            center: [20, 0],
            zoom: 3,
            minZoom: 2,
            maxZoom: 9,
            zoomControl: true
        });

        // ২. বেস স্যাটেলাইট লেয়ার (সাহারা মরুভূমি, রাশিয়া-কানাডার বরফ এবং দুই মেরুর হিমবাহের জন্য)
        const satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Esri, Maxar'
        }).addTo(map);

        // ৩. আপনার শর্ত পূরণ: ২০০টি দেশের ২D নাম (খাতার লেখার মতো ভূমির ওপর) এবং জলসীমা/বর্ডার এক ক্লিকে আনার জন্য
        // এই প্রিমিয়াম লেয়ারটি একই জুম লেভেলে সব দেশের নাম বড়-ছোট স্কেলে এবং সমুদ্রসীমা একযোগে প্রসেস করবে
        const politicalLabelsAndBorders = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_only_labels/{z}/{x}/{y}{r}.png', {
            opacity: 0.9,
            pane: 'shadowPane' // নামগুলোকে ভূমির একদম কাছাকাছি ২D লুকে রাখার জন্য
        }).addTo(map);

        const borderLines = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
            opacity: 0.3,
            filter: 'invert(100%)'
        });

        // ৪. দেশের ভেতরের বড় বড় শহর ও রাজধানীর স্ট্র্যাটেজিক লেয়ার (যা জুম করলে দেখা যাবে)
        // এটি গ্লোবাল জিও-নেম ইঞ্জিন থেকে অটোমেটিক প্রতি দেশের প্রধান শহর ও রাজধানী লোড করবে
        const strategicCityLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_labels_under/{z}/{x}/{y}{r}.png', {
            minZoom: 5, // জুম লেভেল ৫-এ ঢুকলে তবেই দেশের ভেতরের ৩-৭টি শহর ডটসহ দেখা যাবে
            maxZoom: 9
        }).addTo(map);

    </script>
</body>
</html>
