<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Modern Age 3 - Professional Tactical Map</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/openlayers/8.2.0/dist/ol.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/openlayers/8.2.0/ol.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html, #map { width: 100%; height: 100%; overflow: hidden; background-color: #0b1521; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(registrations => {
                for (let r of registrations) { r.unregister(); }
            });
        }

        const map = new ol.Map({
            target: 'map',
            layers: [
                new ol.layer.Tile({ 
                    source: new ol.source.XYZ({ 
                        url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
                        maxZoom: 19
                    }) 
                }),
                new ol.layer.Vector({
                    declutter: true, 
                    source: new ol.source.Vector({
                        url: 'https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson',
                        format: new ol.format.GeoJSON()
                    }),
                    style: function (feature, resolution) {
                        let rawName = feature.get('ADMIN') || feature.get('name') || feature.get('NAME') || '';
                        const zoom = Math.log2(156543.03392 / resolution);

                        // ১. বড় এবং দ্বীপ অঞ্চলের নামের আন্তর্জাতিক সংক্ষেপকরণ ডিকশনারি
                        let name = rawName;
                        if (rawName.includes("Democratic Republic of the Congo")) name = "DR CONGO";
                        else if (rawName.includes("Congo (Democratic Republic of the)")) name = "DR CONGO";
                        else if (rawName.includes("Republic of the Congo")) name = "CONGO";
                        else if (rawName.includes("Tanzania")) name = "TANZANIA";
                        else if (rawName.includes("United Kingdom")) name = "UK";
                        else if (rawName.includes("Bahamas")) name = "BAHAMAS";
                        else if (rawName.includes("Hong Kong")) name = "HONG KONG";
                        else if (rawName.includes("Central African Republic")) name = "CAR";
                        else if (rawName.includes("Dominican Republic")) name = "DOMINICAN REP";
                        else if (rawName.includes("United Arab Emirates")) name = "UAE";
                        else if (rawName.includes("United States of America")) name = "USA";
                        else if (rawName.includes("Equatorial Guinea")) name = "EQ. GUINEA";
                        else if (rawName.includes("Bosnia and Herzegovina")) name = "BOSNIA";
                        else if (rawName.includes("Papua New Guinea")) name = "PNG";
                        else if (rawName.includes("Solomon Islands")) name = "SOLOMON IS.";

                        // কম জুম লেভেলে ছোট দেশ ও সাগরের দ্বীপের নাম হাইড রাখার লজিক
                        const smallAndIslands = ["Lebanon", "Qatar", "Kuwait", "Israel", "Gambia", "Singapore", "Bangladesh", "BAHAMAS", "HONG KONG", "SOLOMON IS."];
                        if (zoom < 4.5 && smallAndIslands.includes(name)) {
                            return new ol.style.Style({
                                stroke: new ol.style.Stroke({ color: 'rgba(255, 255, 255, 0.45)', width: 1.4 })
                            }); 
                        }

                        // হলিউড স্টাইল ডায়নামিক ফন্ট সাইজ
                        let fontSize = 12 + (zoom - 3.8) * 4;
                        if (fontSize > 25) fontSize = 25;
                        if (fontSize < 11) fontSize = 11;

                        // নির্দিষ্ট দেশের টেক্সট রোটেশন
                        let textRotation = 0;
                        if (name === "Lebanon") textRotation = -1.35; 
                        else if (name === "Chile") textRotation = -1.45;
                        else if (name === "Vietnam") textRotation = -1.15;
                        else if (name === "Norway") textRotation = -1.25;

                        // ডিফল্ট বর্ডার স্টাইল
                        const borderStyle = new ol.style.Style({
                            stroke: new ol.style.Stroke({
                                color: 'rgba(255, 255, 255, 0.45)', 
                                width: 1.4
                            })
                        });

                        // টেক্সট বা নামের মূল স্টাইল
                        const textStyle = new ol.style.Style({
                            text: new ol.style.Text({
                                text: name.toUpperCase(),
                                font: `900 ${fontSize}px "Impact", "Arial Black", sans-serif`,
                                fill: new ol.style.Fill({ color: '#ffffff' }),
                                stroke: new ol.style.Stroke({ color: '#000000', width: 4.5 }),
                                rotation: textRotation,
                                placement: 'point',
                                textAlign: 'center',
                                textBaseline: 'middle',
                                overflow: false 
                            })
                        });

                        // বিশেষ গুরুত্বপূর্ণ দেশের মেইনল্যান্ড ম্যাপপয়েন্ট ম্যানুয়াল লক
                        if (name === "Italy") {
                            textStyle.setGeometry(new ol.geom.Point(ol.proj.fromLonLat([12.6, 42.5])));
                            return [borderStyle, textStyle];
                        }
                        if (name === "France") {
                            textStyle.setGeometry(new ol.geom.Point(ol.proj.fromLonLat([2.2, 46.2])));
                            return [borderStyle, textStyle];
                        }
                        if (name === "UK") {
                            textStyle.setGeometry(new ol.geom.Point(ol.proj.fromLonLat([-2.5, 54.5])));
                            return [borderStyle, textStyle];
                        }

                        // ২. সমুদ্রে নাম ছিটকে যাওয়া ডিফল্টভাবে বন্ধ করার জন্য অ্যাডভান্সড কন্টেইনমেন্ট লজিক
                        const geom = feature.getGeometry();
                        if (geom) {
                            let targetPoint = null;
                            
                            if (geom.getType() === 'MultiPolygon') {
                                const polygons = geom.getPolygons();
                                let maxArea = 0;
                                let mainPolygon = polygons[0];
                                
                                for (let i = 0; i < polygons.length; i++) {
                                    const area = polygons[i].getArea();
                                    if (area > maxArea) {
                                        maxArea = area;
                                        mainPolygon = polygons[i];
                                    }
                                }
                                targetPoint = mainPolygon.getInteriorPoint().getCoordinates();
                                
                                // যদি ইন্টেরিয়র পয়েন্ট ভুল করে সীমানার বাইরে চলে যায়, তবে মেইনল্যান্ডের পলিগনের প্রথম বিন্দুর স্থানাঙ্ক নেবে
                                if (!mainPolygon.containsCoordinate(targetPoint)) {
                                    targetPoint = mainPolygon.getFlatCoordinates().slice(0, 2);
                                }
                            } else if (geom.getType() === 'Polygon') {
                                targetPoint = geom.getInteriorPoint().getCoordinates();
                                if (!geom.containsCoordinate(targetPoint)) {
                                    targetPoint = geom.getFlatCoordinates().slice(0, 2);
                                }
                            }

                            if (targetPoint) {
                                textStyle.setGeometry(new ol.geom.Point(targetPoint));
                            }
                        }

                        return [borderStyle, textStyle];
                    }
                })
            ],
            view: new ol.View({
                center: ol.proj.fromLonLat([25.0, 42.0]),
                zoom: 3.8,
                minZoom: 3.8,
                maxZoom: 8.5,
                enableRotation: false
            }),
            controls: []
        });
    </script>
</body>
</html>
