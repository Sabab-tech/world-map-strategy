<!DOCTYPE html>
<html lang="en" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Modern Age - Tactical Map Optimized</title>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: #0a1420; /* লোডিংয়ের সময় কালো দাগের বদলে ডিপ ওশান কালার */
            font-family: sans-serif;
        }
        
        #map { width: 100vw; height: 100vh; }
        
        #orientation-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: #050b14; z-index: 9999; color: #ffffff;
            flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 20px;
        }
        
        #orientation-overlay .icon { font-size: 50px; margin-bottom: 20px; animation: rotateDevice 2s infinite ease-in-out; }
        #orientation-overlay h2 { font-size: 18px; letter-spacing: 2px; color: #00ffcc; text-transform: uppercase; }
        @keyframes rotateDevice { 0% { transform: rotate(0deg); } 50% { transform: rotate(-90deg); } 100% { transform: rotate(-90deg); } }
        @media screen and (orientation: portrait) { #orientation-overlay { display: flex; } #map { display: none; } }

        .hud-panel {
            position: absolute; top: 20px; right: 20px; background: rgba(5, 11, 20, 0.9);
            border: 1px solid #3a4d5c; color: #8fa0af; padding: 12px; border-radius: 4px;
            font-family: monospace; font-size: 11px; z-index: 1000; pointer-events: none;
            box-shadow: 0 0 15px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>
    <div id="orientation-overlay">
        <div class="icon">🔄</div>
        <h2>দয়া করে আপনার ফোনটি চওড়া (Landscape) করুন</h2>
        <p style="color: #627d93; font-size: 12px; margin-top: 10px;">সেরা গেম এক্সপেরিয়েন্সের জন্য স্ক্রিন রোটেশন অন রাখুন।</p>
    </div>

    <div id="map"></div>
    
    <div class="hud-panel">
        <b style="color:#fff;">MODERN AGE: OPTIMIZED</b><br><br>
        • ROTATION: LOCKED<br>
        • BORDERS: SHADOW CONTRAST<br>
        • RENDERING: FADE SMOOTHING
    </div>

    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <script>
        const map = new maplibregl.Map({
            container: 'map',
            center: [30.0, 15.0], 
            zoom: 2.2, 
            minZoom: 2,
            maxZoom: 7,
            dragRotate: false,      // ১. রাইট-ক্লিক দিয়ে ঘোরানো বন্ধ
            pitchWithRotate: false, // পিচ বা থ্রিডি অ্যাঙ্গেল বন্ধ
            style: {
                version: 8,
                glyphs: "https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf",
                sources: {
                    'satellite': {
                        type: 'raster',
                        tiles: ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'],
                        tileSize: 256
                    }
                },
                layers: [
                    {
                        // ২. ম্যাপের একদম নিচে একটি সমুদ্রের কালার, যাতে ইন্টারনেট স্লো থাকলে কালো দাগ না দেখায়
                        id: 'background',
                        type: 'background',
                        paint: { 'background-color': '#0a1420' }
                    },
                    {
                        id: 'satellite-base',
                        type: 'raster',
                        source: 'satellite',
                        paint: {
                            'raster-fade-duration': 300 // লোডিং স্মুথ করবে
                        }
                    }
                ]
            }
        });

        // মোবাইলের টু-ফিঙ্গার রোটেশন সম্পূর্ণ লক
        map.touchZoomRotate.disableRotation();

        function lockLandscape() {
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(() => {});
            }
        }
        window.addEventListener('click', lockLandscape);

        map.on('load', () => {
            map.addSource('countries-data', {
                type: 'geojson',
                data: 'https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson'
            });

            // ৩ক. মরুভূমির জন্য বর্ডারের নিচে কালো শ্যাডো (Shadow Line)
            map.addLayer({
                id: 'country-borders-shadow',
                type: 'line',
                source: 'countries-data',
                paint: {
                    'line-color': 'rgba(0, 0, 0, 0.8)', // গাঢ় কালো শ্যাডো
                    'line-width': 3.0 // সাদার চেয়ে একটু মোটা
                }
            });

            // ৩খ. আসল হালকা সাদা বর্ডার (White Outline)
            map.addLayer({
                id: 'country-borders',
                type: 'line',
                source: 'countries-data',
                paint: {
                    'line-color': 'rgba(255, 255, 255, 0.45)',
                    'line-width': 1.2
                }
            });

            // দেশের নামের লেয়ার
            map.addLayer({
                id: 'country-names',
                type: 'symbol',
                source: 'countries-data',
                layout: {
                    'text-field': ['to-upper', ['get', 'ADMIN']],
                    'text-font': ['Open Sans Bold'],
                    'text-letter-spacing': 0.18, 
                    'symbol-placement': 'point',
                    'text-anchor': 'center',
                    'text-allow-overlap': false,
                    'text-ignore-placement': false,
                    'text-padding': 5,
                    'text-size': [
                        'interpolate', ['linear'], ['zoom'],
                        2, 8,
                        5, 15
                    ]
                },
                paint: {
                    'text-color': 'rgba(255, 255, 255, 0.85)',
                    'text-halo-color': 'rgba(0, 0, 0, 0.9)',
                    'text-halo-width': 1.5
                }
            });

            // ক্লিক হাইলাইট লেয়ার
            map.addLayer({
                id: 'country-click-layer',
                type: 'fill',
                source: 'countries-data',
                paint: {
                    'fill-color': '#ffffff',
                    'fill-opacity': ['case', ['boolean', ['feature-state', 'clicked'], false], 0.15, 0]
                }
            });

            // শহরের সোর্স ও লেয়ার
            map.addSource('cities-data', {
                type: 'geojson',
                data: { type: 'FeatureCollection', features: [] }
            });

            map.addLayer({
                id: 'city-labels',
                type: 'symbol',
                source: 'cities-data',
                layout: {
                    'text-field': [
                        'concat',
                        ['case', ['boolean', ['get', 'isCapital'], false], '★ ', '● '],
                        ['to-upper', ['get', 'cityName']]
                    ],
                    'text-font': ['Open Sans Bold'],
                    'text-size': 11,
                    'text-anchor': 'top',
                    'text-offset': [0, 0.4],
                    'text-allow-overlap': true
                },
                paint: {
                    'text-color': ['case', ['boolean', ['get', 'isCapital'], false], '#ffcc00', '#ffffff'],
                    'text-halo-color': '#000000',
                    'text-halo-width': 1.5
                }
            });

            let clickedStateId = null;

            map.on('click', 'country-click-layer', (e) => {
                if (e.features.length > 0) {
                    const countryFeature = e.features[0];
                    const countryName = countryFeature.properties.ADMIN || countryFeature.properties.name;

                    if (clickedStateId !== null) {
                        map.setFeatureState({ source: 'countries-data', id: clickedStateId }, { clicked: false });
                    }
                    
                    clickedStateId = countryFeature.id || countryName;
                    countryFeature.id = clickedStateId;
                    map.setFeatureState({ source: 'countries-data', id: clickedStateId }, { clicked: true });

                    const coordinates = e.lngLat;
                    const dynamicCities = {
                        type: 'FeatureCollection',
                        features: [
                            {
                                type: 'Feature',
                                geometry: { type: 'Point', coordinates: [coordinates.lng, coordinates.lat] },
                                properties: { cityName: countryName + " (CAPITAL)", isCapital: true }
                            },
                            {
                                type: 'Feature',
                                geometry: { type: 'Point', coordinates: [coordinates.lng + 1.5, coordinates.lat - 1.0] },
                                properties: { cityName: "Strategic Zone A", isCapital: false }
                            }
                        ]
                    };
                    map.getSource('cities-data').setData(dynamicCities);
                }
            });

            map.on('click', (e) => {
                const features = map.queryRenderedFeatures(e.point, { layers: ['country-click-layer'] });
                if (!features.length) {
                    if (clickedStateId !== null) {
                        map.setFeatureState({ source: 'countries-data', id: clickedStateId }, { clicked: false });
                        clickedStateId = null;
                    }
                    map.getSource('cities-data').setData({ type: 'FeatureCollection', features: [] });
                }
            });
            
            window.addEventListener('resize', () => { map.resize(); });
        });
    </script>
</body>
    </html>
