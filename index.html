    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            width: 100%; height: 100%; overflow: hidden; 
            background-color: #0a1420; font-family: sans-serif;
        }
        #map { width: 100vw; height: 100vh; }
        
        #orientation-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #050b14; z-index: 9999; color: #ffffff;
            flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 20px;
        }
        #orientation-overlay .icon { font-size: 50px; margin-bottom: 20px; animation: rotateDevice 2s infinite ease-in-out; }
        #orientation-overlay h2 { font-size: 18px; letter-spacing: 2px; color: #00ffcc; text-transform: uppercase; }
        @keyframes rotateDevice { 0% { transform: rotate(0deg); } 50% { transform: rotate(-90deg); } 100% { transform: rotate(-90deg); } }
        @media screen and (orientation: portrait) { #orientation-overlay { display: flex; } #map { display: none; } }

        .hud-panel {
            position: absolute; top: 20px; right: 20px; background: rgba(5, 11, 20, 0.9);
            border: 1px solid #3a4d5c; color: #8fa0af; padding: 12px; border-radius: 4px;
            font-family: monospace; font-size: 11px; z-index: 1000; pointer-events: none;
            box-shadow: 0 0 15px rgba(0,0,0,0.8);
        }
    </style>
</head>

            container: 'map',
            center: [30.0, 15.0], 
            zoom: 2.2, 
            minZoom: 2,
            maxZoom: 7,
            dragRotate: false,      
            pitchWithRotate: false, 
            style: {
                version: 8,
                glyphs: "https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf",
                sources: {
                    'satellite': {
                        type: 'raster',

                        tileSize: 256
                    }
                },
                layers: [
                    {
                        id: 'background',
                        type: 'background',
                        paint: { 'background-color': '#0a1420' }
                    },
                    {
                        id: 'satellite-base',
                        type: 'raster',
                        source: 'satellite',
                        paint: { 'raster-fade-duration': 300 }
                    }
                ]
            }
        });

        map.touchZoomRotate.disableRotation();

            // বর্ডারের জন্য অনলাইন জিওজেসন সোর্স

                type: 'geojson',
                data: 'https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson'
            });

            // ১. আপনার দেওয়া অর্ডার অনুযায়ী বর্ডার একদম নিখুঁত ১.৪ পিক্সেল (1.4px) লক করা হলো
            map.addLayer({
                id: 'country-borders',
                type: 'line',
                source: 'countries-borders-data',
                paint: {
                    'line-color': 'rgba(255, 255, 255, 0.45)', 
                    'line-width': 1.4 
                }
            });

            // ২. দেশের নামের জন্য আমাদের ডিরেক্ট পার্মানেন্ট সোর্স ইঞ্জিন

                type: 'geojson',
                data: countryPointsData
            });

            // ৩. গেম-স্টাইল নামের লেয়ার (যা কোনোদিন সরবে না বা গায়ে গায়ে লাগবে না)
            map.addLayer({
                id: 'country-names',
                type: 'symbol',
                source: 'hardcoded-names',
                layout: {
                    'text-field': ['get', 'name'],
                    'text-font': ['Open Sans Bold'],
                    'text-letter-spacing': 0.20, 
                    'symbol-placement': 'point',
                    'text-anchor': 'center',
                    
                    // কলিশন এবং গায়ে গায়ে লাগা বন্ধের গেম ফিল্টার
                    'text-allow-overlap': false, 
                    'text-ignore-placement': false,
                    'text-padding': 15, // দুটো নামের মাঝে গ্যাপ রাখবে
                    
                    // লেবানন বা ছোট দেশের জন্য কাত হওয়ার লজিক
                    'text-max-angle': 35,
                    'text-variable-anchor': ['center', 'left', 'right', 'top', 'bottom'],
                    
                    'text-size': [
                        'interpolate', ['linear'], ['zoom'],
                        2, 8.5,   
                        5, 14.5   
                    ]
                },
                paint: {
                    'text-color': 'rgba(255, 255, 255, 0.9)', 
                    'text-halo-color': 'rgba(0, 0, 0, 0.95)', 
                    'text-halo-width': 1.3
                }
            });

            // ৪. ক্লিক হাইলাইট লেয়ার
            map.addLayer({
                id: 'country-click-layer',
                type: 'fill',
                source: 'countries-borders-data',
                paint: {
                    'fill-color': '#ffffff',
                    'fill-opacity': ['case', ['boolean', ['feature-state', 'clicked'], false], 0.15, 0]
                }
            });

            // ৫. ডাইনামিক সিটি সোর্স
            map.addSource('cities-data', {
                type: 'geojson',
                data: { type: 'FeatureCollection', features: [] }
            });

            map.addLayer({
                id: 'city-labels',
                type: 'symbol',
                source: 'cities-data',
                layout: {
                    'text-field': [
                        'concat',
                        ['case', ['boolean', ['get', 'isCapital'], false], '★ ', '● '],
                        ['to-upper', ['get', 'cityName']]
                    ],
                    'text-font': ['Open Sans Bold'],
                    'text-size': 11,
                    'text-anchor': 'top',
                    'text-offset': [0, 0.4],
                    'text-allow-overlap': true
                },
                paint: {
                    'text-color': ['case', ['boolean', ['get', 'isCapital'], false], '#ffcc00', '#ffffff'],
                    'text-halo-color': '#000000',
                    'text-halo-width': 1.5
                }
            });

            let clickedStateId = null;

            map.on('click', 'country-click-layer', (e) => {
                if (e.features.length > 0) {
                    const countryFeature = e.features[0];
                    const countryName = countryFeature.properties.ADMIN || countryFeature.properties.name;

                    if (clickedStateId !== null) {
                        map.setFeatureState({ source: 'countries-borders-data', id: clickedStateId }, { clicked: false });
                    }
                    
                    clickedStateId = countryFeature.id || countryName;
