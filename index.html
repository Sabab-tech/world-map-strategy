<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Modern Age 3 - Hollywood Style Map</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/openlayers/8.2.0/dist/ol.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/openlayers/8.2.0/ol.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html, #map { width: 100%; height: 100%; overflow: hidden; background-color: #0b1521; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        const map = new ol.Map({
            target: 'map',
            layers: [
                new ol.layer.Tile({ 
                    source: new ol.source.XYZ({ 
                        url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
                        maxZoom: 19
                    }) 
                }),
                new ol.layer.Vector({
                    declutter: true, // এক নাম বারবার আসবে না, জ্যাম হবে না
                    source: new ol.source.Vector({
                        url: 'https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson',
                        format: new ol.format.GeoJSON()
                    }),
                    style: function (feature, resolution) {
                        const name = feature.get('ADMIN') || '';
                        const zoom = Math.log2(156543.03392 / resolution);

                        // ছোট দেশের নাম শুরুতে দেখাবে না, জুম করলে বড় হবে
                        if (zoom < 4.2 && ["Lebanon", "Qatar", "Kuwait", "Israel", "Gambia", "Singapore"].includes(name)) {
                            return null; 
                        }

                        // জুম অনুযায়ী ডায়নামিক সাইজ (হলিউড স্টাইল বড় অক্ষর)
                        let fontSize = 12 + (zoom - 3.8) * 4;
                        if (fontSize > 28) fontSize = 28;
                        if (fontSize < 11) fontSize = 11;

                        // লম্বালম্বি দেশের জন্য নিখুঁত বাঁকানো লজিক
                        let textRotation = 0;
                        if (name === "Lebanon") textRotation = -1.35; 
                        else if (name === "Chile") textRotation = -1.45;
                        else if (name === "Vietnam") textRotation = -1.15;
                        else if (name === "Norway") textRotation = -1.25;

                        return new ol.style.Style({
                            stroke: new ol.style.Stroke({
                                color: 'rgba(255, 255, 255, 0.8)',
                                width: 1.4 // আপনার ফিক্সড ১.৪ পিক্সেল বর্ডার
                            }),
                            text: new ol.style.Text({
                                text: name.toUpperCase(),
                                // Impact ফন্ট ব্যবহার করা হয়েছে হলিউড সাইনের মতো খাড়া লুক দেওয়ার জন্য
                                font: `900 ${fontSize}px "Impact", "Arial Black", sans-serif`,
                                fill: new ol.style.Fill({ color: '#ffffff' }),
                                // কালো স্ট্রোক টেক্সটকে থ্রিডি স্টাইলে খাড়া দেখাবে
                                stroke: new ol.style.Stroke({ color: '#000000', width: 4.5 }),
                                rotation: textRotation,
                                placement: 'point',
                                textAlign: 'center',
                                textBaseline: 'middle',
                                overflow: false // বর্ডারের বাইরে নাম যাওয়া কঠোরভাবে বন্ধ
                            })
                        });
                    }
                })
            ],
            view: new ol.View({
                center: ol.proj.fromLonLat([25.0, 42.0]),
                zoom: 3.8,
                minZoom: 3.8,
                maxZoom: 8.5,
                enableRotation: false
            }),
            controls: []
        });
    </script>
</body>
</html>
