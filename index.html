<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>এশিয়ান জিওপলিটিক্যাল স্ট্র্যাটেজি ম্যাপ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body, html {
            width: 100%;
            height: 100%;
            background-color: #0d1117;
            overflow: hidden;
        }
        #map {
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        /* Dashboard Control UI */
        .control-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(13, 17, 23, 0.95);
            border: 2px solid #30363d;
            border-radius: 8px;
            padding: 15px;
            z-index: 1000;
            color: #c9d1d9;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            max-width: 280px;
        }
        .control-panel h3 {
            margin-bottom: 12px;
            color: #58a6ff;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #30363d;
            padding-bottom: 5px;
        }
        .layer-btn {
            display: flex;
            align-items: center;
            width: 100%;
            padding: 8px 12px;
            margin: 5px 0;
            background: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s ease;
            text-align: left;
        }
        .layer-btn:hover {
            background: #30363d;
            border-color: #8b949e;
        }
        .layer-btn.active {
            background: #1f6feb;
            border-color: #58a6ff;
            color: #ffffff;
            font-weight: bold;
        }
        .layer-btn span {
            margin-right: 10px;
            font-size: 16px;
        }
        /* Custom Popup Styling */
        .leaflet-popup-content-wrapper {
            background: #161b22 !important;
            color: #c9d1d9 !important;
            border: 1px solid #30363d;
            border-radius: 6px;
        }
        .leaflet-popup-tip {
            background: #161b22 !important;
        }
        .popup-title {
            font-weight: bold;
            color: #58a6ff;
            font-size: 14px;
            margin-bottom: 4px;
        }
        .popup-meta {
            font-size: 11px;
            color: #8b949e;
            text-transform: uppercase;
        }
        .popup-status {
            display: inline-block;
            margin-top: 5px;
            padding: 2px 6px;
            font-size: 10px;
            border-radius: 4px;
            font-weight: bold;
        }
        .status-unlocked { background: #238636; color: white; }
        .status-locked { background: #da3633; color: white; }
        
        /* Advanced Status Indicator */
        .status-bar {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(13, 17, 23, 0.98);
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 12px;
            color: #c9d1d9;
            font-size: 10px;
            z-index: 1000;
            min-width: 200px;
            backdrop-filter: blur(5px);
        }
        .status-bar.loading {
            border-color: #d29922;
            background: rgba(13, 17, 23, 0.98);
        }
        .status-bar.fresh {
            border-color: #238636;
        }
        .status-bar.error {
            border-color: #da3633;
        }
        .status-row {
            display: flex;
            justify-content: space-between;
            margin: 4px 0;
            padding: 3px 0;
            border-bottom: 1px solid rgba(48, 54, 61, 0.5);
        }
        .status-row:last-child {
            border-bottom: none;
        }
        .status-label {
            color: #8b949e;
        }
        .status-value {
            color: #58a6ff;
            font-weight: bold;
        }
        
        /* Refresh Button */
        .refresh-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(13, 17, 23, 0.95);
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #58a6ff;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s ease;
            z-index: 1000;
        }
        .refresh-btn:hover {
            background: #1f6feb;
            border-color: #58a6ff;
            color: #ffffff;
        }
        .refresh-btn.loading {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        /* Error Toast */
        .error-toast {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(218, 54, 51, 0.95);
            border: 1px solid #da3633;
            border-radius: 6px;
            color: white;
            padding: 12px 20px;
            z-index: 2000;
            display: none;
            animation: slideDown 0.3s ease;
        }
        .error-toast.show {
            display: block;
        }
        @keyframes slideDown {
            from {
                transform: translateX(-50%) translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>

    <div class="control-panel">
        <h3>Power Grid Layers</h3>
        <button class="layer-btn active" onclick="filterLayer('all', this)"><span>🌐</span> All Nodes</button>
        <button class="layer-btn" onclick="filterLayer('capital', this)"><span>🏛️</span> Political Control</button>
        <button class="layer-btn" onclick="filterLayer('economic_hub', this)"><span>💰</span> Economic Trade Grid</button>
        <button class="layer-btn" onclick="filterLayer('military_hub', this)"><span>🪖</span> Military Command</button>
        <button class="layer-btn" onclick="filterLayer('secret_zone', this)"><span>🔒</span> Intel / Secret Zones</button>
    </div>

    <button class="refresh-btn" id="refreshBtn" onclick="manualRefresh()" title="Manual refresh data">🔄 Refresh</button>

    <div class="status-bar loading" id="statusBar">
        <div class="status-row">
            <span class="status-label">⟳ Loading...</span>
        </div>
    </div>

    <div class="error-toast" id="errorToast"></div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // ===== গ্লোবাল কনফিগারেশন =====
        const CONFIG = {
            REFRESH_INTERVAL: 5 * 60 * 1000, // 5 minutes
            FULL_RELOAD_INTERVAL: 2 * 60 * 60 * 1000, // 2 hours
            TIMEOUT: 10000, // 10 seconds
            MAX_RETRIES: 3,
            RETRY_DELAY: 2000 // 2 seconds
        };

        let retryCount = 0;
        let lastUpdateTime = null;
        let dataLoadCount = 0;
        let autoRefreshInterval = null;
        let fullReloadInterval = null;

        // ===== ইনিশিয়াল ক্যাশ পরিষ্কার =====
        function clearAllCaches() {
            // Service Worker নিবন্ধন সরিয়ে ফেলা
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(registrations => {
                    registrations.forEach(registration => {
                        registration.unregister().catch(err => 
                            console.warn('Service Worker unregister error:', err)
                        );
                    });
                });
            }
            
            // ব্রাউজার ক্যাশ পরিষ্কার করা
            if ('caches' in window) {
                caches.keys().then(names => {
                    names.forEach(name => {
                        caches.delete(name).catch(err => 
                            console.warn('Cache delete error:', err)
                        );
                    });
                });
            }

            console.log('✓ All caches cleared');
        }

        // পেজ লোডের সময় ক্যাশ পরিষ্কার করা
        clearAllCaches();

        // ===== ম্যাপ ইনিশিয়ালাইজেশন =====
        const map = L.map('map', {
            center: [22.0, 90.0], 
            zoom: 4,
            minZoom: 3,
            maxZoom: 7
        });

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO'
        }).addTo(map);

        let allMarkers = [];
        let currentFilter = 'all';
        let isLoading = false;

        // ===== ইউটিলিটি ফাংশন =====
        function getMarkerStyle(role, status) {
            if (status === 'locked') return { color: '#555555', fillColor: '#222222', radius: 6 };
            switch(role) {
                case 'capital': return { color: '#ff5555', fillColor: '#ff0000', radius: 10 };
                case 'economic_hub': return { color: '#55ff55', fillColor: '#00cc00', radius: 8 };
                case 'military_hub': return { color: '#5555ff', fillColor: '#0000ff', radius: 8 };
                case 'secret_zone': return { color: '#ffff55', fillColor: '#cccc00', radius: 7 };
                default: return { color: '#ffffff', fillColor: '#888888', radius: 6 };
            }
        }

        function getEmoji(role) {
            switch(role) {
                case 'capital': return '🏛️';
                case 'economic_hub': return '💰';
                case 'military_hub': return '🪖';
                case 'secret_zone': return '🔒';
                default: return '🏙️';
            }
        }

        function updateStatusBar(status) {
            const statusBar = document.getElementById('statusBar');
            const now = new Date();
            const time = now.toLocaleTimeString('bn-BD');
            const date = now.toLocaleDateString('bn-BD');

            let html = '';
            
            if (status === 'loading') {
                statusBar.className = 'status-bar loading';
                html = '<div class="status-row"><span class="status-label">⟳ Loading fresh data...</span></div>';
            } else if (status === 'error') {
                statusBar.className = 'status-bar error';
                html = `
                    <div class="status-row">
                        <span class="status-label">✗ Error loading data</span>
                    </div>
                    <div class="status-row">
                        <span class="status-label">Retries:</span>
                        <span class="status-value">${retryCount}/${CONFIG.MAX_RETRIES}</span>
                    </div>
                `;
            } else if (status === 'success') {
                statusBar.className = 'status-bar fresh';
                html = `
                    <div class="status-row">
                        <span class="status-label">✓ Data Status</span>
                    </div>
                    <div class="status-row">
                        <span class="status-label">Last Update:</span>
                        <span class="status-value">${time}</span>
                    </div>
                    <div class="status-row">
                        <span class="status-label">Date:</span>
                        <span class="status-value">${date}</span>
                    </div>
                    <div class="status-row">
                        <span class="status-label">Load Count:</span>
                        <span class="status-value">${dataLoadCount}</span>
                    </div>
                    <div class="status-row">
                        <span class="status-label">Nodes:</span>
                        <span class="status-value">${allMarkers.length}</span>
                    </div>
                    <div class="status-row">
                        <span class="status-label">Next Auto-Refresh:</span>
                        <span class="status-value">5 minutes</span>
                    </div>
                `;
            }

            statusBar.innerHTML = html;
        }

        function showErrorToast(message) {
            const toast = document.getElementById('errorToast');
            toast.textContent = '⚠️ ' + message;
            toast.classList.add('show');

            setTimeout(() => {
                toast.classList.remove('show');
            }, 5000);
        }

        const countryCoords = {
            "Bangladesh": [23.6850, 90.3563], "India": [20.5937, 78.9629], "Pakistan": [30.3753, 69.3451],
            "Nepal": [28.3949, 84.1240], "Sri Lanka": [7.8731, 80.7718], "Bhutan": [27.5142, 90.4336],
            "Maldives": [3.2028, 73.2207], "Afghanistan": [33.9391, 67.7100], "Indonesia": [-0.7893, 113.9213],
            "Vietnam": [14.0583, 108.2772], "Thailand": [15.8700, 100.9925], "Malaysia": [4.2105, 101.9758],
            "Singapore": [1.3521, 103.8198], "Philippines": [12.8797, 121.7740], "Myanmar": [21.9162, 95.9560],
            "Cambodia": [12.5657, 104.9910], "Laos": [19.8563, 102.4955], "Brunei": [4.5353, 114.7277],
            "Timor-Leste": [-8.8742, 125.7275], "China": [35.8617, 104.1954], "Japan": [36.2048, 138.2529],
            "South Korea": [35.9078, 127.7669], "North Korea": [40.3399, 127.5101], "Mongolia": [46.8625, 103.8467],
            "Taiwan": [23.6978, 120.9605], "Iran": [32.4279, 53.6880], "Saudi Arabia": [23.8859, 45.0792],
            "Turkey": [38.9637, 35.2433]
        };

        // ===== ডেটা লোডিং ফাংশন (রিট্রাই লজিক সহ) =====
        function loadCitiesData(isRetry = false) {
            if (isLoading) return;
            
            isLoading = true;
            const refreshBtn = document.getElementById('refreshBtn');
            refreshBtn.classList.add('loading');
            updateStatusBar('loading');

            // কোয়েরি পারামিটার তৈরি (ক্যাশ বাস্টিং)
            const timestamp = new Date().getTime();
            const random = Math.random();
            const url = `./cities.json?cb=${timestamp}&t=${random}`;

            // Fetch অপশন
            const fetchOptions = {
                method: 'GET',
                headers: {
                    'Cache-Control': 'no-cache, no-store, must-revalidate',
                    'Pragma': 'no-cache',
                    'Expires': '0'
                }
            };

            // টাইমআউট সহ ফেচ করা
            const fetchWithTimeout = (url, options, timeout) => {
                let timeoutId;
                return Promise.race([
                    fetch(url, options),
                    new Promise((_, reject) => {
                        timeoutId = setTimeout(() => {
                            reject(new Error('Fetch timeout'));
                        }, timeout);
                    })
                ]).finally(() => {
                    if (timeoutId) clearTimeout(timeoutId);
                });
            };

            fetchWithTimeout(url, fetchOptions, CONFIG.TIMEOUT)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }
                    return response.json();
                })
                .then(data => {
                    // ডেটা ভ্যালিডেশন
                    if (!data || typeof data !== 'object') {
                        throw new Error('Invalid JSON structure');
                    }
                    if (!data.regions || typeof data.regions !== 'object') {
                        throw new Error('Missing regions data');
                    }

                    const rootData = data.regions;
                    
                    // পুরানো মার্কার সরিয়ে ফেলা
                    allMarkers.forEach(marker => {
                        try {
                            if (map.hasLayer(marker)) {
                                map.removeLayer(marker);
                            }
                        } catch (e) {
                            console.warn('Error removing marker:', e);
                        }
                    });
                    allMarkers = [];

                    // নতুন মার্কার যোগ করা
                    for (let region in rootData) {
                        if (region === 'game_world') continue;
                        
                        const regionData = rootData[region];
                        if (!regionData || typeof regionData !== 'object') continue;
                        
                        const countries = regionData.countries;
                        if (!countries || typeof countries !== 'object') continue;

                        for (let countryName in countries) {
                            const countryData = countries[countryName];
                            if (!countryData || typeof countryData !== 'object') continue;
                            
                            const locations = countryData.locations;
                            if (!locations || !Array.isArray(locations)) continue;
                            
                            const baseCoord = countryCoords[countryName] || [20, 77];

                            locations.forEach((loc, index) => {
                                try {
                                    // ডেটা ভ্যালিডেশন
                                    if (!loc || typeof loc !== 'object') return;
                                    if (!loc.name || !loc.role) return;

                                    const latOffset = (index % 3 - 1) * 1.3;
                                    const lngOffset = (Math.floor(index / 3) - 1) * 1.3;
                                    const finalCoord = [baseCoord[0] + latOffset, baseCoord[1] + lngOffset];

                                    const style = getMarkerStyle(loc.role, loc.status);
                                    const marker = L.circleMarker(finalCoord, {
                                        radius: style.radius,
                                        fillColor: style.fillColor,
                                        color: style.color,
                                        weight: 2,
                                        opacity: 1,
                                        fillOpacity: 0.8
                                    });

                                    let popupContent = `
                                        <div class="popup-title">${getEmoji(loc.role)} ${loc.name}</div>
                                        <div class="popup-meta">দেশ: ${countryName}</div>
                                        <div class="popup-meta">ক্যাটাগরি: ${loc.role.replace('_', ' ')}</div>
                                    `;

                                    if(loc.status === 'locked') {
                                        const unlockCondition = loc.unlock_condition || 'N/A';
                                        popupContent += `
                                            <div class="popup-status status-locked">🔒 LOCKED</div>
                                            <div class="popup-meta" style="margin-top:5px; color:#ff7b72;">Unlock: ${unlockCondition}</div>
                                        `;
                                    } else {
                                        popupContent += `<div class="popup-status status-unlocked">🟢 ACTIVE NODE</div>`;
                                    }

                                    marker.bindPopup(popupContent);
                                    marker.gameData = { role: loc.role, status: loc.status };
                                    marker.addTo(map);
                                    allMarkers.push(marker);
                                } catch (e) {
                                    console.error('Error creating marker:', e);
                                }
                            });
                        }
                    }

                    updateZoomVisibility();
                    updateStatusBar('success');
                    lastUpdateTime = new Date();
                    dataLoadCount++;
                    retryCount = 0;

                    console.log(`✓ Data loaded successfully (${allMarkers.length} nodes)`);
                })
                .catch(error => {
                    console.error('✗ Error loading data:', error);
                    
                    // রিট্রাই লজিক
                    if (retryCount < CONFIG.MAX_RETRIES) {
                        retryCount++;
                        showErrorToast(`Retry attempt ${retryCount}/${CONFIG.MAX_RETRIES}...`);
                        updateStatusBar('error');
                        
                        setTimeout(() => {
                            isLoading = false; // রিট্রাইয়ের আগে ফ্ল্যাগ রিসেট
                            loadCitiesData(true);
                        }, CONFIG.RETRY_DELAY);
                    } else {
                        updateStatusBar('error');
                        showErrorToast('Failed to load data after multiple retries');
                        console.error('Max retries reached');
                        retryCount = 0;
                        isLoading = false; // ফ্ল্যাগ রিসেট করা
                    }
                })
                .finally(() => {
                    isLoading = false;
                    refreshBtn.classList.remove('loading');
                });
        }

        // ===== ম্যানুয়াল রিফ্রেশ ফাংশন =====
        function manualRefresh() {
            console.log('📢 Manual refresh triggered');
            retryCount = 0;
            loadCitiesData();
        }

        // প্রথমবার ডেটা লোড করা
        loadCitiesData();

        // প্রতি ৫ মিনিটে স্বয়ংক্রিয় ডেটা রিফ্রেশ
        autoRefreshInterval = setInterval(() => {
            console.log('📢 Auto-refresh triggered (5 min interval)');
            retryCount = 0;
            loadCitiesData();
        }, CONFIG.REFRESH_INTERVAL);

        // প্রতি ২ ঘন্টায় সম্পূর্ণ পেজ রিলোড
        fullReloadInterval = setInterval(() => {
            console.log('🔄 Full page reload (2 hour interval) - clearing all browser cache');
            clearAllCaches();
            location.reload();
        }, CONFIG.FULL_RELOAD_INTERVAL);

        // ===== ফিল্টার লেয়ার ফাংশন =====
        function filterLayer(role, btn) {
            currentFilter = role;
            document.querySelectorAll('.layer-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            allMarkers.forEach(marker => {
                if (role === 'all' || marker.gameData.role === role) {
                    if (!map.hasLayer(marker)) marker.addTo(map);
                } else {
                    if (map.hasLayer(marker)) map.removeLayer(marker);
                }
            });
            updateZoomVisibility();
        }

        // ===== জুম ভিজিবিলিটি ফাংশন =====
        function updateZoomVisibility() {
            const currentZoom = map.getZoom();
            allMarkers.forEach(marker => {
                if (currentFilter === 'all' || marker.gameData.role === currentFilter) {
                    if (currentZoom <= 4) {
                        if (marker.gameData.role !== 'capital') {
                            if (map.hasLayer(marker)) map.removeLayer(marker);
                        } else {
                            if (!map.hasLayer(marker)) marker.addTo(map);
                        }
                    } else {
                        if (!map.hasLayer(marker)) marker.addTo(map);
                    }
                }
            });
        }

        map.on('zoomend', updateZoomVisibility);

        // ===== ক্লিনআপ =====
        window.addEventListener('beforeunload', () => {
            if (autoRefreshInterval) clearInterval(autoRefreshInterval);
            if (fullReloadInterval) clearInterval(fullReloadInterval);
        });
    </script>
</body>
</html>
