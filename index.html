<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global Map - V30 Ultimate Player Mechanics</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/openlayers/8.2.0/dist/ol.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/openlayers/8.2.0/ol.css">
    <style>
        body, html, #map { width: 100%; height: 100%; margin: 0; padding: 0; background-color: #0b1521; touch-action: none; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        const shortNames = {
            "Democratic Republic of the Congo": "DR Congo",
            "Central African Republic": "C.A.R.",
            "Republic of the Congo": "Congo",
            "Equatorial Guinea": "Eq. Guinea",
            "United States of America": "USA",
            "United Kingdom": "UK",
            "Saudi Arabia": "S. Arabia",
            "United Arab Emirates": "UAE",
            "Dominican Republic": "Dominican Rep.",
            "The Bahamas": "Bahamas",
            "Saint Vincent and the Grenadines": "St. Vincent",
            "Antigua and Barbuda": "Antigua",
            "Trinidad and Tobago": "Trinidad",
            "Saint Kitts and Nevis": "St. Kitts",
            "São Tomé and Príncipe": "São Tomé",
            "Bosnia and Herzegovina": "Bosnia",
            "Russian Federation": "Russia",
            "Federated States of Micronesia": "Micronesia",
            "Papua New Guinea": "PNG",
            "Solomon Islands": "Solomons",
            "Marshall Islands": "Marshalls",
            "South Korea": "S. Korea",
            "North Korea": "N. Korea"
        };

        // ম্যানুয়াল সেন্টার পয়েন্ট (যেসব দেশের নাম ডিফল্টভাবে বিশ্রী জায়গায় বসে, তাদের জোর করে ঠিক জায়গায় বসানোর লজিক)
        const manualCenters = {
            "South Korea": [127.90, 36.30],
            "North Korea": [127.10, 40.20],
            "Lebanon": [35.86, 33.85],
            "Vietnam": [108.00, 14.00],
            "Chile": [-71.50, -35.00],
            "Israel": [34.85, 31.04],
            "Croatia": [15.20, 45.10]
        };

        // খুব ছোট দেশ, যাদের সবুজ বাতি লাগবে (লেবাননকে এখান থেকে বাদ দেওয়া হয়েছে যেন ওটা সাধারণ দেশের মতো কাজ করে)
        const microstates = [
            { name: "Vatican", coord: [12.4534, 41.9029] },
            { name: "Monaco", coord: [7.4246, 43.7384] },
            { name: "San Marino", coord: [12.4578, 43.9424] },
            { name: "Maldives", coord: [73.5093, 4.1755] },
            { name: "Bahrain", coord: [50.5577, 26.0667] },
            { name: "Singapore", coord: [103.8198, 1.3521] },
            { name: "Malta", coord: [14.3754, 35.9375] },
            { name: "Fiji", coord: [178.0650, -17.7134] },
            { name: "Bahamas", coord: [-77.3963, 25.0343] },
            { name: "Cyprus", coord: [33.4299, 35.1264] },
            { name: "Mauritius", coord: [57.5522, -20.3484] }
        ];

        const borderSource = new ol.source.Vector({ wrapX: false }); 
        const labelSource = new ol.source.Vector({ wrapX: false });  

        fetch('https://d2ad6b4ur7yvpq.cloudfront.net/naturalearth-3.3.0/ne_50m_admin_0_countries.geojson')
            .then(res => res.json())
            .then(data => {
                const format = new ol.format.GeoJSON();
                const features = format.readFeatures(data, { featureProjection: 'EPSG:3857' });

                borderSource.addFeatures(features);

                const countryMaxPolygon = {};
                features.forEach(f => {
                    const name = f.get('admin') || f.get('name') || "";
                    if (!name) return;
                    const area = f.getGeometry().getArea();
                    if (!countryMaxPolygon[name] || area > countryMaxPolygon[name].area) {
                        countryMaxPolygon[name] = { area: area, feature: f };
                    }
                });

                const labelFeatures = [];

                Object.values(countryMaxPolygon).forEach(item => {
                    const rawName = item.feature.get('admin') || item.feature.get('name') || "";
                    const isAlreadyInSpecialList = microstates.some(ms => rawName.toLowerCase().includes(ms.name.toLowerCase()));
                    if (isAlreadyInSpecialList) return; 

                    let centerPoint;
                    
                    // ১. যদি ম্যানুয়াল সেন্টার দেওয়া থাকে, তবে সেখানেই নাম বসাবে
                    if (manualCenters[rawName] || manualCenters[shortNames[rawName]]) {
                        const coords = manualCenters[rawName] || manualCenters[shortNames[rawName]];
                        centerPoint = new ol.geom.Point(ol.proj.fromLonLat(coords));
                    } 
                    // ২. তা না হলে সবচেয়ে বড় ভূখণ্ডের মাঝখানে বসাবে
                    else {
                        const geom = item.feature.getGeometry();
                        if (geom.getType() === 'MultiPolygon') {
                            const polygons = geom.getPolygons();
                            let largest = polygons[0];
                            for (let i = 1; i < polygons.length; i++) {
                                if (polygons[i].getArea() > largest.getArea()) largest = polygons[i];
                            }
                            centerPoint = largest.getInteriorPoint(); 
                        } else {
                            centerPoint = geom.getInteriorPoint();
                        }
                    }

                    if (centerPoint) {
                        labelFeatures.push(new ol.Feature({ geometry: centerPoint, name: rawName, area: item.area, isMicrostate: false }));
                    }
                });

                microstates.forEach(ms => {
                    labelFeatures.push(new ol.Feature({
                        geometry: new ol.geom.Point(ol.proj.fromLonLat(ms.coord)), name: ms.name, area: 1000000, isMicrostate: true
                    }));
                });

                labelSource.addFeatures(labelFeatures);
            });

        const borderLayer = new ol.layer.Vector({
            source: borderSource,
            style: new ol.style.Style({ stroke: new ol.style.Stroke({ color: 'rgba(255, 255, 255, 0.4)', width: 1.6 }) })
        });

        const labelStyleFunction = function(feature, resolution) {
            const rawName = feature.get('name') || "";
            const displayName = shortNames[rawName] || rawName;
            const isMicro = feature.get('isMicrostate');
            const area = feature.get('area') || 0;
            const currentZoom = Math.round(Math.log2(40075016.686 / (256 * resolution)));

            // ছোট দেশের নাম ও বাতি (জুম ইন করলে এদের লেখাও বড় হবে)
            if (isMicro) {
                if (currentZoom < 4) return null; 
                let microFontSize = 11 + ((currentZoom - 4) * 1.5); // জুম বাড়লে লেখা বড় হবে
                return new ol.style.Style({
                    image: new ol.style.Circle({ radius: 4, fill: new ol.style.Fill({ color: '#00FF00' }) }),
                    text: new ol.style.Text({
                        text: displayName,
                        font: `900 ${microFontSize}px "Arial Black", sans-serif`, 
                        fill: new ol.style.Fill({ color: '#FFFFFF' }),
                        stroke: new ol.style.Stroke({ color: '#000000', width: 3 }),
                        offsetX: 10,
                        offsetY: 0,
                        textAlign: 'left'
                    }),
                    zIndex: 999 
                });
            }

            // লেভেল অনুযায়ী জুম ভিজিবিলিটি (কোরিয়া বা লেবানন অনেক ওপর থেকে আর দেখা যাবে না)
            let minZoomToShow = 5; 
            let baseSize = 12;

            if (["Russia", "Canada", "China", "USA", "Brazil", "Australia"].includes(displayName)) {
                minZoomToShow = 2.5;
                baseSize = 18;
            } else if (area > 200000000000) { // ইন্ডিয়া, কাজাখস্তান, আর্জেন্টিনা
                minZoomToShow = 3;
                baseSize = 15;
            } else if (area > 50000000000) {  // মাঝারি দেশ (ইউরোপ, আফ্রিকা)
                minZoomToShow = 4;
                baseSize = 13;
            } else { // সাউথ কোরিয়া, লেবানন ও অন্যান্য ছোট দেশ
                minZoomToShow = 4.5;
                baseSize = 11;
            }

            if (currentZoom < minZoomToShow) return null; // নির্দিষ্ট জুমের আগে নাম হাইড থাকবে

            // জাদুকরী সূত্র: জুম ইন করার সাথে সাথে গাণিতিকভাবে ফন্ট সাইজ বড় হবে, কখনোই ছোট হবে না!
            let dynamicFontSize = baseSize + ((currentZoom - minZoomToShow) * 2.5);
            dynamicFontSize = Math.min(dynamicFontSize, baseSize + 12); // ওভারল্যাপ ঠেকাতে সর্বোচ্চ লিমিট

            let strokeWidth = Math.max(2.5, dynamicFontSize * 0.12);

            return new ol.style.Style({
                text: new ol.style.Text({
                    text: displayName,
                    font: `900 ${dynamicFontSize}px "Arial Black", sans-serif`,
                    fill: new ol.style.Fill({ color: '#FFFFFF' }),
                    stroke: new ol.style.Stroke({ color: '#000000', width: strokeWidth }),
                    overflow: false
                }),
                zIndex: Math.round(100 - dynamicFontSize) 
            });
        };

        const labelLayer = new ol.layer.Vector({ source: labelSource, style: labelStyleFunction, declutter: true });

        const map = new ol.Map({
            target: 'map',
            layers: [
                new ol.layer.Tile({ source: new ol.source.XYZ({ url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', wrapX: false }) }),
                borderLayer, labelLayer 
            ],
            view: new ol.View({ 
                center: ol.proj.fromLonLat([20, 15]), 
                zoom: 3, 
                minZoom: 2.5, 
                maxZoom: 12, // গেমাররা এখন ছোট দেশের একদম ভেতরে পর্যন্ত জুম করতে পারবে
                enableRotation: false 
            })
        });

        // কান্ট্রি সিলেক্ট ও টাচ ফিক্স (Touch logic)
        const selectStyle = new ol.style.Style({
            fill: new ol.style.Fill({ color: 'rgba(255, 255, 255, 0.25)' }),
            stroke: new ol.style.Stroke({ color: '#00FFFF', width: 2.5 })
        });

        const selectInteraction = new ol.interaction.Select({
            layers: [borderLayer], style: selectStyle, multi: false, hitTolerance: 15 // আঙুলের টাচ মিস হবে না
        });
        map.addInteraction(selectInteraction);

        selectInteraction.on('select', function(e) {
            const selectedFeaturesCollection = selectInteraction.getFeatures();
            if (e.selected.length > 0) {
                const clickedFeature = e.selected[0];
                const countryName = clickedFeature.get('admin') || clickedFeature.get('name');
                selectedFeaturesCollection.clear(); 
                if (countryName) {
                    borderSource.getFeatures().forEach(f => {
                        const fName = f.get('admin') || f.get('name');
                        if (fName === countryName) selectedFeaturesCollection.push(f);
                    });
                }
            }
        });
    </script>
</body>
</html>
