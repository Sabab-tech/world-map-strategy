<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Ultimate Political Map Strategy Engine</title>
    
    <!-- মোবাইল ব্রাউজারে রিয়েল-টাইম কনসোল ও এরর ট্র্যাক করার প্লাগইন (Eruda) -->
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>

    <!-- সাই-ফাই ও মিলিটারী গেম ফন্ট ইমপোর্ট (Google Fonts) -->
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@500;800&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="./leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; }
        
        /* মিলিটারী স্টাইল গ্লাস-মরফিজম টপ রিসোর্স বার */
        #resource-bar {
            position: absolute; top: 0; left: 0; width: 100%; height: 50px;
            background: rgba(15, 23, 42, 0.85); border-bottom: 2px solid #38bdf8;
            display: flex; justify-content: space-around; align-items: center;
            z-index: 2000; font-family: 'Share Tech Mono', monospace; color: #f8fafc;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); backdrop-filter: blur(5px);
        }
        .res-item { display: flex; align-items: center; font-size: 14px; font-weight: bold; }
        .res-icon { font-size: 18px; margin-right: 6px; }
        .res-gain { font-size: 11px; color: #4ade80; margin-left: 6px; }

        /* Modern Age 3 এবং মিলিটারি রাডারের মতো স্টাইলিশ গ্রিড ও গ্লো ব্যাকগ্রাউন্ড */
        #map { 
            height: 100vh; 
            width: 100%; 
            background: 
                linear-gradient(rgba(56, 189, 248, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(56, 189, 248, 0.04) 1px, transparent 1px),
                radial-gradient(circle, #101f3c 0%, #060b13 100%);
            background-size: 40px 40px, 40px 40px, 100% 100%;
        }
        
        /* দেশের নাম দেখানোর জন্য নিয়ন ইফেক্টযুক্ত ফন্ট */
        .game-country-label, .country-label {
            background: none !important; border: none !important; box-shadow: none !important;
            color: #f1f5f9; 
            font-family: 'Share Tech Mono', monospace !important;
            font-weight: 900; letter-spacing: 1px;
            white-space: nowrap; pointer-events: none; display: block; text-align: center;
            text-shadow: 0px 0px 4px rgba(56, 189, 248, 0.6), 1px 1px 2px #000000;
        }

        /* সমুদ্রের নামের জন্য আকর্ষণীয় মিলিটারি স্টাইল ফন্ট */
        .ocean-label-text {
            font-family: 'Orbitron', sans-serif !important;
            font-weight: bold;
            font-style: italic;
            color: rgba(147, 197, 253, 0.3);
            letter-spacing: 4px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.6);
        }

        /* পপআপ উইন্ডো স্টাইল */
        .game-popup .leaflet-popup-content-wrapper {
            background: #0f172a !important; color: #f8fafc !important;
            border: 2px solid #38bdf8 !important; border-radius: 8px !important;
            font-family: 'Segoe UI', Roboto, sans-serif !important; 
            box-shadow: 0 6px 20px rgba(0,0,0,0.7) !important;
            padding: 12px 16px !important;
        }
        .game-popup .leaflet-popup-tip { background: #0f172a !important; border: 2px solid #38bdf8 !important; }
        
        .game-popup-title { font-size: 19px; font-weight: bold; color: #ffffff; display: block; margin-bottom: 4px; }
        .role-capital { color: #38bdf8; font-weight: bold; font-size: 14px; text-transform: uppercase; }
        .role-economic { color: #eab308; font-weight: bold; font-size: 14px; text-transform: uppercase; }
        .role-military { color: #ef4444; font-weight: bold; font-size: 14px; text-transform: uppercase; }
        .role-secret { color: #a855f7; font-weight: bold; font-size: 14px; text-transform: uppercase; }
        .game-popup-desc { font-size: 14px; color: #cbd5e1; display: block; margin-top: 6px; line-height: 1.4; }
        .game-popup-status { color: #f87171; font-size: 12px; font-weight: bold; display: block; margin-top: 4px; }

        .leaflet-zoom-animated, .leaflet-pane {
            will-change: transform, opacity; transform-style: preserve-3d; backface-visibility: hidden;
        }
    </style>
</head>
<body>
    <!-- গেমপ্লে রিসোর্স ট্র্যাকার টপ বার -->
    <div id="resource-bar">
        <div class="res-item"><span class="res-icon">💵</span><span id="res-cash">1.0M</span> <span class="res-gain" id="rate-cash">+100/s</span></div>
        <div class="res-item"><span class="res-icon">🛢️</span><span id="res-oil">50K</span> <span class="res-gain" id="rate-oil">+10/s</span></div>
        <div class="res-item"><span class="res-icon">🧱</span><span id="res-steel">10K</span> <span class="res-gain" id="rate-steel">+5/s</span></div>
        <div class="res-item"><span class="res-icon">☢️</span><span id="res-uranium">100</span> <span class="res-gain" id="rate-uranium">+0/s</span></div>
        <div class="res-item"><span class="res-icon">🎖️</span><span id="res-manpower">150K</span> <span class="res-gain" id="rate-manpower">+50/s</span></div>
    </div>

    <div id="map"></div>

    <script src="./leaflet.js"></script>
    <script src="./map-engine-1.js"></script>
    <script src="./map-engine-2.js"></script>
</body>
    </html>
