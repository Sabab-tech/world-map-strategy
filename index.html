<!DOCTYPE html>
<html>
<head>
    <title>Perfect Grand Strategy Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; }
        #map { height: 100vh; width: 100%; background: #000; }
        
        /* দেশের নামগুলোর প্রিমিয়াম স্টাইল */
        .country-label {
            background: none !important;
            border: none !important;
            box-shadow: none !important;
            color: rgba(255, 255, 255, 0.85);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 11px;
            font-weight: bold;
            text-shadow: 0px 2px 4px #000, 0px -1px 2px #000;
            white-space: nowrap;
            pointer-events: none;
        }

        /* হার্ডওয়্যার লেভেলে বর্ডারের কাঁপুনি বন্ধ করার জন্য জিপিইউ এক্সিলারেশন */
        .leaflet-zoom-animated, .leaflet-pane {
            will-change: transform, opacity;
            transform-style: preserve-3d;
            backface-visibility: hidden;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // বর্ডারকে মাটির সাথে সিমেন্ট দিয়ে জাম করার জন্য আল্ট্রা-স্মুথ ক্যানভাস রেন্ডারার
        var ultimateRenderer = L.canvas({ 
            padding: 0.1,
            tolerance: 1 // লাইনের শার্পনেস সর্বোচ্চ রাখার জন্য
        });

        var map = L.map('map', { 
            zoomControl: false,
            minZoom: 2,  
            maxZoom: 9,
            zoomSnap: 1,      // নির্দিষ্ট লেভেলে লক থাকবে
            zoomDelta: 1,     // ইচ্ছামতো জুম হয়ে লাফাবে না
            trackResize: false,
            inertia: false,   // ম্যাপ ড্রাগ করার পর পিছলে যাবে locks position
            renderer: ultimateRenderer // ক্যানভাস ইঞ্জিন অ্যাক্টিভেট করা হলো
        }).setView([20, 0], 2);

        // হাই-রেজোলিউশন স্যাটেলাইট বেস লেয়ার (ইসরো/ইএসআরআই স্ট্যান্ডার্ড)
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Strategy Map',
            maxNativeZoom: 19, // ১৯ লেভেলের ক্রিস্প ডেটা টেনে আনবে, ফলে ম্যাপ কখনো ঝাপসা হবে না
            keepBuffer: 4,     // চারপাশের ৪ লেয়ার আগে থেকেই লোড রাখবে
            updateWhenIdle: true
        }).addTo(map);

        // জেসন ডেটা লোড এবং আগের সব নিয়মের বাস্তবায়ন
        fetch('https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson')
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, {
                    // নিয়ম ১: শুধুমাত্র জাতিসংঘ স্বীকৃত দেশ থাকবে (অপ্রয়োজনীয় দেশ বাদ)
                    filter: function(feature) {
                        var name = feature.properties.ADMIN;
                        var code = feature.properties.ISO_A3;
                        return code !== "-99" && name !== "Somaliland" && name !== "Western Sahara";
                    },
                    // নিয়ম ২: বর্ডার হালকা সাদা ও নিখুঁত চিকন হবে
                    style: {
                        color: "#ffffff",
                        weight: 1.0,      // একদম সূক্ষ্ম ১ পিক্সেল বর্ডার
                        opacity: 0.4,       // হালকা সাদা নিয়ন লুক
                        fillOpacity: 0
                    },
                    // নিয়ম ৩: বাহরাইন, মালদ্বীপসহ সব দেশের নাম থাকবে
                    onEachFeature: function(feature, layer) {
                        var countryName = feature.properties.ADMIN;
                        
                        if (layer.getBounds) {
                            // নিখুঁত কেন্দ্রবিন্দু হিসাব করে নাম বসানো
                            layer.bindTooltip(countryName, {
                                permanent: true,
                                direction: 'center',
                                className: 'country-label',
                                opacity: 0.85
                            }).openTooltip();
                        }
                    }
                }).addTo(map);
            });
    </script>
</body>
</html>
