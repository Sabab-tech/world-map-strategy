<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- ১. আপনার ব্রাউজার ট্যাবের নাম সেট করা হলো -->
    <title>Global Map - V30 Ultimate Player Mechanics</title>
    
    <!-- OpenLayers এর অফিশিয়াল লাইব্রেরি লিংক -->
    <link rel="stylesheet" href="https://jsdelivr.net">
    <script src="https://jsdelivr.net"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #0b1d33; overflow: hidden; }
        #map { width: 100%; height: 100%; }
    </style>
</head>
<body>

    <!-- গেমের মূল ওপেনলেয়ার্স ম্যাপ কন্টেইনার -->
    <div id="map"></div>

    <script>
        // ২. ৩ডি টেক্সট স্টাইল ফাংশন (যা ২য় ছবির মতো বোল্ড, বর্ডার ও শ্যাডো তৈরি করবে)
        function create3DTextStyle(name, isCapital = false) {
            return new ol.style.Text({
                text: name.toUpperCase(),
                font: isCapital ? 'bold 15px "Impact", "Arial Black", sans-serif' : 'bold 11px "Impact", "Arial Black", sans-serif',
                fill: new ol.style.Fill({
                    color: isCapital ? '#FFD700' : '#FFFFFF' // রাজধানী গোল্ডেন, অন্যান্য শহর সাদা
                }),
                // ২য় ছবির মতো নিখুঁত কালো বর্ডার (আউটলাইন)
                stroke: new ol.style.Stroke({
                    color: '#000000',
                    width: 3
                }),
                // ল্যাগ ফ্রি জিপিইউ এক্সিলারেটেড পজিশনিং
                offsetX: 2,
                offsetY: 3,
                placement: 'point',
                overflow: false
            });
        }

        // ৩. ন্যাচারাল আর্থ GeoJSON ডাটা লেয়ার তৈরি (আপনার প্রজেক্টের ডাটাবেজ কানেকশন)
        const countrySource = new ol.source.Vector({
            // এখানে Natural Earth এর GeoJSON ফাইলটি লোড হবে
            url: 'https://githubusercontent.com',
            format: new ol.format.GeoJSON()
        });

        // ৪. ম্যাপের প্রতিটি দেশের ওপর নাম এবং স্টাইল রেন্ডার করার মেকানিজম
        const countryLayer = new ol.layer.Vector({
            source: countrySource,
            style: function(feature) {
                // GeoJSON থেকে দেশের নাম তুলে আনা
                const countryName = feature.get('NAME') || feature.get('name') || '';
                
                // গেমের স্টাইল রুলস
                const isCapitalCountry = ["Saudi Arabia", "Bangladesh", "Egypt", "Turkey", "USA", "Russia"].includes(countryName);

                return new ol.style.Style({
                    // ম্যাপের ব্যাকগ্রাউন্ড বর্ডার বা ফিল স্টাইল (আপনার বর্তমান গেমের থিম অনুযায়ী থাকবে)
                    stroke: new ol.style.Stroke({
                        color: 'rgba(255, 255, 255, 0.2)',
                        width: 1
                    }),
                    // এখানে ৩ডি টেক্সট ইনজেক্ট করা হচ্ছে
                    text: create3DTextStyle(countryName, isCapitalCountry)
                });
            }
        });

        // ৫. গেমের ম্যাপ ভিউ এবং ইনিশিয়ালাইজেশন
        const map = new ol.Map({
            target: 'map',
            layers: [
                // নিচে আপনার বেসম্যাপ লেয়ার (যদি থাকে) এবং ওপরে আমাদের ৩ডি কান্ট্রি লেয়ার
                countryLayer
            ],
            view: new ol.View({
                center: ol.proj.fromLonLat([45, 25]), // ম্যাপের শুরুর ফোকাস (মিডল ইস্ট কেন্দ্রিক)
                zoom: 3,
                minZoom: 2,
                maxZoom: 8
            })
        });
    </script>
</body>
</html>
