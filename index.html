<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Modern Age 3 - Tactical Interactive Map</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/openlayers/8.2.0/dist/ol.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/openlayers/8.2.0/ol.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html, #map { width: 100%; height: 100%; overflow: hidden; background-color: #0b1521; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(registrations => {
                for (let r of registrations) { r.unregister(); }
            });
        }

        // ম্যাপের সাধারণ বর্ডার এবং টেক্সট স্টাইল ফাংশন
        function countryStyle(feature, resolution) {
            const name = feature.get('ADMIN') || feature.get('name') || '';
            const zoom = Math.log2(156543.03392 / resolution);

            // ১. ফালতু অঞ্চল ও দ্বীপ ব্লক লিস্ট (মুছে ফেলা হলো)
            const blacklist = ["British Indian Ocean Territory", "Christmas Island", "Cocos Islands", "Niue", "Tokelau", "Palestine", "Western Sahara"];
            if (blacklist.includes(name)) return null;

            // বর্ডার স্টাইল (স্বাভাবিক হালকা সাদা রঙ)
            const borderStyle = new ol.style.Stroke({ color: 'rgba(255, 255, 255, 0.4)', width: 1.2 });

            // ২. নামের ফিল্টার ও সংক্ষেপন
            let displayName = name;
            if (name === "Democratic Republic of the Congo") displayName = "DR CONGO";
            else if (name === "United Kingdom") displayName = "UK";
            else if (name === "United States of America") displayName = "USA";

            // কড়া জুম লজিক: জুম ৬.০ এর নিচে ছোট দেশের নাম দেখাবে না
            const smallOnes = ["Luxembourg", "Liechtenstein", "Singapore", "Fiji", "Vanuatu", "Solomon Islands", "Marshall Islands", "Qatar", "Kuwait", "Lebanon"];
            if (zoom < 6.0 && smallOnes.includes(name)) {
                return new ol.style.Style({ stroke: borderStyle });
            }

            // হলিউড স্টাইল খাড়া ফন্ট সাইজ
            let fontSize = 12 + (zoom - 3.8) * 3;
            if (fontSize > 24) fontSize = 24;
            if (fontSize < 11) fontSize = 11;

            return new ol.style.Style({
                stroke: borderStyle,
                text: new ol.style.Text({
                    text: displayName.toUpperCase(),
                    font: `900 ${fontSize}px "Impact", "Arial Black", sans-serif`,
                    fill: new ol.style.Fill({ color: '#ffffff' }),
                    stroke: new ol.style.Stroke({ color: '#000000', width: 4 }),
                    placement: 'point',
                    textAlign: 'center',
                    textBaseline: 'middle',
                    overflow: false
                })
            });
        }

        // ৩. দেশে টাচ/ক্লিক করলে হাইলাইট হওয়ার বিশেষ স্টাইল
        function selectStyle(feature, resolution) {
            const name = feature.get('ADMIN') || feature.get('name') || '';
            const zoom = Math.log2(156543.03392 / resolution);

            let displayName = name;
            if (name === "Democratic Republic of the Congo") displayName = "DR CONGO";
            else if (name === "United Kingdom") displayName = "UK";
            else if (name === "United States of America") displayName = "USA";

            let fontSize = 12 + (zoom - 3.8) * 3;
            if (fontSize > 24) fontSize = 24;

            return new ol.style.Style({
                // ক্লিক করা দেশটিতে হালকা সাদা আভা (شفاف) দিয়ে পূর্ণ করা হবে
                fill: new ol.style.Fill({ color: 'rgba(255, 255, 255, 0.25)' }),
                // বর্ডার আরও লাইট এবং মোটা হবে (৩ পিক্সেল)
                stroke: new ol.style.Stroke({ color: '#ffffff', width: 2.5 }),
                text: new ol.style.Text({
                    text: displayName.toUpperCase(),
                    font: `900 ${fontSize}px "Impact", "Arial Black", sans-serif`,
                    fill: new ol.style.Fill({ color: '#ffff00' }), // হাইলাইট দেশের নাম হালকা হলুদ হবে যেন আলাদা চেনা যায়
                    stroke: new ol.style.Stroke({ color: '#000000', width: 4.5 }),
                    placement: 'point',
                    textAlign: 'center',
                    textBaseline: 'middle'
                })
            });
        }

        const vectorLayer = new ol.layer.Vector({
            declutter: true,
            source: new ol.source.Vector({
                url: 'https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson',
                format: new ol.format.GeoJSON()
            }),
            style: countryStyle
        });

        const map = new ol.Map({
            target: 'map',
            layers: [
                new ol.layer.Tile({ 
                    source: new ol.source.XYZ({ url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}' }) 
                }),
                vectorLayer
            ],
            view: new ol.View({ center: ol.proj.fromLonLat([25.0, 42.0]), zoom: 3.8, minZoom: 3.8, maxZoom: 8.5, enableRotation: false }),
            controls: []
        });

        // ৪. ইন্টারঅ্যাক্টিভ ক্লিক অ্যান্ড টাচ সিস্টেম যুক্ত করা
        const selectInteraction = new ol.interaction.Select({
            style: selectStyle,
            layers: [vectorLayer]
        });
        map.addInteraction(selectInteraction);
    </script>
</body>
</html>
