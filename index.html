<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>এশিয়ান জিওপলিტიკ্যাল স্ট্র্যাটেজি ম্যাপ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body, html {
            width: 100%;
            height: 100%;
            background-color: #0d1117;
            overflow: hidden;
        }
        #map {
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        /* Dashboard Control UI */
        .control-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(13, 17, 23, 0.95);
            border: 2px solid #30363d;
            border-radius: 8px;
            padding: 15px;
            z-index: 1000;
            color: #c9d1d9;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            max-width: 280px;
        }
        .control-panel h3 {
            margin-bottom: 12px;
            color: #58a6ff;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #30363d;
            padding-bottom: 5px;
        }
        .layer-btn {
            display: flex;
            align-items: center;
            width: 100%;
            padding: 8px 12px;
            margin: 5px 0;
            background: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s ease;
            text-align: left;
        }
        .layer-btn:hover {
            background: #30363d;
            border-color: #8b949e;
        }
        .layer-btn.active {
            background: #1f6feb;
            border-color: #58a6ff;
            color: #ffffff;
            font-weight: bold;
        }
        .layer-btn span {
            margin-right: 10px;
            font-size: 16px;
        }
        /* Custom Popup Styling */
        .leaflet-popup-content-wrapper {
            background: #161b22 !important;
            color: #c9d1d9 !important;
            border: 1px solid #30363d;
            border-radius: 6px;
        }
        .leaflet-popup-tip {
            background: #161b22 !important;
        }
        .popup-title {
            font-weight: bold;
            color: #58a6ff;
            font-size: 14px;
            margin-bottom: 4px;
        }
        .popup-meta {
            font-size: 11px;
            color: #8b949e;
            text-transform: uppercase;
        }
        .popup-status {
            display: inline-block;
            margin-top: 5px;
            padding: 2px 6px;
            font-size: 10px;
            border-radius: 4px;
            font-weight: bold;
        }
        .status-unlocked { background: #238636; color: white; }
        .status-locked { background: #da3633; color: white; }
    </style>
</head>
<body>

    <div class="control-panel">
        <h3>Power Grid Layers</h3>
        <button class="layer-btn active" onclick="filterLayer('all', this)"><span>🌐</span> All Nodes</button>
        <button class="layer-btn" onclick="filterLayer('capital', this)"><span>🏛️</span> Political Control</button>
        <button class="layer-btn" onclick="filterLayer('economic_hub', this)"><span>💰</span> Economic Trade Grid</button>
        <button class="layer-btn" onclick="filterLayer('military_hub', this)"><span>🪖</span> Military Command</button>
        <button class="layer-btn" onclick="filterLayer('secret_zone', this)"><span>🔒</span> Intel / Secret Zones</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // ===== FORCE CACHE BREAKING LOGIC =====
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(registrations => {
                for(let registration of registrations) {
                    registration.unregister();
                }
            });
        }
        if ('caches' in window) {
            caches.keys().then(names => {
                for (let name of names) caches.delete(name);
            });
        }

        // ম্যাপ ইনিশিয়ালাইজেশন (ডার্ক থিম)
        const map = L.map('map', {
            center: [22.0, 90.0], 
            zoom: 4,
            minZoom: 3,
            maxZoom: 7
        });

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO'
        }).addTo(map);

        let allMarkers = [];
        let currentFilter = 'all';

        function getMarkerStyle(role, status) {
            if (status === 'locked') return { color: '#555555', fillColor: '#222222', radius: 6 };
            switch(role) {
                case 'capital': return { color: '#ff5555', fillColor: '#ff0000', radius: 10 };
                case 'economic_hub': return { color: '#55ff55', fillColor: '#00cc00', radius: 8 };
                case 'military_hub': return { color: '#5555ff', fillColor: '#0000ff', radius: 8 };
                case 'secret_zone': return { color: '#ffff55', fillColor: '#cccc00', radius: 7 };
                default: return { color: '#ffffff', fillColor: '#888888', radius: 6 };
            }
        }

        function getEmoji(role) {
            switch(role) {
                case 'capital': return '🏛️';
                case 'economic_hub': return '💰';
                case 'military_hub': return '🪖';
                case 'secret_zone': return '🔒';
                default: return '🏙️';
            }
        }

        const countryCoords = {
            "Bangladesh": [23.6850, 90.3563], "India": [20.5937, 78.9629], "Pakistan": [30.3753, 69.3451],
            "Nepal": [28.3949, 84.1240], "Sri Lanka": [7.8731, 80.7718], "Bhutan": [27.5142, 90.4336],
            "Maldives": [3.2028, 73.2207], "Afghanistan": [33.9391, 67.7100], "Indonesia": [-0.7893, 113.9213],
            "Vietnam": [14.0583, 108.2772], "Thailand": [15.8700, 100.9925], "Malaysia": [4.2105, 101.9758],
            "Singapore": [1.3521, 103.8198], "Philippines": [12.8797, 121.7740], "Myanmar": [21.9162, 95.9560],
            "Cambodia": [12.5657, 104.9910], "Laos": [19.8563, 102.4955], "Brunei": [4.5353, 114.7277],
            "Timor-Leste": [-8.8742, 125.7275], "China": [35.8617, 104.1954], "Japan": [36.2048, 138.2529],
            "South Korea": [35.9078, 127.7669], "North Korea": [40.3399, 127.5101], "Mongolia": [46.8625, 103.8467],
            "Taiwan": [23.6978, 120.9605], "Iran": [32.4279, 53.6880], "Saudi Arabia": [23.8859, 45.0792],
            "Turkey": [38.9637, 35.2433]
        };

        // ডাইনামিক লাইভ ডাটা ফেচিং এবং রেন্ডারিং লজিক
        fetch('./cities.json?cb=' + new Date().getTime())
            .then(response => response.json())
            .then(data => {
                // ফাইল সরাসরি বা .regions অবজেক্টের ভেতর থেকে ডেটা নেওয়ার সুরক্ষাকবচ
                const rootData = data.regions ? data.regions : data;
                
                for (let region in rootData) {
                    if (region === 'game_world') continue; 
                    const countries = rootData[region].countries;
                    if (!countries) continue;

                    for (let countryName in countries) {
                        const locations = countries[countryName].locations;
                        const baseCoord = countryCoords[countryName] || [20, 77];

                        locations.forEach((loc, index) => {
                            const latOffset = (index % 3 - 1) * 1.3;
                            const lngOffset = (Math.floor(index / 3) - 1) * 1.3;
                            const finalCoord = [baseCoord[0] + latOffset, baseCoord[1] + lngOffset];

                            const style = getMarkerStyle(loc.role, loc.status);
                            const marker = L.circleMarker(finalCoord, {
                                radius: style.radius,
                                fillColor: style.fillColor,
                                color: style.color,
                                weight: 2,
                                opacity: 1,
                                fillOpacity: 0.8
                            });

                            let popupContent = `
                                <div class="popup-title">${getEmoji(loc.role)} ${loc.name}</div>
                                <div class="popup-meta">দেশ: ${countryName}</div>
                                <div class="popup-meta">ক্যাটাগরি: ${loc.role.replace('_', ' ')}</div>
                            `;

                            if(loc.status === 'locked') {
                                popupContent += `
                                    <div class="popup-status status-locked">🔒 LOCKED</div>
                                    <div class="popup-meta" style="margin-top:5px; color:#ff7b72;">Unlock: ${loc.unlock_condition}</div>
                                `;
                            } else {
                                popupContent += `<div class="popup-status status-unlocked">🟢 ACTIVE NODE</div>`;
                            }

                            marker.bindPopup(popupContent);
                            marker.gameData = { role: loc.role, status: loc.status };
                            marker.
