<!DOCTYPE html>
<html>
<head>
    <title>Fixed World Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }
        /* বর্ডার লেয়ারটিকে ম্যাপের মাটির সাথে আটকে রাখার জন্য */
        .leaflet-tile-pane { z-index: 2; }
        .leaflet-overlay-pane { z-index: 3; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map', { 
            zoomControl: false,
            minZoom: 2,  
            maxZoom: 10,
            zoomAnimation: false, // নড়াচড়া কমানোর জন্য অ্যানিমেশন বন্ধ
            fadeAnimation: false 
        }).setView([20, 0], 2);

        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Satellite Map'
        }).addTo(map);

        fetch('https://raw.githubusercontent.com/johan/world.geo.json/master/countries.geo.json')
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, {
                    style: {
                        color: "#ffffff",
                        weight: 1.5, // সামান্য পুরুত্ব বাড়ানো হলো যাতে স্থির থাকে
                        opacity: 0.6,
                        fillOpacity: 0
                    },
                    // এটি বর্ডারকে ম্যাপ টাইলসের সাথে শক্তভাবে লক করে রাখবে
                    pane: 'overlayPane' 
                }).addTo(map);
            });
    </script>
</body>
</html>
