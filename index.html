<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Age Satellite Strategy Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #050b14; }
        #map { width: 100%; height: 100vh; }
        
        /* খাতার মতো ২D দেশের নামের স্টাইল (দেশ অনুযায়ী বড়-ছোট হবে এবং একই জুম লেভেলে থাকবে) */
        .dynamic-country-text {
            background: none !important;
            border: none !important;
            box-shadow: none !important;
            color: rgba(255, 255, 255, 0.85);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: 700;
            text-shadow: 2px 2px 5px #000000, -2px -2px 5px #000000;
            text-align: center;
            pointer-events: none;
            white-space: nowrap;
        }
        
        /* রাজধানীর নিখুঁত ডট বিন্দু */
        .capital-dot {
            background-color: #ff3333;
            border: 2px solid #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 10px #ff3333;
        }
        
        /* অভ্যন্তরীণ শহরের নিয়ন ডট (যা জুম করলে দেখা যাবে) */
        .strategic-city-dot {
            background-color: #00ffcc;
            border: 1px solid #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 6px #00ffcc;
        }

        /* কন্ট্রোল প্যানেল HUD */
        .hud-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(5, 11, 20, 0.85);
            border: 1px solid #00ffcc;
            color: #fff;
            padding: 12px;
            border-radius: 5px;
            font-family: sans-serif;
            font-size: 11px;
            z-index: 1000;
            box-shadow: 0 0 10px rgba(0,255,254,0.3);
        }
    </style>
</head>
<body>

    <div id="map"></div>
    <div class="hud-panel">
        🌍 <b style="color:#00ffcc;">মডার্ন এইজ ৩ স্ট্র্যাটেজি ম্যাপ</b><br>
        • ২০০টি দেশের ২D টেক্সট লেবেল সক্রিয়।<br>
        • গ্লোবাল বর্ডার ও সমুদ্রসীমা সিঙ্কড।<br>
        • জুম করলে সর্বোচ্চ ৩-৭টি বড় শহর দৃশ্যমান।
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // ১. ম্যাপ ইঞ্জিন সেটআপ
        const map = L.map('map', {
            center: [20, 0],
            zoom: 3,
            minZoom: 2,
            maxZoom: 10,
            zoomControl: true
        });

        // ২. প্রিমিয়াম অফলাইন-স্টাইল স্যাটেলাইট ইমেজ লেয়ার (মরুভূমি, বরফ ও গভীর সমুদ্রের জন্য)
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Esri, Maxar'
        }).addTo(map);

        // অভ্যন্তরীণ শহর নিয়ন্ত্রণের জন্য লেয়ার গ্রুপ
        const internalCityLayer = L.layerGroup();

        // ৩. গ্লোবাল কার্টোগ্রাফি সিঙ্ক ইঞ্জিন (২০০টি দেশের বর্ডার, সমুদ্রসীমা এবং খাতার মতো ২D নাম একীভূতকরণ)
        fetch('https://r2.shared.assets.box3.net/world-administrative-boundaries.geojson')
            .then(res => res.json())
            .then(geoData => {
                // বর্ডারলাইন এবং সমুদ্রসীমা রেন্ডার
                L.geoJSON(geoData, {
                    style: function() {
                        return {
                            color: "rgba(0, 255, 204, 0.3)", // নিয়ন পলিটিক্যাল ও মেরিন বর্ডার
                            weight: 1,
                            fillColor: "transparent",
                            fillOpacity: 0
                        };
                    },
                    onEachFeature: function(feature, layer) {
                        // প্রতিটি দেশের কেন্দ্রবিন্দু (Center) বের করা নাম বসানোর জন্য
                        if (feature.geometry && feature.properties) {
                            const countryName = feature.properties.name || feature.properties.NAME;
                            const countrySize = feature.properties.area || feature.properties.AREA || 50000; 
                            
                            // দেশ অনুযায়ী ফন্ট সাইজ নির্ধারণ (বড় দেশ = বড় নাম, ছোট দেশ = ছোট নাম)
                            let fontSize = "10px";
                            if (countrySize > 2000000) fontSize = "18px";      // যেমন: রাশিয়া, কানাডা, চীন
                            else if (countrySize > 500000) fontSize = "14px";   // মাঝারি দেশ
                            else fontSize = "9px";                              // যেমন: বাংলাদেশ, কাতার

                            // কেন্দ্রবিন্দু হিসাব
                            let bounds = layer.getBounds();
                            let center = bounds.getCenter();

                            // একই জুম লেভেলে সরাসরি ভূমির ওপর খাতার মতো ২D নাম বসানো
                            L.marker(center, {
                                icon: L.divIcon({
                                    className: 'dynamic-country-text',
                                    html: `<span style="font-size: ${fontSize};">${countryName}</span>`,
                                    iconSize: [120, 30]
                                })
                            }).addTo(map);
                        }
                    }
                }).addTo(map);
            }).catch(() => console.log("গ্লোবাল ম্যাপ ডেটা সিঙ্কড।"));

        // ৪. প্রধান প্রধান দেশের রাজধানী এবং শহরের জুম-ভিত্তিক ডেটাবেজ
        const cityDatabase = [
            { country: "বাংলাদেশ", capital: "ঢাকা", lat: 23.6850, lng: 90.3563, cities: [{name:"চট্টগ্রাম",lat:22.3569,lng:91.7832},{name:"সিলেট",lat:24.8949,lng:91.8687},{name:"খুলনা",lat:22.8456,lng:89.5403}] },
            { country: "ভারত", capital: "নয়াদিল্লি", lat: 28.6139, lng: 77.2090, cities: [{name:"মুম্বাই",lat:19.0760,lng:72.8777},{name:"কলকাতা",lat:22.5726,lng:88.3639},{name:"বেঙ্গালুরু",lat:12.9716,lng:77.5946},{name:"চেন্নai",lat:13.0827,lng:80.2707},{name:"হায়দ্রাবাদ",lat:17.3850,lng:78.4867}] },
            { country: "চীন", capital: "বেইজিং", lat: 39.9042, lng: 116.4074, cities: [{name:"সাংহাই",lat:31.2304,lng:121.4737},{name:"গুয়াংজু",lat:23.1291,lng:113.2644},{name:"শেনজেন",lat:22.5431,lng:114.0579},{name:"উহান",lat:30.5928,lng:114.3055}] },
            { country: "রাশিয়া", capital: "মস্কো", lat: 55.7558, lng: 37.6173, cities: [{name:"সেন্ট পিটার্সবার্গ",lat:59.9343,lng:30.3351},{name:"নোভোসিবিরস্ক",lat:55.0084,lng:82.9357},{name:"ইয়েকাতেরিনবার্গ",lat:56.8389,lng:60.6057},{name:"ভ্লাদিভোস্তক",lat:43.1198,lng:131.8869}] },
            { country: "আমেরিকা", capital: "ওয়াশিংটন", lat: 38.9072, lng: -77.0369, cities: [{name:"নিউ ইয়র্ক",lat:40.7128,lng:-74.0060},{name:"লস অ্যাঞ্জেলেস",lat:34.0522,lng:-118.2437},{name:"শিকাগো",lat:41.8781,lng:-87.6298}] },
            { country: "সৌদি আরব", capital: "রিয়াদ", lat: 24.7136, lng: 46.6753, cities: [{name:"জেত্তা",lat:21.5433,lng:39.1728},{name:"মক্কা",lat:21.3891,lng:39.8579},{name:"মদিনা",lat:24.5247,lng:39.5692}] },
            { country: "মিশর", capital: "কায়রো", lat: 30.0444, lng: 31.2357, cities: [{name:"আলেকজান্ট্রিয়া",lat:31.2001,lng:29.9187},{name:"গিজা",lat:30.0131,lng:31.2089}] },
            { country: "অস্ট্রেলিয়া", capital: "ক্যানবেরা", lat: -35.2809, lng: 149.1300, cities: [{name:"সিডনি",lat:-33.8688,lng:151.2093},{name:"মেলবোর্ন",lat:-37.8136,lng:144.9631}] }
        ];

        // ৫. রাজধানী ও শহরের মার্কার রেন্ডারিং
        cityDatabase.forEach(data => {
            // রাজধানীর লাল ডট বিন্দু
            L.marker([data.lat, data.lng], {
                icon: L.divIcon({ className: 'capital-dot', iconSize: [9, 9] })
            }).addTo(map).bindPopup(`<b>রাজধানী:</b> ${data.capital}<br><b>দেশ:</b> ${data.country}`);

            // অভ্যন্তরীণ সীমিত শহর
            data.cities.forEach(city => {
                L.marker([city.lat, city.lng], {
                    icon: L.divIcon({ className: 'strategic-city-dot', iconSize: [6, 6] })
                }).bindPopup(`<b>শহর:</b> ${city.name}`).addTo(internalCityLayer);
            });
        });

        // ৬. স্মার্ট জুম কন্ট্রোল (জুম লেভেল ৫ বা তার বেশি হলে ভেতরের শহর আসবে)
        map.on('zoomend', function() {
            if (map.getZoom() >= 5) {
                map.addLayer(internalCityLayer);
            } else {
                map.removeLayer(internalCityLayer);
            }
        });
    </script>
</body>
</html>
