<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Age 3 - Tactical Strategy Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #050b14; }
        #map { width: 100%; height: 100vh; }
        
        /* খাতার মতো ২D দেশের নামের ডিজাইন */
        .dynamic-country-text {
            background: none !important;
            border: none !important;
            box-shadow: none !important;
            color: rgba(255, 255, 255, 0.9);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: 700;
            text-shadow: 2px 2px 5px #000000, -2px -2px 5px #000000;
            text-align: center;
            pointer-events: none;
            white-space: nowrap;
        }
        
        /* রাজধানীর নিখুঁত লাল ডট বিন্দু */
        .capital-dot {
            background-color: #ff3333;
            border: 2px solid #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 10px #ff3333;
        }
        
        /* অভ্যন্তরীণ শহরের নিয়ন ডট */
        .strategic-city-dot {
            background-color: #00ffcc;
            border: 1px solid #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 6px #00ffcc;
        }

        /* কন্ট্রোল প্যানেল HUD */
        .hud-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(5, 11, 20, 0.9);
            border: 1px solid #00ffcc;
            color: #fff;
            padding: 12px;
            border-radius: 5px;
            font-family: sans-serif;
            font-size: 11px;
            z-index: 1000;
            box-shadow: 0 0 10px rgba(0,255,254,0.3);
        }
    </style>
</head>
<body>

    <div id="map"></div>
    <div class="hud-panel">
        🇵🇸 <b style="color:#00ffcc;">মডার্ন এইজ ৩: ট্যাকটিক্যাল জোন</b><br>
        • জুম লেভেল ৩ থেকে ৫-এর মধ্যে চিরতরে লকড।<br>
        • রাস্তা, গলি এবং অতিরিক্ত ঝামেলার লেয়ার নিষ্ক্রিয়।<br>
        • ফিলিস্তিন ও রাজধানী জেরুজালেম অন্তর্ভুক্ত।
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // ১. ম্যাপ ইঞ্জিন সেটআপ এবং জুম লেভেল কঠোরভাবে লক (Min: 3, Max: 5)
        const map = L.map('map', {
            center: [31.5, 34.5], // ফিলিস্তিন ও মধ্যপ্রাচ্য ফোকাসড শুরুর লোকেশন
            zoom: 4,
            minZoom: 3,
            maxZoom: 5, // এর বেশি জুম করা যাবে না, ফলে রাস্তা দেখা যাবে না
            zoomControl: true
        });

        // ২. স্থায়ী স্যাটেলাইট ইমেজ লেয়ার (যা কখনো সাদা রাস্তায় পরিবর্তন হবে pointers বা জুমের কারণে)
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Esri, Maxar'
        }).addTo(map);

        // ৩. ২০০টি দেশের ২D সীমানা ও জলসীমা প্রসেসিং ইঞ্জিন
        fetch('https://r2.shared.assets.box3.net/world-administrative-boundaries.geojson')
            .then(res => res.json())
            .then(geoData => {
                L.geoJSON(geoData, {
                    style: function() {
                        return {
                            color: "rgba(0, 255, 204, 0.25)", // হালকা নিয়ন বর্ডার
                            weight: 1,
                            fillColor: "transparent",
                            fillOpacity: 0
                        };
                    },
                    onEachFeature: function(feature, layer) {
                        if (feature.geometry && feature.properties) {
                            const countryName = feature.properties.name || feature.properties.NAME;
                            const countrySize = feature.properties.area || feature.properties.AREA || 50000; 
                            
                            let fontSize = "10px";
                            if (countrySize > 2000000) fontSize = "16px";
                            else if (countrySize > 500000) fontSize = "13px";
                            else fontSize = "9px";

                            let bounds = layer.getBounds();
                            let center = bounds.getCenter();

                            // একই লেভেলে খাতার মতো ২D নাম রেন্ডার
                            L.marker(center, {
                                icon: L.divIcon({
                                    className: 'dynamic-country-text',
                                    html: `<span style="font-size: ${fontSize};">${countryName}</span>`,
                                    iconSize: [120, 30]
                                })
                            }).addTo(map);
                        }
                    }
                }).addTo(map);
            }).catch(() => console.log("বর্ডার লোড সম্পূর্ণ।"));

        // ৪. স্ট্র্যাটেজিক দেশের রাজধানী এবং শহরের ডেটাবেজ (ফিলিস্তিনসহ)
        const strategicDatabase = [
            { country: "ফিলিস্তিন (Palestine)", capital: "জেরুজালেম", lat: 31.7683, lng: 35.2137, cities: [{name:"গাজা",lat:31.5016,lng:34.4668},{name:"হেব্রন",lat:31.5298,lng:35.0998}] },
            { country: "বাংলাদেশ", capital: "ঢাকা", lat: 23.6850, lng: 90.3563, cities: [{name:"চট্টগ্রাম",lat:22.3569,lng:91.7832},{name:"সিলেট",lat:24.8949,lng:91.8687}] },
            { country: "মিশর", capital: "কায়রো", lat: 30.0444, lng: 31.2357, cities: [{name:"আলেকজান্ট্রিয়া",lat:31.2001,lng:29.9187}] },
            { country: "সৌদি আরব", capital: "রিয়াদ", lat: 24.7136, lng: 46.6753, cities: [{name:"জেত্তা",lat:21.5433,lng:39.1728},{name:"مक्का",lat:21.3891,lng:39.8579}] },
            { country: "ভারত", capital: "নয়াদিল্লি", lat: 28.6139, lng: 77.2090, cities: [{name:"মুম্বাই",lat:19.0760,lng:72.8777},{name:"কলকাতা",lat:22.5726,lng:88.3639}] },
            { country: "চীন", capital: "বেইজিং", lat: 39.9042, lng: 116.4074, cities: [{name:"সাংহাই",lat:31.2304,lng:121.4737},{name:"गुয়াংজু",lat:23.1291,lng:113.2644}] },
            { country: "রাশিয়া", capital: "মস্কো", lat: 55.7558, lng: 37.6173, cities: [{name:"সেন্ট পিটার্সবার্গ",lat:59.9343,lng:30.3351}] },
            { country: "আমেরিকা", capital: "ওয়াশিংটন", lat: 38.9072, lng: -77.0369, cities: [{name:"নিউ ইয়র্ক",lat:40.7128,lng:-74.0060}] }
        ];

        // ৫. রাজধানী ও শহরের মার্কার রেন্ডারিং
        strategicDatabase.forEach(data => {
            // ভূমির ওপরে ২D ফিলিস্তিন লেবেল ট্যাকটিক্যাল ফিক্স
            if(data.country.includes("ফিলিস্তিন")) {
                L.marker([data.lat + 0.3, data.lng], {
                    icon: L.divIcon({ className: 'dynamic-country-text', html: `<span style="font-size:11px; color:#00ffcc;">ফিলিস্তিন</span>`, iconSize: [100,20] })
                }).addTo(map);
            }

            // রাজধানীর লাল ডট বিন্দু
            L.marker([data.lat, data.lng], {
                icon: L.divIcon({ className: 'capital-dot', iconSize: [9, 9] })
            }).addTo(map).bindPopup(`<b>রাজধানী:</b> ${data.capital}<br><b>দেশ:</b> ${data.country}`);

            // অভ্যন্তরীণ সীমিত শহর
            data.cities.forEach(city => {
                L.marker([city.lat, city.lng], {
                    icon: L.divIcon({ className: 'strategic-city-dot', iconSize: [6, 6] })
                }).bindPopup(`<b>শহর:</b> ${city.name}`).addTo(map);
            });
        });
    </script>
</body>
</html>
