<!DOCTYPE html>
<html>
<head>
    <title>Ultimate 3D Strategy Map Engine</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; }
        #map { height: 100vh; width: 100%; background: #000; }
        
        /* থ্রিডি টাইপ প্রফেশনাল গেম টেক্সট স্টাইল */
        .game-country-label {
            background: none !important;
            border: none !important;
            box-shadow: none !important;
            color: #f1f5f9;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.8px;
            white-space: nowrap;
            pointer-events: none;
            display: block;
            text-align: center;
            
            /* ৩ডি শ্যাডো ইফেক্ট */
            text-shadow: 
                1px 1px 0px #334155,
                2px 2px 0px #1e293b,
                3px 3px 5px rgba(0, 0, 0, 0.9);
        }

        /* জিপিইউ লকিং */
        .leaflet-zoom-animated, .leaflet-pane {
            will-change: transform, opacity;
            transform-style: preserve-3d;
            backface-visibility: hidden;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var ultimateRenderer = L.canvas({ padding: 0.1, tolerance: 5 });
        var bounds = L.latLngBounds(L.latLng(-60, -180), L.latLng(85, 180));

        var map = L.map('map', { 
            zoomControl: false,
            minZoom: 3.8,      
            maxZoom: 9,
            zoomSnap: 0.1,
            zoomDelta: 1,
            maxBounds: bounds, 
            maxBoundsViscosity: 1.0, 
            inertia: false,
            renderer: ultimateRenderer
        }).setView([20, 0], 3.8);

        // স্যাটেলাইট বেস লেয়ার
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Strategy Map',
            maxNativeZoom: 19,
            keepBuffer: 4,
            updateWhenIdle: true
        }).addTo(map);

        var geojsonLayer;
        var selectedLayer = null;
        var renderedCountries = new Set(); 

        // লম্বা বা বাঁকা দেশগুলোর নাম কাত করার জন্য অ্যাঙ্গেল ক্যালকুলেটর
        function calculateTextRotation(bounds) {
            var northEast = bounds.getNorthEast();
            var southWest = bounds.getSouthWest();
            var latDiff = northEast.lat - southWest.lat;
            var lngDiff = northEast.lng - southWest.lng;
            
            if (latDiff > lngDiff * 1.5) {
                var angle = Math.atan2(latDiff, lngDiff) * (180 / Math.PI);
                return (angle > 90) ? angle - 180 : angle - 65; 
            }
            return 0; 
        }

        // জিও-জেসন ডাটা লোড
        fetch('https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson')
            .then(res => res.json())
            .then(data => {
                geojsonLayer = L.geoJSON(data, {
                    // ১. কড়া ফিল্টার: শুধুমাত্র সম্পূর্ণ জাতিসংঘ স্বীকৃত দেশ রাখা হলো
                    filter: function(feature) {
                        var name = feature.properties.ADMIN;
                        var code = feature.properties.ISO_A3;
                        
                        // অ-স্বীকৃত, বিতর্কিত বা অপ্রয়োজনীয় অঞ্চলের তালিকা (সম্পূর্ণ ফিল্টারিং)
                        var excludedCountries = ["Somaliland", "Western Sahara", "Taiwan", "Kosovo", "Northern Cyprus", "South Ossetia", "Abkhazia", "Transnistria"];
                        
                        if (code === "-99" || excludedCountries.includes(name)) {
                            return false; 
                        }
                        return true; 
                    },
                    style: function(feature) {
                        return {
                            color: "#ffffff",
                            weight: map.getZoom() > 5.5 ? 2.3 : 0.9,
                            opacity: 0.4,
                            fillColor: "#ffffff",
                            fillOpacity: 0.01 
                        };
                    },
                    onEachFeature: function(feature, layer) {
                        var countryName = feature.properties.ADMIN;
                        
                        if (layer.getBounds) {
                            var center = layer.getBounds().getCenter();
                            var countryBounds = layer.getBounds();

                            // ২. ডুপ্লিকেট নাম রোধ এবং নাম রেন্ডার নিশ্চিতকরণ
                            if (!renderedCountries.has(countryName)) {
                                renderedCountries.add(countryName);

                                var rotationAngle = calculateTextRotation(countryBounds);

                                // সরাসরি লেবেল মার্কার তৈরি (যা নিশ্চিতভাবে নাম দেখাবে)
                                var labelMarker = L.marker(center, {
                                    icon: L.divIcon({
                                        className: 'game-country-label',
                                        html: `<div style="transform: rotate(${rotationAngle}deg);">${countryName}</div>`,
                                        iconSize: [120, 24],
                                        iconAnchor: [60, 12] // লেখার একদম মাঝখানে এংকর ফিক্স
                                    }),
                                    interactive: false 
                                });

                                // ৩. জুম লেভেল অনুযায়ী ছোট দেশ নিয়ন্ত্রণ
                                var isSmallCountry = (countryBounds.getNorthEast().lat - countryBounds.getSouthWest().lat < 4.5);
                                
                                if (!isSmallCountry || map.getZoom() > 5.2) {
                                    labelMarker.addTo(map);
                                }

                                // জুম ট্র্যাকার
                                map.on('zoomend', function() {
                                    if (isSmallCountry) {
                                        if (map.getZoom() > 5.2) {
                                            if (!map.hasLayer(labelMarker)) labelMarker.addTo(map);
                                        } else {
                                            if (map.hasLayer(labelMarker)) map.removeLayer(labelMarker);
                                        }
                                    }
                                });
                            }

                            // ৪. টাচ ইন্টারঅ্যাকশন (গাঢ় সাদা + হালকা সবুজ আভা)
                            layer.on({
                                click: function(e) {
                                    if (selectedLayer) {
                                        geojsonLayer.resetStyle(selectedLayer);
                                    }

                                    selectedLayer = e.target;
                                    
                                    selectedLayer.setStyle({
                                        color: "#e6fffa", 
                                        weight: map.getZoom() > 5.5 ? 3.5 : 2.5,
                                        opacity: 0.9,
                                        fillColor: "#e6fffa",
                                        fillOpacity: 0.1
                                    });

                                    if (!L.Browser.ie && !L.Browser.opera && !L.Browser.edge) {
                                        selectedLayer.bringToFront();
                                    }
                                }
                            });
                        }
                    }
                }).addTo(map);
            });

        // বর্ডারের বোল্ডনেস জুম অনুযায়ী আপডেট
        map.on('zoomend', function() {
            if (geojsonLayer) {
                var currentZoom = map.getZoom();
                geojsonLayer.eachLayer(function(layer) {
                    if (layer !== selectedLayer) {
                        layer.setStyle({
                            weight: currentZoom > 5.5 ? 2.3 : 0.9
                        });
                    } else {
                        layer.setStyle({
                            weight: currentZoom > 5.5 ? 3.5 : 2.5
                        });
                    }
                });
            }
        });
    </script>
</body>
    </html>
