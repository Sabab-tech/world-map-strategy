<!DOCTYPE html>
<html lang="en" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Age - Tactical Vector Map</title>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #050b14; }
        #map { width: 100vw; height: 100vh; }
        
        /* HUD Control Panel */
        .hud-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(5, 11, 20, 0.9);
            border: 1px solid #3a4d5c;
            color: #8fa0af;
            padding: 12px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 11px;
            z-index: 1000;
            pointer-events: none;
            box-shadow: 0 0 15px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>
    <div id="map"></div>
    
    <div class="hud-panel">
        <b style="color:#fff;">MODERN AGE: WEBGL ENGINE</b><br><br>
        • TEXT: VECTOR-LOCKED (NATIVE)<br>
        • COLLISIONS: AUTO-HIDDEN<br>
        • SCALING: DYNAMIC INTERPOLATION
    </div>

    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <script>
        // 1. Initialize WebGL Map Engine
        const map = new maplibregl.Map({
            container: 'map',
            center: [40.0, 25.0],
            zoom: 3,
            minZoom: 2,
            maxZoom: 7,
            style: {
                version: 8,
                // Required to render text in WebGL without an API key
                glyphs: "https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf",
                sources: {
                    'satellite': {
                        type: 'raster',
                        tiles: ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'],
                        tileSize: 256
                    }
                },
                layers: [{
                    id: 'satellite-base',
                    type: 'raster',
                    source: 'satellite',
                    minzoom: 0,
                    maxzoom: 22
                }]
            }
        });

        map.on('load', () => {
            // 2. Load GeoJSON Database
            map.addSource('countries-data', {
                type: 'geojson',
                data: 'https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson'
            });

            // 3. Render Borders (Attached directly to vectors)
            map.addLayer({
                id: 'country-borders',
                type: 'line',
                source: 'countries-data',
                paint: {
                    'line-color': 'rgba(255, 255, 255, 0.3)',
                    'line-width': 1.2
                }
            });

            // 4. Render Smart Typography
            map.addLayer({
                id: 'country-names',
                type: 'symbol',
                source: 'countries-data',
                layout: {
                    // Format text
                    'text-field': ['to-upper', ['get', 'ADMIN']],
                    'text-font': ['Open Sans Bold'],
                    'text-letter-spacing': 0.15,
                    
                    // Lock to Centroid
                    'symbol-placement': 'point',
                    'text-anchor': 'center',

                    // Collision Detection (Hides overlapping names)
                    'text-allow-overlap': false,
                    'text-ignore-placement': false,
                    'text-padding': 2, // Space required between names

                    // Dynamic Zoom Scaling
                    'text-size': [
                        'interpolate', 
                        ['linear'], ['zoom'],
                        2, 8,   // At zoom 2, font size is 8px
                        5, 18   // At zoom 5, font size is 18px
                    ]
                },
                paint: {
                    // 3D Baked-in Look (Shadow/Glow)
                    'text-color': 'rgba(255, 255, 255, 0.85)',
                    'text-halo-color': 'rgba(0, 0, 0, 0.9)',
                    'text-halo-width': 1.5,
                    'text-halo-blur': 1
                }
            });

            // Tactical Touch: Highlight Country on Click
            map.addLayer({
                id: 'country-highlight',
                type: 'fill',
                source: 'countries-data',
                paint: {
                    'fill-color': '#ffffff',
                    'fill-opacity': ['case', ['boolean', ['feature-state', 'clicked'], false], 0.2, 0]
                }
            });

            let clickedStateId = null;

            map.on('click', 'country-highlight', (e) => {
                if (e.features.length > 0) {
                    if (clickedStateId !== null) {
                        map.setFeatureState({ source: 'countries-data', id: clickedStateId }, { clicked: false });
                    }
                    clickedStateId = e.features[0].id || e.features[0].properties.ADMIN;
                    
                    // Ensure features have an ID for state management
                    e.features[0].id = clickedStateId; 
                    map.setFeatureState({ source: 'countries-data', id: clickedStateId }, { clicked: true });
                }
            });
        });
    </script>
</body>
        </html>
