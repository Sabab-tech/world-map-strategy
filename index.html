<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global Map - Dissolved & Point Layer Architecture V20</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/openlayers/8.2.0/dist/ol.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/openlayers/8.2.0/ol.css">
    <style>body, html, #map { width: 100%; height: 100%; margin: 0; padding: 0; background-color: #0b1521; }</style>
</head>
<body>
    <div id="map"></div>
    <script>
        // বড় নামের সংক্ষেপ রূপ
        const shortNames = {
            "Democratic Republic of the Congo": "DR Congo",
            "Central African Republic": "C.A.R.",
            "Republic of the Congo": "Congo",
            "Equatorial Guinea": "Eq. Guinea",
            "United States of America": "USA",
            "United Kingdom": "UK",
            "Saudi Arabia": "S. Arabia",
            "United Arab Emirates": "UAE",
            "Dominican Republic": "Dominican Rep."
        };

        // ৩ নম্বর সমাধান: ছোট দেশগুলোর জন্য স্পেশাল পয়েন্ট লেয়ার কোঅর্ডিনেটস (যাতে কখনো গায়েব না হয়)
        const microstatesPoints = [
            { name: "Vatican City", coord: [12.4534, 41.9029] },
            { name: "Monaco", coord: [7.4246, 43.7384] },
            { name: "San Marino", coord: [12.4578, 43.9424] },
            { name: "Maldives", coord: [73.5093, 4.1755] },
            { name: "Bahrain", coord: [50.5577, 26.0667] },
            { name: "Singapore", coord: [103.8198, 1.3521] },
            { name: "Malta", coord: [14.3754, 35.9375] },
            { name: "Lebanon", coord: [35.8623, 33.8547] },
            { name: "Fiji", coord: [178.0650, -17.7134] },
            { name: "Bahamas", coord: [-77.3963, 25.0343] },
            { name: "Mauritius", coord: [57.5522, -20.3484] }
        ];

        // ম্যাপের মূল সোর্স (শুরুতে সম্পূর্ণ খালি)
        const vectorSource = new ol.source.Vector({ wrapX: false });

        // ১ ও ৪ নম্বর সমাধান: রানটাইমে Dissolve (একত্রীকরণ) করার লজিক
        fetch('https://cdn.jsdelivr.net/gh/datasets/geo-countries@master/data/countries.geojson')
            .then(res => res.json())
            .then(data => {
                const format = new ol.format.GeoJSON();
                const rawFeatures = format.readFeatures(data, { featureProjection: 'EPSG:3857' });

                // একই দেশের সমস্ত আলাদা পলিগন এক জায়গায় গ্রুপ করা
                const countryGroups = {};
                rawFeatures.forEach(f => {
                    const name = f.get('ADMIN') || f.get('name') || f.get('NAME') || "Unknown";
                    if (!countryGroups[name]) {
                        countryGroups[name] = [];
                    }
                    countryGroups[name].push(f.getGeometry());
                });

                const dissolvedFeatures = [];

                // প্রতি দেশের সব টুকরোকে Dissolve বা Merge করে একটি একক MultiPolygon বানানো
                Object.keys(countryGroups).forEach(name => {
                    const geometries = countryGroups[name];
                    let mergedGeometry;

                    if (geometries.length === 1) {
                        mergedGeometry = geometries[0];
                    } else {
                        // একাধিক পলিগনকে একটি MultiPolygon অবজেক্টে রূপান্তর
                        const polygons = [];
                        geometries.forEach(g => {
                            if (g.getType() === 'Polygon') {
                                polygons.push(g);
                            } else if (g.getType() === 'MultiPolygon') {
                                polygons.push(...g.getPolygons());
                            }
                        });
                        mergedGeometry = new ol.geom.MultiPolygon(polygons);
                    }

                    const newFeature = new ol.Feature({
                        geometry: mergedGeometry,
                        name: name,
                        isPointLayer: false
                    });
                    dissolvedFeatures.push(newFeature);
                });

                // ছোট দেশগুলোকে পয়েন্ট লেয়ার (Point Layer) হিসেবে যুক্ত করা (সমাধান ৩)
                microstatesPoints.forEach(mp => {
                    const pointFeature = new ol.Feature({
                        geometry: new ol.geom.Point(ol.proj.fromLonLat(mp.coord)),
                        name: mp.name,
                        isPointLayer: true
                    });
                    dissolvedFeatures.push(pointFeature);
                });

                // চূড়ান্ত ডেটা ম্যাপে পুশ করা হলো (এখানে প্রতি দেশের আইডি এবং নাম কেবল একটিই থাকবে)
                vectorSource.addFeatures(dissolvedFeatures);
            });

        // স্টাইল ফাংশন এবং সেন্ট্রয়েড লেবেলিং (সমাধান ১-খ)
        const styleFunction = function(feature, resolution) {
            const geom = feature.getGeometry();
            if (!geom) return null;

            const isPoint = feature.get('isPointLayer');
            const rawName = feature.get('name') || "";
            const displayName = shortNames[rawName] || rawName;

            // যদি এটি পয়েন্ট লেয়ার হয় (ছোট দেশ), তবে জুম লেভেলে সব সময় নাম দেখাবে
            if (isPoint) {
                const currentZoom = Math.round(Math.log2(40075016.686 / (256 * resolution)));
                if (currentZoom < 3.5) return null; // খুব বেশি জুম আউট থাকলে ছোট বিন্দুর নাম হাইড থাকবে জটলা এড়াতে

                return new ol.style.Style({
                    image: new ol.style.Circle({
                        radius: 3,
                        fill: new ol.style.Fill({ color: '#FFCC33' }) // ম্যাপে ছোট দেশগুলো সোনালী বিন্দু হিসেবে জ্বলজ্বল করবে
                    }),
                    text: new ol.style.Text({
                        text: displayName,
                        font: 'bold 10px "Arial Black", sans-serif',
                        fill: new ol.style.Fill({ color: '#FFFFFF' }),
                        stroke: new ol.style.Stroke({ color: '#000000', width: 2.5 }),
                        offsetY: -10
                    })
                });
            }

            // সাধারণ দেশের বর্ডার স্টাইল
            const baseStyle = new ol.style.Style({
                stroke: new ol.style.Stroke({
                    color: 'rgba(255, 255, 255, 0.4)', 
                    width: 1.2
                })
            });

            // সেন্ট্রয়েড লেবেলিং লজিক (Centroid Labeling)
            const area = geom.getArea();
            let fontSize = Math.min(22, Math.max(10, Math.sqrt(area) / (resolution * 10)));
            const currentZoom = Math.round(Math.log2(40075016.686 / (256 * resolution)));

            if (area < 5000000000 && currentZoom < 3) {
                return baseStyle; // জুম আউট অবস্থায় ছোট পলিগনের নাম হাইড থাকবে (কারণ পয়েন্ট লেয়ার অলরেডি ব্যাকআপ দিচ্ছে)
            }

            baseStyle.setText(new ol.style.Text({
                text: displayName,
                font: `bold ${fontSize}px "Arial Black", sans-serif`,
                fill: new ol.style.Fill({ color: '#FFFFFF' }),
                stroke: new ol.style.Stroke({ color: '#000000', width: 2.5 }),
                placement: 'point',
                geometry: function(f) {
                    const g = f.getGeometry();
                    if (g.getType() === 'MultiPolygon') {
                        // দেশের সব টুকরোর মধ্যে যেটি সবচেয়ে বড় (মূল ভূখণ্ড), তার সেন্ট্রয়েডে নাম বসবে
                        const polygons = g.getPolygons();
                        let largestPolygon = polygons[0];
                        for (let i = 1; i < polygons.length; i++) {
                            if (polygons[i].getArea() > largestPolygon.getArea()) {
                                largestPolygon = polygons[i];
                            }
                        }
                        return largestPolygon.getInteriorPoint(); 
                    }
                    return g.getInteriorPoint(); 
                },
                overflow: true
            }));

            return baseStyle;
        };

        const countryLayer = new ol.layer.Vector({
            source: vectorSource,
            style: styleFunction,
            declutter: false 
        });

        const map = new ol.Map({
            target: 'map',
            layers: [
                new ol.layer.Tile({ 
                    source: new ol.source.XYZ({ 
                        url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
                        wrapX: false 
                    }) 
                }),
                countryLayer
            ],
            view: new ol.View({ 
                center: ol.proj.fromLonLat([20, 15]), 
                zoom: 3, 
                minZoom: 2.5, 
                maxZoom: 8,   
                enableRotation: false 
            })
        });
    </script>
</body>
</html>
