<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Modern Age 3 - Tactical Map Final</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/openlayers/8.2.0/dist/ol.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/openlayers/8.2.0/ol.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #0b1521; }
        #map { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script>
        // ১. সার্ভিস ওয়ার্কার (অফলাইন ক্যাশিংয়ের জন্য)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(console.error);
        }

        // ২. ম্যাপ ইঞ্জিন কনফিগারেশন
        const satelliteSource = new ol.source.XYZ({
            url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
            wrapX: true,
            maxZoom: 19
        });

        const map = new ol.Map({
            target: 'map',
            layers: [
                new ol.layer.Tile({ source: satelliteSource, preload: Infinity }),
                new ol.layer.Vector({
                    source: new ol.source.Vector({ url: 'https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson', format: new ol.format.GeoJSON() }),
                    style: (feature) => {
                        const name = feature.get('ADMIN') || '';
                        let rotation = (name === "Lebanon" || name === "Chile") ? -1.35 : 0;
                        return new ol.style.Style({
                            stroke: new ol.style.Stroke({ color: '#ffffff', width: 1.4 }),
                            text: new ol.style.Text({
                                text: name.toUpperCase(),
                                font: 'bold 12px Arial',
                                fill: new ol.style.Fill({ color: '#fff' }),
                                stroke: new ol.style.Stroke({ color: '#000', width: 3 }),
                                rotation: rotation
                            })
                        });
                    }
                })
            ],
            view: new ol.View({
                center: ol.proj.fromLonLat([25, 42]),
                zoom: 3.8,
                minZoom: 3.8,
                maxZoom: 8.5,
                enableRotation: false
            }),
            controls: []
        });
    </script>
</body>
</html>
