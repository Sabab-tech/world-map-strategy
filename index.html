<!DOCTYPE html>
<html>
<head>
    <title>Grand Strategy Map Engine</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #0c0f12; overflow: hidden; }
        #map { height: 100vh; width: 100%; background: #0c0f12; }
        
        /* গেম সাইকোলজি অনুযায়ী টেক্সট স্টাইল: প্রিমিয়াম ও মিনিমালিস্টিক */
        .country-label {
            background: none !important;
            border: none !important;
            box-shadow: none !important;
            color: #e0e6ed;
            font-family: 'Cinzel', 'Courier New', Courier, monospace; /* স্ট্র্যাটেজি গেম ভাইব */
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 0px 2px 4px rgba(0, 0, 0, 0.9);
            white-space: nowrap;
            pointer-events: none; /* লেখার ওপর ক্লিক হলেও যেন ম্যাপ কাজ করে */
        }

        /* বর্ডার লাইনগুলোকে কোনো জুম অ্যানিমেশনে কাঁপতে না দেওয়ার জন্য CSS লেভেল লকিং */
        .leaflet-zoom-animated {
            will-change: transform; /* জিপিইউ এক্সিলারেশন অন করবে */
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // হার্ডওয়্যার (GPU) এক্সিলারেশন ইঞ্জিন চালু করা
        var baseRenderer = L.svg({ padding: 0.5 });

        var map = L.map('map', { 
            zoomControl: false,
            minZoom: 2,  
            maxZoom: 8,          // গেমের ট্যাকটিক্যাল ভিউয়ের জন্য ৮ হলো পারফেক্ট (বেশি জুম করলে স্যাটেলাইট পিক্সেল ফেটে যায়)
            zoomSnap: 1,
            zoomDelta: 1,
            bounceAtZoomLimits: false, // জুম লিমিটে ধাক্কা খাওয়া বন্ধ
            wheelDebounceTime: 40,    // মাউস বা টাচ স্ক্রোলের রেসপন্স টাইম কমানো
            renderer: baseRenderer
        }).setView([20, 0], 2);

        // গেম-রেডি হাই পারফরম্যান্স স্যাটেলাইট টাইলস (Stadia/Esri রিকনফিগারড)
        // এটি দ্রুত লোড হয় এবং ব্লারনেস কমায়
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Strategy Map',
            maxNativeZoom: 19,      // সার্ভারকে বাধ্য করবে হাই-রেজোলিউশন ডেটা পুশ করতে
            tileSize: 256,
            keepBuffer: 6,          // স্ক্রিনের বাইরে ৬ লেয়ার পর্যন্ত ইমেজ আগে থেকে লোড করে রাখবে (স্মুথনেস)
            noWrap: false,
            updateInterval: 0       // কোনো লেটেন্সি ছাড়া সাথে সাথে ম্যাপ আপডেট হবে
        }).addTo(map);

        // বর্ডার এবং দেশের নাম লোডিং ইঞ্জিন
        fetch('https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson')
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, {
                    filter: function(feature) {
                        var name = feature.properties.ADMIN;
                        var code = feature.properties.ISO_A3;
                        return code !== "-99" && name !== "Somaliland" && name !== "Western Sahara";
                    },
                    style: {
                        color: "#ffffff",
                        weight: 1.0,        // সুক্ষ্ম ১ পিক্সেল বর্ডার
                        opacity: 0.4,       // হালকা নিয়ন হোয়াইট লুক (গেমের জন্য বেস্ট)
                        fillColor: "#000000",
                        fillOpacity: 0.01   // অত্যন্ত হালকা টাচ যাতে ক্লিকের ইভেন্ট ক্যাচ করা যায়
                    },
                    onEachFeature: function(feature, layer) {
                        var countryName = feature.properties.ADMIN;
                        
                        // দেশের সীমানার নিখুঁত কেন্দ্রবিন্দু
                        if (layer.getBounds) {
                            var center = layer.getBounds().getCenter();
                            
                            // বাহরাইন, মালদ্বীপের মতো ছোট দেশের নামের জন্য বিশেষ লজিক
                            // বড় মানচিত্রে নামগুলো জুম করলে তবেই সুন্দর দেখাবে
                            layer.bindTooltip(countryName, {
                                permanent: true,
                                direction: 'center',
                                className: 'country-label',
                                opacity: 0.85
                            }).openTooltip();
                        }
                    }
                }).addTo(map);
            });
    </script>
</body>
</html>
