<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Age 3 - Realtime Strategy Map</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #050b14; }
        #map { width: 100%; height: 100vh; }
        
        /* ১. ভূমিতে লেখা দেশের নামের স্টাইল (গেমের মতো 2D) */
        .ground-label {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            color: rgba(220, 220, 220, 0.9); /* হালকা সাদা/ধূসর */
            font-family: 'Arial', sans-serif;
            font-weight: bold;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px #000, -2px -2px 4px #000; /* লেখার চারপাশে কালো শ্যাডো যাতে স্পষ্ট হয় */
            text-align: center;
            font-size: 11px;
            pointer-events: none; /* লেখার ওপর ক্লিক লাগবে না */
        }

        /* ২. শহরের নামের স্টাইল (সরাসরি ম্যাপে লেখা থাকবে) */
        .city-text {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            color: #00ffcc; /* নিয়ন কালার */
            font-family: sans-serif;
            font-size: 10px;
            font-weight: bold;
            text-shadow: 1px 1px 2px #000;
            white-space: nowrap;
            pointer-events: none;
        }

        /* কন্ট্রোল প্যানেল */
        .hud-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(5, 11, 20, 0.85);
            border: 1px solid #ffaa00;
            color: #fff;
            padding: 12px;
            border-radius: 5px;
            font-family: sans-serif;
            font-size: 12px;
            z-index: 1000;
            box-shadow: 0 0 10px rgba(255, 170, 0, 0.3);
        }
    </style>
</head>
<body>

    <div id="map"></div>
    <div class="hud-panel">
        ⚔️ <b style="color:#ffaa00;">মডার্ন এইজ ট্যাকটিক্যাল ভিউ</b><br>
        • পপ-আপ রিমুভড: সব নাম 2D ফরমেটে ভূমিতে প্রিন্ট করা।<br>
        • গ্লোবাল বর্ডার সিস্টেম: সুস্পষ্ট সীমানা।<br>
        • ফিলিস্তিন ও জেরুজালেম ম্যাপে সরাসরি দৃশ্যমান।
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // ১. ম্যাপ ইঞ্জিন এবং জুম লেভেল (রাস্তাঘাটের ঝামেলা বাদ দিতে লিমিট করা হলো)
        const map = L.map('map', {
            center: [23.68, 90.35], // শুরুতে বাংলাদেশ ও এশিয়ার দিকে ফোকাস
            zoom: 4,
            minZoom: 3,
            maxZoom: 6, // এর বেশি জুম হবে না
            zoomControl: true
        });

        // ২. স্থায়ী স্যাটেলাইট ইমেজ
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Esri, Maxar'
        }).addTo(map);

        // ৩. পৃথিবীর সব দেশের বর্ডার এবং 2D নাম সরাসরি ভূমিতে আঁকা (পপ-আপ ছাড়া)
        fetch('https://raw.githubusercontent.com/johan/world.geo.json/master/countries.geo.json')
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, {
                    style: function (feature) {
                        return {
                            color: "#ffaa00", // গেমের মতো বর্ডারের কালার (কমলা/হলুদ)
                            weight: 1.2,      // বর্ডারের পুরুত্ব
                            fillColor: "#000000",
                            fillOpacity: 0.15 // হালকা অন্ধকার শেড
                        };
                    },
                    onEachFeature: function (feature, layer) {
                        let countryName = feature.properties.name;
                        
                        // ইসরায়েল/ফিলিস্তিন এরিয়ার নাম কাস্টমাইজ করা
                        if(countryName === "Israel") {
                            countryName = "ফিলিস্তিন / ইসরায়েল";
                        }

                        // Tooltip ব্যবহার করে সরাসরি পলিগনের মাঝখানে নাম বসানো (কোনো ক্লিক ছাড়া)
                        layer.bindTooltip(countryName, {
                            permanent: true,        // সবসময় স্ক্রিনে থাকবে
                            direction: 'center',    // একদম মাঝখানে
                            className: 'ground-label'
                        });
                    }
                }).addTo(map);
            }).catch(err => console.log("বর্ডার লোড হচ্ছে না: ", err));

        // ৪. গুরুত্বপূর্ণ শহর ও রাজধানীর ডেটা (পপ-আপ ছাড়াই সরাসরি লেখা থাকবে)
        const cities = [
            { name: "ঢাকা (রাজধানী)", lat: 23.8103, lng: 90.4125, color: "#ff3333" },
            { name: "জেরুজালেম (ফিলিস্তিনের রাজধানী)", lat: 31.7683, lng: 35.2137, color: "#ff3333" },
            { name: "গাজা", lat: 31.5016, lng: 34.4668, color: "#00ffcc" },
            { name: "নয়াদিল্লি", lat: 28.6139, lng: 77.2090, color: "#ff3333" },
            { name: "বেইজিং", lat: 39.9042, lng: 116.4074, color: "#ff3333" },
            { name: "রিয়াদ", lat: 24.7136, lng: 46.6753, color: "#ff3333" },
            { name: "কায়রো", lat: 30.0444, lng: 31.2357, color: "#ff3333" },
            { name: "মস্কো", lat: 55.7558, lng: 37.6173, color: "#ff3333" },
            { name: "ওয়াশিংটন", lat: 38.9072, lng: -77.0369, color: "#ff3333" }
        ];

        // ৫. শহরগুলোকে গেমের মতো রেন্ডার করা (ছোট ডট + পাশের টেক্সট)
        cities.forEach(city => {
            // শহরের ডট
            L.circleMarker([city.lat, city.lng], {
                radius: 4,
                color: '#fff',
                weight: 1,
                fillColor: city.color,
                fillOpacity: 1
            }).addTo(map);

            // শহরের নাম (ডটের ঠিক পাশে লেখা থাকবে, কোনো পপআপ না)
            L.marker([city.lat, city.lng], {
                icon: L.divIcon({
                    className: 'city-text',
                    html: city.name,
                    iconSize: [120, 20],
                    iconAnchor: [-8, 8] // ডট থেকে একটু ডানদিকে সরানো
                }),
                interactive: false // এতে ক্লিক করা যাবে না, শুধু দেখা যাবে
            }).addTo(map);
        });

    </script>
</body>
    </html>
