<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Age 3 - Global Map Engine</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            /* জুম অনুযায়ী ফন্ট সাইজ চেঞ্জ হওয়ার জন্য ভেরিয়েবল */
            --label-size: 9px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #050b14; }
        #map { width: 100%; height: 100vh; }
        
        /* HUD Control Panel */
        .hud-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(5, 11, 20, 0.9);
            border: 1px solid #3a4d5c;
            color: #8fa0af;
            padding: 12px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 11px;
            z-index: 1000;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
            pointer-events: none;
        }

        /* Modern Age Style Country Text */
        .country-text-icon {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            color: #ffffff;
            font-family: 'Arial', 'Helvetica', sans-serif;
            font-weight: 900; /* একদম মোটা অক্ষর */
            font-size: var(--label-size);
            text-align: center;
            text-transform: uppercase;
            /* গেমের মতো স্ট্রং কালো আউটলাইন */
            text-shadow: 
                -1.5px -1.5px 0 #000,  
                 1.5px -1.5px 0 #000,
                -1.5px  1.5px 0 #000,
                 1.5px  1.5px 0 #000,
                 0px 3px 5px rgba(0,0,0,0.9); 
            pointer-events: none; /* নামের ওপর ক্লিক করলেও যেন দেশের বর্ডার সিলেক্ট হয় */
            white-space: normal;
            line-height: 1.1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <div id="map"></div>
    
    <div class="hud-panel">
        <b style="color:#fff;">MODERN AGE III: CORE ENGINE</b><br><br>
        • TEXT LAYER: 200+ NATIONS (ON LAND)<br>
        • BORDERS: INVISIBLE (DEFAULT)<br>
        • TACTICAL TOUCH: WHITE HIGHLIGHT ON<br>
        • DYNAMIC ZOOM: ACTIVE
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // ১. কোর ইঞ্জিন চালুকরণ (জুম ৩ থেকে ৫)
        const map = L.map('map', {
            center: [25.0, 40.0],
            zoom: 4,
            minZoom: 3,
            maxZoom: 5,
            zoomControl: true,
            maxBoundsViscosity: 1.0
        });

        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Esri, Maxar'
        }).addTo(map);

        // জুম লেভেলের ওপর ভিত্তি করে ফন্ট সাইজ কন্ট্রোল (যাতে বর্ডারের বাইরে না যায়)
        map.on('zoomend', function() {
            let zoom = map.getZoom();
            let size = '9px'; // Zoom 3 (সবচেয়ে ছোট)
            if (zoom === 4) size = '11px'; // Medium Zoom
            if (zoom === 5) size = '14px'; // Max Zoom
            document.documentElement.style.setProperty('--label-size', size);
        });

        // ২. বর্ডার স্টাইলিং আর্কিটেকচার
        let geojsonLayer;
        const invisibleStyle = { color: "transparent", weight: 0, fillOpacity: 0 };
        const tacticalHighlightStyle = { color: "#ffffff", weight: 1.5, fillColor: "#ffffff", fillOpacity: 0.1 };
        let textLabelsLayer = L.layerGroup().addTo(map); // টেক্সট রাখার জন্য আলাদা লেয়ার

        // ৩. "Largest Polygon Algorithm" - নাম যেন সাগরে না পড়ে তা নিশ্চিত করার লজিক
        function getLandCenter(feature, layer) {
            if (feature.geometry.type === "Polygon") {
                return layer.getBounds().getCenter();
            } else if (feature.geometry.type === "MultiPolygon") {
                let maxArea = 0;
                let bestCenter = layer.getBounds().getCenter();
                let subLayers = layer.getLayers ? layer.getLayers() : [];
                
                // সবচেয়ে বড় ভূখণ্ডটি বের করা
                subLayers.forEach(subLayer => {
                    let bounds = subLayer.getBounds();
                    let area = (bounds.getNorth() - bounds.getSouth()) * (bounds.getEast() - bounds.getWest());
                    if (area > maxArea) {
                        maxArea = area;
                        bestCenter = bounds.getCenter();
                    }
                });
                return bestCenter;
            }
            return layer.getBounds().getCenter();
        }

        // ৪. ডেটাবেজ লোড ও রেন্ডারিং
        function initializeMapLayer(geoData) {
            if (geojsonLayer) map.removeLayer(geojsonLayer);
            textLabelsLayer.clearLayers();

            geojsonLayer = L.geoJSON(geoData, {
                style: invisibleStyle,
                onEachFeature: function (feature, layer) {
                    
                    // --- ট্যাকটিক্যাল সাদা বর্ডার লজিক ---
                    layer.on('click', function (e) {
                        L.DomEvent.stopPropagation(e);
                        geojsonLayer.resetStyle();
                        layer.setStyle(tacticalHighlightStyle);
                        if (!L.Browser.ie && !L.Browser.opera && !L.Browser.edge) {
                            layer.bringToFront();
                        }
                    });

                    // --- দেশের নাম বসানোর লজিক ---
                    let countryName = feature.properties.ADMIN || feature.properties.name || "N/A";
                    
                    if (countryName !== "N/A") {
                        countryName = countryName.toUpperCase();
                        
                        // লম্বা নামগুলো শর্ট করে দেওয়া যাতে বর্ডার পার না হয়
                        if (countryName === "UNITED STATES OF AMERICA") countryName = "USA";
                        if (countryName === "UNITED KINGDOM") countryName = "UK";
                        if (countryName === "RUSSIAN FEDERATION") countryName = "RUSSIA";
                        if (countryName === "DEMOCRATIC REPUBLIC OF THE CONGO") countryName = "DR CONGO";
                        if (countryName === "CENTRAL AFRICAN REPUBLIC") countryName = "CAR";

                        let centerCoords = getLandCenter(feature, layer);
                        
                        let labelIcon = L.divIcon({
                            className: 'country-text-icon',
                            html: `<span>${countryName}</span>`,
                            iconSize: [80, 40],   // সেন্টারিং বক্স
                            iconAnchor: [40, 20]  // একদম মাঝখানে সেট করা
                        });

                        L.marker(centerCoords, {
                            icon: labelIcon,
                            interactive: false // নাম ক্লিক করলেও নিচের দেশ সিলেক্ট হবে
                        }).addTo(textLabelsLayer);
                    }
                }
            }).addTo(map);
        }

        map.on('click', function(e) {
            if (geojsonLayer) geojsonLayer.resetStyle();
        });

        // ৫. অফলাইন ও ব্যাকআপ ইঞ্জিন
        const localSource = './countries.geojson';
        const backupSource = 'https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson';

        function loadTacticalDatabase(url, isBackupSystem = false) {
            fetch(url).then(res => {
                if (!res.ok) throw new Error("Source Offline");
                return res.json();
            }).then(data => {
                initializeMapLayer(data);
            }).catch(err => {
                if (!isBackupSystem) loadTacticalDatabase(backupSource, true);
            });
        }

        loadTacticalDatabase(localSource);
    </script>
</body>
</html>
