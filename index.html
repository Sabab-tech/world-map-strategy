<!DOCTYPE html>
<html>
<head>
    <title>Perfect Strategy Map Engine</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; }
        #map { height: 100vh; width: 100%; background: #000; }
        
        /* দেশের নামগুলোর প্রিমিয়াম গেম স্টাইল */
        .country-label {
            background: none !important;
            border: none !important;
            box-shadow: none !important;
            color: rgba(255, 255, 255, 0.85);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 11px;
            font-weight: bold;
            text-shadow: 0px 2px 4px #000, 0px -1px 2px #000;
            white-space: nowrap;
            pointer-events: none;
        }

        /* হার্ডওয়্যার লেভেলে লকিং */
        .leaflet-zoom-animated, .leaflet-pane {
            will-change: transform, opacity;
            transform-style: preserve-3d;
            backface-visibility: hidden;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var ultimateRenderer = L.canvas({ padding: 0.1, tolerance: 5 });

        // পুরো পৃথিবীর ম্যাপকে স্ক্রিনের বাইরে ছিটকে যাওয়া থেকে আটকানোর বাউন্ডারি
        var southWest = L.latLng(-60, -180);
        var northEast = L.latLng(85, 180);
        var bounds = L.latLngBounds(southWest, northEast);

        var map = L.map('map', { 
            zoomControl: false,
            minZoom: 3.8,      // উচ্চতা কঠোরভাবে নিয়ন্ত্রণ করা হলো (আর বেশি উপরে ওঠা সম্ভব নয়)
            maxZoom: 9,
            zoomSnap: 0.1,     // স্মুথ জুম লকিং
            zoomDelta: 1,
            maxBounds: bounds, // ম্যাপ স্ক্রিনের ভেতরে আটকে থাকবে
            maxBoundsViscosity: 1.0, 
            inertia: false,
            renderer: ultimateRenderer
        }).setView([20, 0], 3.8);

        // স্যাটেলাইট বেস লেয়ার
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Strategy Map',
            maxNativeZoom: 19,
            keepBuffer: 4,
            updateWhenIdle: true
        }).addTo(map);

        var geojsonLayer;
        var selectedLayer = null;

        fetch('https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson')
            .then(res => res.json())
            .then(data => {
                geojsonLayer = L.geoJSON(data, {
                    filter: function(feature) {
                        var name = feature.properties.ADMIN;
                        var code = feature.properties.ISO_A3;
                        return code !== "-99" && name !== "Somaliland" && name !== "Western Sahara";
                    },
                    style: function(feature) {
                        return {
                            color: "#ffffff",
                            weight: map.getZoom() > 5.5 ? 2.3 : 0.9, // জুম করলে বর্ডার একটু বোল্ড হবে
                            opacity: 0.4,
                            fillColor: "#ffffff",
                            fillOpacity: 0.01 // টাচ ইভেন্ট ক্যাচ করার জন্য মিনিমাম ওপাটিসিটি
                        };
                    },
                    onEachFeature: function(feature, layer) {
                        var countryName = feature.properties.ADMIN;
                        
                        if (layer.getBounds) {
                            layer.bindTooltip(countryName, {
                                permanent: true,
                                direction: 'center',
                                className: 'country-label',
                                opacity: 0.85
                            }).openTooltip();
                        }

                        // টাচ/ক্লিক ইন্টারঅ্যাকশন
                        layer.on({
                            click: function(e) {
                                if (selectedLayer) {
                                    geojsonLayer.resetStyle(selectedLayer);
                                }

                                selectedLayer = e.target;
                                
                                // নতুন রুল: গাঢ় সাদা এবং অত্যন্ত হালকা সবুজ আভাযুক্ত সিলেকশন কালার
                                selectedLayer.setStyle({
                                    color: "#e6fffa", // গাঢ় সাদা সাথে খুব হালকা গ্রিন/সায়ান মিক্স ভাইব
                                    weight: map.getZoom() > 5.5 ? 3.5 : 2.5, // সিলেক্টেড বর্ডার আরও বোল্ড দেখাবে
                                    opacity: 0.9,
                                    fillColor: "#e6fffa",
                                    fillOpacity: 0.1
                                });

                                if (!L.Browser.ie && !L.Browser.opera && !L.Browser.edge) {
                                    selectedLayer.bringToFront();
                                }

                                console.log("Selected: " + countryName);
                            }
                        });
                    }
                }).addTo(map);
            });

        // জুম চেঞ্জের সাথে সাথে বর্ডারের বোল্ডনেস রিয়েল-টাইম আপডেট
        map.on('zoomend', function() {
            if (geojsonLayer) {
                var currentZoom = map.getZoom();
                geojsonLayer.eachLayer(function(layer) {
                    if (layer !== selectedLayer) {
                        layer.setStyle({
                            weight: currentZoom > 5.5 ? 2.3 : 0.9 // জুম ইন করলে সাধারণ বর্ডারও বোল্ড হবে
                        });
                    } else {
                        // সিলেক্টেড দেশের বর্ডার জুম অবস্থায় আরও বেশি বোল্ড থাকবে
                        layer.setStyle({
                            weight: currentZoom > 5.5 ? 3.5 : 2.5
                        });
                    }
                });
            }
        });
    </script>
</body>
</html>
