<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Map - V31 3D Text & Fixed Blank Screen</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/openlayers/8.2.0/ol.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/openlayers/8.2.0/dist/ol.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #0b1d33; overflow: hidden; }
        #map { width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script>
        // ২. ৩ডি টেক্সট স্টাইল ফাংশন
        function create3DTextStyle(name, isCapital = false) {
            return new ol.style.Text({
                text: name.toUpperCase(),
                font: isCapital ? 'bold 16px "Impact", "Arial Black", sans-serif' : 'bold 12px "Impact", "Arial Black", sans-serif',
                fill: new ol.style.Fill({
                    color: isCapital ? '#FFCC00' : '#FFFFFF' 
                }),
                stroke: new ol.style.Stroke({
                    color: '#000000',
                    width: 3.5 // কালো আউটলাইন আরেকটু স্পষ্ট করা হয়েছে
                }),
                offsetX: 0,
                offsetY: 0,
                placement: 'point',
                overflow: false
            });
        }

        // ৩. ন্যাচারাল আর্থ GeoJSON এর সঠিক ডাটা লিংক
        const countrySource = new ol.source.Vector({
            url: 'https://d2ad6b4ur7yvpq.cloudfront.net/naturalearth-3.3.0/ne_50m_admin_0_countries.geojson',
            format: new ol.format.GeoJSON()
        });

        // ৪. দেশের নাম এবং স্টাইল রেন্ডার
        const countryLayer = new ol.layer.Vector({
            source: countrySource,
            declutter: true, // নামগুলো যেন একটার ওপর আরেকটা না ওঠে
            style: function(feature) {
                // ডাটাবেজ থেকে সঠিক নাম তুলে আনা
                const countryName = feature.get('admin') || feature.get('name') || '';
                
                // গেমের স্টাইল রুলস (যে দেশগুলো গোল্ডেন কালার হবে)
                const isCapitalCountry = ["Saudi Arabia", "Bangladesh", "Egypt", "Turkey", "United States of America", "Russia"].includes(countryName);

                return new ol.style.Style({
                    stroke: new ol.style.Stroke({
                        color: 'rgba(255, 255, 255, 0.4)', // হালকা সাদা বর্ডার
                        width: 1.5
                    }),
                    text: create3DTextStyle(countryName, isCapitalCountry)
                });
            }
        });

        // ৫. স্যাটেলাইট বেসম্যাপ লেয়ার (এটি না থাকলে স্ক্রিন কালো দেখায়)
        const baseLayer = new ol.layer.Tile({ 
            source: new ol.source.XYZ({ 
                url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', 
                wrapX: false 
            }) 
        });

        // ৬. গেমের ম্যাপ ভিউ
        const map = new ol.Map({
            target: 'map',
            layers: [
                baseLayer,   // প্রথমে স্যাটেলাইট ম্যাপ বসবে
                countryLayer // তার ওপর বর্ডার ও ৩ডি নাম বসবে
            ],
            view: new ol.View({
                center: ol.proj.fromLonLat([45, 25]), 
                zoom: 3,
                minZoom: 2,
                maxZoom: 10,
                enableRotation: false
            })
        });
    </script>
</body>
</html>
