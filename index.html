<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Map - V47 Standalone Capital Masterpiece</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/openlayers/8.2.0/ol.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/openlayers/8.2.0/dist/ol.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #0b1521; overflow: hidden; touch-action: none; }
        #map { width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script>
        // স্ট্র্যাটেজি গেমের মতো দেশের নাম সংক্ষিপ্তকরণের তালিকা
        const shortNames = {
            "Democratic Republic of the Congo": "DR Congo",
            "Central African Republic": "C.A.R.",
            "Republic of the Congo": "Congo",
            "Equatorial Guinea": "Eq. Guinea",
            "United States of America": "USA",
            "United Kingdom": "UK",
            "Saudi Arabia": "S. Arabia",
            "United Arab Emirates": "UAE",
            "Dominican Republic": "Dominican Rep.",
            "The Bahamas": "Bahamas",
            "South Korea": "S. Korea",
            "North Korea": "N. Korea",
            "Russian Federation": "Russia",
            "Papua New Guinea": "PNG",
            "Bosnia and Herzegovina": "Bosnia",
            "Trinidad and Tobago": "Trinidad"
        };

        // 🌍 গ্লোবাল ইন-কোড ক্যাপিটাল ডাটাবেজ (আপনার ফাইলের ফরম্যাট অনুযায়ী নির্মিত)
        const globalCapitals = {
            "Bangladesh": [{ "n": "Dhaka", "c": [90.41, 23.81] }],
            "India": [{ "n": "New Delhi", "c": [77.20, 28.61] }],
            "Pakistan": [{ "n": "Islamabad", "c": [73.04, 33.68] }],
            "United States of America": [{ "n": "Washington D.C.", "c": [-77.03, 38.90] }],
            "Russian Federation": [{ "n": "Moscow", "c": [37.61, 55.75] }],
            "China": [{ "n": "Beijing", "c": [116.40, 39.90] }],
            "United Kingdom": [{ "n": "London", "c": [-0.12, 51.50] }],
            "France": [{ "n": "Paris", "c": [2.35, 48.85] }],
            "Germany": [{ "n": "Berlin", "c": [13.40, 52.52] }],
            "Japan": [{ "n": "Tokyo", "c": [139.69, 35.67] }],
            "Saudi Arabia": [{ "n": "Riyadh", "c": [46.67, 24.71] }],
            "Egypt": [{ "n": "Cairo", "c": [31.23, 30.04] }],
            "Brazil": [{ "n": "Brasilia", "c": [-47.88, -15.79] }],
            "Australia": [{ "n": "Canberra", "c": [149.13, -35.28] }],
            "Canada": [{ "n": "Ottawa", "c": [-75.69, 45.42] }],
            "South Africa": [{ "n": "Pretoria", "c": [28.18, -25.74] }],
            "Argentina": [{ "n": "Buenos Aires", "c": [-58.38, -34.60] }],
            "Turkey": [{ "n": "Ankara", "c": [32.85, 39.93] }],
            "Iran": [{ "n": "Tehran", "c": [51.38, 35.68] }],
            "Iraq": [{ "n": "Baghdad", "c": [44.36, 33.31] }],
            "Afghanistan": [{ "n": "Kabul", "c": [69.17, 34.53] }],
            "Indonesia": [{ "n": "Jakarta", "c": [106.82, -6.17] }],
            "Malaysia": [{ "n": "Kuala Lumpur", "c": [101.68, 3.13] }],
            "South Korea": [{ "n": "Seoul", "c": [126.97, 37.56] }],
            "North Korea": [{ "n": "Pyongyang", "c": [125.76, 39.03] }],
            "Italy": [{ "n": "Rome", "c": [12.49, 41.90] }],
            "Spain": [{ "n": "Madrid", "c": [-3.70, 40.41] }],
            "Ukraine": [{ "n": "Kyiv", "c": [30.52, 50.45] }],
            "Belarus": [{ "n": "Minsk", "c": [27.56, 53.90] }],
            "Finland": [{ "n": "Helsinki", "c": [24.93, 60.16] }],
            "Norway": [{ "n": "Oslo", "c": [10.75, 59.91] }],
            "Sweden": [{ "n": "Stockholm", "c": [18.06, 59.32] }],
            "Greece": [{ "n": "Athens", "c": [23.72, 37.98] }],
            "Lebanon": [{ "n": "Beirut", "c": [35.50, 33.89] }],
            "Israel": [{ "n": "Jerusalem", "c": [35.21, 31.76] }],
            "Vietnam": [{ "n": "Hanoi", "c": [105.83, 21.02] }],
            "Chile": [{ "n": "Santiago", "c": [-70.66, -33.44] }],
            "Algeria": [{ "n": "Algiers", "c": [3.05, 36.75] }],
            "Ethiopia": [{ "n": "Addis Ababa", "c": [38.74, 9.03] }],
            "Kenya": [{ "n": "Nairobi", "c": [36.82, -1.29] }]
        };

        // গ্লোবাল ট্র্যাকিং ভেরিয়েবল (কোন দেশ সিলেক্ট আছে তা মনে রাখবে)
        let selectedCountryName = null;

        const vectorSource = new ol.source.Vector({ wrapX: false }); 
        const citySource = new ol.source.Vector({ wrapX: false });

        // দেশের সীমানার ডেটাবেজ ফেচ 
        fetch('https://d2ad6b4ur7yvpq.cloudfront.net/naturalearth-3.3.0/ne_50m_admin_0_countries.geojson')
            .then(res => res.json())
            .then(data => {
                const format = new ol.format.GeoJSON();
                const features = format.readFeatures(data, { featureProjection: 'EPSG:3857' });
                vectorSource.addFeatures(features);
            });

        // 🟢 দেশের নাম ও বর্ডারের রেন্ডার ইঞ্জিন
        const countryStyleFunction = function(feature, resolution) {
            const rawName = feature.get('admin') || feature.get('name') || "";
            const displayName = shortNames[rawName] || rawName;
            
            const geom = feature.getGeometry();
            const area = geom.getArea(); 

            const currentZoom = Math.round(Math.log2(40075016.686 / (256 * resolution)));

            let minZoomToShow = 7; 
            let baseSize = 8; 

            if (["Russia", "Canada", "China", "United States of America", "Brazil", "Australia"].includes(rawName)) {
                minZoomToShow = 2.5; baseSize = 13;
            } else if (area > 1000000000000) { 
                minZoomToShow = 3.2; baseSize = 11;
            } else if (area > 250000000000) {  
                minZoomToShow = 4.2; baseSize = 9.2; 
            } else if (area > 50000000000) {   
                minZoomToShow = 5.2; baseSize = 8.5;
            } else {                           
                minZoomToShow = 6.2; baseSize = 7.5;
            }

            let textStyle = null;

            if (currentZoom >= minZoomToShow) {
                let dynamicFontSize = baseSize + ((currentZoom - minZoomToShow) * 1.1);
                dynamicFontSize = Math.min(dynamicFontSize, baseSize + 4); 

                textStyle = new ol.style.Text({
                    text: displayName.toUpperCase(), 
                    font: `900 ${dynamicFontSize}px "Impact", "Arial Narrow", sans-serif`,
                    fill: new ol.style.Fill({ color: '#FFFDF0' }), 
                    stroke: new ol.style.Stroke({ color: '#000000', width: Math.max(2, dynamicFontSize * 0.12) }), 
                    placement: 'polygon', 
                    maxAngle: 0.6, 
                    overflow: false 
                });
            }

            return new ol.style.Style({
                fill: new ol.style.Fill({ color: 'rgba(0, 0, 0, 0)' }), // সম্পূর্ণ ভূমি ক্লিকেবল রাখার অদৃশ্য ফিল
                stroke: new ol.style.Stroke({ color: 'rgba(255, 255, 255, 0.35)', width: 1.5 }),
                text: textStyle
            });
        };

        // 🟢 রাজধানীর জন্য ডায়নামিক রেন্ডার ইঞ্জিন (সিলেকশন ভিত্তিক)
        const cityStyleFunction = function(feature, resolution) {
            const currentZoom = Math.round(Math.log2(40075016.686 / (256 * resolution)));
            
            // ⛔ শর্ত: দেশ সিলেক্টেড থাকতে হবে এবং জুম লেভেল ৪ বা তার বেশি হতে হবে
            if (!selectedCountryName || currentZoom < 4) return null;

            // বর্তমান ফিচারের দেশের নাম এবং ক্যাপিটাল ডেটা মেলানো
            const featureCountry = feature.get('countryName') || "";
            if (featureCountry.toLowerCase() !== selectedCountryName.toLowerCase()) return null;

            const cityName = feature.get('name') || "";

            return new ol.style.Style({
                text: new ol.style.Text({
                    text: `⭐ ${cityName.toUpperCase()}`,
                    font: 'bold 11px "Arial", sans-serif',
                    fill: new ol.style.Fill({ color: '#FFFFE0' }), 
                    stroke: new ol.style.Stroke({ color: '#000000', width: 3 }),
                    offsetY: -10,
                    overflow: false
                }),
                image: new ol.style.Circle({
                    radius: 4,
                    fill: new ol.style.Fill({ color: '#FF3333' }),
                    stroke: new ol.style.Stroke({ color: '#FFFFFF', width: 1.5 })
                })
            });
        };

        const countryLayer = new ol.layer.Vector({ 
            source: vectorSource, 
            style: countryStyleFunction, 
            declutter: true 
        });

        const cityLayer = new ol.layer.Vector({
            source: citySource,
            style: cityStyleFunction,
            zIndex: 200
        });

        const map = new ol.Map({
            target: 'map',
            layers: [
                new ol.layer.Tile({ 
                    source: new ol.source.XYZ({ url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', wrapX: false }) 
                }),
                countryLayer,
                cityLayer
            ],
            view: new ol.View({ 
                center: ol.proj.fromLonLat([20, 15]), 
                zoom: 3.5,   
                minZoom: 3.2, 
                maxZoom: 7,   
                enableRotation: false 
            })
        });

        // স্টাইলিশ হালকা সাদা সিলেকশন স্টাইল
        const selectStyle = new ol.style.Style({
            fill: new ol.style.Fill({ color: 'rgba(255, 255, 255, 0.10)' }), 
            stroke: new ol.style.Stroke({ color: '#FFFFFF', width: 2 }) 
        });

        const selectInteraction = new ol.interaction.Select({
            layers: [countryLayer], style: selectStyle, multi: false, hitTolerance: 15
        });
        map.addInteraction(selectInteraction);

        // 🟢 সিলেকশন হ্যান্ডলার এবং ক্যাপিটাল ট্রিগার মেকানিজম
        selectInteraction.on('select', function(e) {
            citySource.clear(); // আগের শহরের ফিচার পরিষ্কার করা হচ্ছে

            if (e.selected.length > 0) {
                const clickedFeature = e.selected[0];
                // ডেটাবেজের সাথে সামঞ্জস্য রেখে দেশের নাম ট্র্যাকিং
                let countryName = clickedFeature.get('admin') || clickedFeature.get('name');
                
                // রাশিয়ার নাম সিনক্রোনাইজেশন প্রোটেকশন
                if (countryName === "Russia") countryName = "Russian Federation";

                if (countryName) {
                    selectedCountryName = countryName;

                    // গ্লোবাল ডাটাবেজ থেকে সিলেক্টেড দেশের রাজধানী খুঁজে ম্যাপে বসানো হচ্ছে
                    const capitals = globalCapitals[countryName] || globalCapitals[clickedFeature.get('name')];
                    if (capitals) {
                        capitals.forEach(cap => {
                            const cityFeature = new ol.Feature({
                                geometry: new ol.geom.Point(ol.proj.fromLonLat(cap.c)),
                                name: cap.n,
                                countryName: countryName
                            });
                            citySource.addFeature(cityFeature);
                        });
                    }
                }
            } else {
                selectedCountryName = null;
            }

            cityLayer.changed();
            countryLayer.changed();
        });
    </script>
</body>
</html>
