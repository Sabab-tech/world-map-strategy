<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Age 3 - Core Tactical Engine (Permanent Build)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #050b14; }
        #map { width: 100%; height: 100vh; }
        
        /* HUD Control Panel */
        .hud-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(5, 11, 20, 0.9);
            border: 1px solid #3a4d5c;
            color: #8fa0af;
            padding: 12px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 11px;
            z-index: 1000;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="map"></div>
    
    <div class="hud-panel">
        <b style="color:#fff;">MODERN AGE III: CORE ENGINE</b><br><br>
        • STATUS: ACTIVE (PERMANENT)<br>
        • TEXT LAYER: BYPASS<br>
        • OVERLAY: DYNAMIC WHITE HIGHLIGHT<br>
        • BACKUP ENGINE: ONLINE
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // ==========================================
        // ১. কোর ম্যাপ ইঞ্জিন কনফিগারেশন (স্থায়ী লক)
        // ==========================================
        const map = L.map('map', {
            center: [25.0, 40.0],
            zoom: 4,
            minZoom: 3,
            maxZoom: 5,
            zoomControl: true,
            maxBoundsViscosity: 1.0
        });

        // স্যাটেলাইট বেস লেয়ার
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Esri, Maxar'
        }).addTo(map);

        // ==========================================
        // ২. বর্ডার স্টাইলিং আর্কিটেকচার
        // ==========================================
        let geojsonLayer;

        // ডিফল্ট অদৃশ্য বর্ডার স্টাইল
        const invisibleStyle = {
            color: "transparent",
            weight: 0,
            fillOpacity: 0
        };

        // টাচ বা ক্লিক করলে সলিড সাদা বর্ডার ও হালকা ইন-গ্লো স্টাইল
        const tacticalHighlightStyle = {
            color: "#ffffff",     // সলিড সাদা রেখা
            weight: 1.5,          // প্রফেশনাল ১.৫ পিক্সেল শার্পনেস
            fillColor: "#ffffff", 
            fillOpacity: 0.1      // ১০% অভ্যন্তরীণ সাদা গ্লো
        };

        // ==========================================
        // ৩. ইন্টারেকশন ও রেন্ডারিং ফাংশন
        // ==========================================
        function initializeMapLayer(geoData) {
            // যদি আগে কোনো লেয়ার থেকে থাকে তা রিমুভ করে ফ্রেস রেন্ডার করবে
            if (geojsonLayer) {
                map.removeLayer(geojsonLayer);
            }

            geojsonLayer = L.geoJSON(geoData, {
                style: invisibleStyle,
                onEachFeature: function (feature, layer) {
                    layer.on('click', function (e) {
                        L.DomEvent.stopPropagation(e); // ইভেন্ট বাবলিং ফিক্সড (ক্লিক বাইরে ছড়াবে না)
                        
                        geojsonLayer.resetStyle(); // আগের সিলেক্টেড দেশের বর্ডার রি-হাইড
                        layer.setStyle(tacticalHighlightStyle); // বর্তমান দেশকে হাইলাইট
                        
                        if (!L.Browser.ie && !L.Browser.opera && !L.Browser.edge) {
                            layer.bringToFront(); // বর্ডার লাইন সবার ওপরে ফুটিয়ে তুলবে
                        }
                    });
                }
            }).addTo(map);
        }

        // সাগরের ফাঁকা জায়গায় ক্লিক করলে বর্ডার সিলেকশন ক্লিয়ার করার গ্লোবাল লিসেনার
        map.on('click', function(e) {
            if (geojsonLayer) {
                geojsonLayer.resetStyle();
            }
        });

        // ==========================================
        // ৪. অফলাইন ও স্বয়ংক্রিয় ব্যাকআপ ডেটা ইঞ্জিন (Dual-Layer Core)
        // ==========================================
        const localSource = './countries.geojson'; // লোকাল/অফলাইন ফাইল পাথ
        const backupSource = 'https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson'; // গ্লোবাল ক্লাউড ব্যাকআপ

        function loadTacticalDatabase(url, isBackupSystem = false) {
            fetch(url)
                .then(res => {
                    if (!res.ok) throw new Error("Source Offline/Missing");
                    return res.json();
                })
                .then(data => {
                    initializeMapLayer(data);
                    console.log(isBackupSystem ? "Core Engine: Loaded via Cloud Backup System." : "Core Engine: Loaded via Offline Local Repository.");
                })
                .catch(err => {
                    if (!isBackupSystem) {
                        console.warn("Local Map Data Missing. Activating Automatic Cloud Backup Layer...");
                        loadTacticalDatabase(backupSource, true); // লোকাল ফেইল করলে অটোমেটিক ব্যাকআপ চালু
                    } else {
                        console.error("Critical Error: Core Tactical Database could not be initialized.");
                    }
                });
        }

        // কোর ইঞ্জিন এক্সিকিউশন
        loadTacticalDatabase(localSource);

    </script>
</body>
    </html>
