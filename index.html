<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>এশিয়ান জিওপলিটিক্যাল স্ট্র্যাটেজি ম্যাপ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body, html { width: 100%; height: 100%; background-color: #0d1117; overflow: hidden; }
        #map { width: 100%; height: 100%; z-index: 1; }
        .control-panel {
            position: absolute; top: 20px; left: 20px; background: rgba(13, 17, 23, 0.95);
            border: 2px solid #30363d; border-radius: 8px; padding: 15px; z-index: 1000;
            color: #c9d1d9; box-shadow: 0 4px 15px rgba(0,0,0,0.5); max-width: 280px;
        }
        .control-panel h3 { margin-bottom: 12px; color: #58a6ff; font-size: 15px; text-transform: uppercase; border-bottom: 1px solid #30363d; padding-bottom: 5px; }
        .layer-btn {
            display: flex; align-items: center; width: 100%; padding: 8px 12px; margin: 5px 0;
            background: #21262d; border: 1px solid #30363d; color: #c9d1d9; border-radius: 6px;
            cursor: pointer; font-size: 13px; text-align: left;
        }
        .layer-btn.active { background: #1f6feb; border-color: #58a6ff; color: white; font-weight: bold; }
        .layer-btn span { margin-right: 10px; }
        .leaflet-popup-content-wrapper { background: #161b22 !important; color: #c9d1d9 !important; border: 1px solid #30363d; }
        .leaflet-popup-tip { background: #161b22 !important; }
        .popup-title { font-weight: bold; color: #58a6ff; font-size: 14px; }
        .popup-meta { font-size: 11px; color: #8b949e; text-transform: uppercase; margin-top: 2px; }
        .popup-status { display: inline-block; margin-top: 5px; padding: 2px 6px; font-size: 10px; border-radius: 4px; font-weight: bold; }
        .status-unlocked { background: #238636; color: white; }
        .status-locked { background: #da3633; color: white; }
    </style>
</head>
<body>

    <div class="control-panel">
        <h3>Power Grid Layers</h3>
        <button class="layer-btn active" onclick="filterLayer('all', this)"><span>🌐</span> All Nodes</button>
        <button class="layer-btn" onclick="filterLayer('capital', this)"><span>🏛️</span> Political Control</button>
        <button class="layer-btn" onclick="filterLayer('economic_hub', this)"><span>💰</span> Economic Trade Grid</button>
        <button class="layer-btn" onclick="filterLayer('military_hub', this)"><span>🪖</span> Military Command</button>
        <button class="layer-btn" onclick="filterLayer('secret_zone', this)"><span>🔒</span> Intel / Secret Zones</button>
    </div>

    <div id="map"></div>

            if (status === 'locked') return { color: '#555', fillColor: '#222', radius: 6 };

            if (role === 'economic_hub') return { color: '#55ff55', fillColor: '#00cc00', radius: 8 };

            if (role === 'secret_zone') return { color: '#ffff55', fillColor: '#cccc00', radius: 7 };
            return { color: '#fff', fillColor: '#88 stroke', radius: 6 };
        }

            if (role === 'capital') return '🏛️';
            if (role === 'economic_hub') return '💰';
            if (role === 'military_hub') return '🪖';
            if (role === 'secret_zone') return '🔒';
