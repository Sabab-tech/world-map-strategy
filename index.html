<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global Map - All Microstates Included V12</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/openlayers/8.2.0/dist/ol.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/openlayers/8.2.0/ol.css">
    <style>body, html, #map { width: 100%; height: 100%; margin: 0; padding: 0; background-color: #0b1521; }</style>
</head>
<body>
    <div id="map"></div>
    <script>
        const shortNames = {
            "Democratic Republic of the Congo": "DR Congo",
            "Central African Republic": "C.A.R.",
            "Republic of the Congo": "Congo",
            "Equatorial Guinea": "Eq. Guinea",
            "Saint Vincent and the Grenadines": "St. Vincent",
            "Federated States of Micronesia": "Micronesia",
            "Papua New Guinea": "PNG",
            "Solomon Islands": "Solomons",
            "Marshall Islands": "Marshalls",
            "United States of America": "USA",
            "United Kingdom": "UK",
            "Saudi Arabia": "S. Arabia",
            "United Arab Emirates": "UAE",
            "Trinidad and Tobago": "Trinidad",
            "Antigua and Barbuda": "Antigua",
            "Saint Kitts and Nevis": "St. Kitts",
            "São Tomé and Príncipe": "São Tomé",
            "Saint Lucia": "St. Lucia",
            "Bosnia and Herzegovina": "Bosnia",
            "Dominican Republic": "Dominican Rep."
        };

        // ১. বিশ্বের সমস্ত ক্ষুদ্র রাষ্ট্রসহ সবচেয়ে উন্নত ডাটাবেজ (geo-countries)
        const vectorSource = new ol.source.Vector({
            url: 'https://cdn.jsdelivr.net/gh/datasets/geo-countries@master/data/countries.geojson',
            format: new ol.format.GeoJSON(),
            wrapX: false 
        });

        // ২. ম্যাপের ডাটা লোড হওয়ার পর ডুপ্লিকেট নামগুলো ব্লক করার লজিক
        vectorSource.on('featuresloadend', function() {
            const features = vectorSource.getFeatures();
            const maxAreaMap = {};
            
            // প্রতিটি দেশের নাম খুঁজে তার সবচেয়ে বড় টুকরোটি বের করা
            features.forEach(f => {
                const name = f.get('ADMIN') || f.get('name') || f.get('NAME') || f.get('admin') || "";
                const geom = f.getGeometry();
                if (geom && name) {
                    const area = geom.getArea();
                    if (!maxAreaMap[name] || area > maxAreaMap[name].area) {
                        maxAreaMap[name] = { area: area, feature: f };
                    }
                }
            });

            // সব দ্বীপে আগে ফলস (false) ট্যাগ দেওয়া
            features.forEach(f => f.set('isMainBody', false));
            
            // শুধু সবচেয়ে বড় ভূখণ্ডগুলোতে ট্রু (true) ট্যাগ দেওয়া
            Object.values(maxAreaMap).forEach(item => {
                item.feature.set('isMainBody', true);
            });
            
            // ম্যাপকে রিফ্রেশ করে সঠিক জায়গায় নাম বসানোর নির্দেশ
            vectorSource.changed();
        });

        const styleFunction = function(feature, resolution) {
            const geom = feature.getGeometry();
            if (!geom) return null;

            const baseStyle = new ol.style.Style({
                stroke: new ol.style.Stroke({
                    color: 'rgba(255, 255, 255, 0.4)', 
                    width: 1.2
                })
            });

            // যদি ডাটাবেজ লোড না হয়ে থাকে বা এটি প্রধান ভূখণ্ড না হয়, তবে শুধু বর্ডার আঁকবে
            if (feature.get('isMainBody') !== true) {
                return baseStyle; 
            }

            const rawName = feature.get('ADMIN') || feature.get('name') || feature.get('NAME') || feature.get('admin') || "";
            if (!rawName) return baseStyle;

            const displayName = shortNames[rawName] || rawName; 
            const area = geom.getArea();
            const currentZoom = Math.round(Math.log2(40075016.686 / (256 * resolution)));

            let fontSize = Math.min(22, Math.max(10, Math.sqrt(area) / (resolution * 10)));
            
            // ৩. আপনার বলা ভ্যাটিকান, ফিজি, লেবানন ইত্যাদি যেন ম্যাপে গ্যারান্টিসহ থাকে
            if (area < 500000000) { 
                if (currentZoom < 4) return baseStyle; // জুম না করলে শুধু বর্ডার দেখাবে, নাম লুকাবে
                fontSize = 10;
            } else if (area < 5000000000) { 
                if (currentZoom < 3) return baseStyle; 
                fontSize = 11;
            }

            baseStyle.setText(new ol.style.Text({
                text: displayName,
                font: `bold ${fontSize}px "Arial Black", sans-serif`,
                fill: new ol.style.Fill({ color: '#FFFFFF' }),
                stroke: new ol.style.Stroke({ color: '#000000', width: 2.5 }),
                placement: 'point',
                geometry: function(f) {
                    const g = f.getGeometry();
                    if (g.getType() === 'MultiPolygon') {
                        const polygons = g.getPolygons();
                        let largestPolygon = polygons[0];
                        for (let i = 1; i < polygons.length; i++) {
                            if (polygons[i].getArea() > largestPolygon.getArea()) {
                                largestPolygon = polygons[i];
                            }
                        }
                        return largestPolygon.getInteriorPoint(); 
                    }
                    return g.getInteriorPoint(); 
                },
                overflow: true // ওভারল্যাপের কারণে যেন কোনো ছোট দেশ ডিলিট না হয়
            }));

            return baseStyle;
        };

        const countryLayer = new ol.layer.Vector({
            source: vectorSource,
            style: styleFunction,
            declutter: false 
        });

        const map = new ol.Map({
            target: 'map',
            layers: [
                new ol.layer.Tile({ 
                    source: new ol.source.XYZ({ 
                        url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
                        wrapX: false 
                    }) 
                }),
                countryLayer
            ],
            view: new ol.View({ 
                center: ol.proj.fromLonLat([20, 15]), 
                zoom: 3, 
                minZoom: 2.5, 
                maxZoom: 8,   
                enableRotation: false 
            })
        });
    </script>
</body>
</html>
