<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global Map - Absolute Guaranteed Fix</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/openlayers/8.2.0/dist/ol.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/openlayers/8.2.0/ol.css">
    <style>body, html, #map { width: 100%; height: 100%; margin: 0; padding: 0; background-color: #0b1521; }</style>
</head>
<body>
    <div id="map"></div>
    <script>
        const shortNames = {
            "Democratic Republic of the Congo": "DR Congo",
            "Central African Republic": "C.A.R.",
            "Republic of the Congo": "Congo",
            "Equatorial Guinea": "Eq. Guinea",
            "Saint Vincent and the Grenadines": "St. Vincent",
            "Federated States of Micronesia": "Micronesia",
            "Papua New Guinea": "PNG",
            "Solomon Islands": "Solomons",
            "Marshall Islands": "Marshalls",
            "United States of America": "USA",
            "United Kingdom": "UK",
            "Saudi Arabia": "S. Arabia",
            "United Arab Emirates": "UAE",
            "Trinidad and Tobago": "Trinidad",
            "Antigua and Barbuda": "Antigua",
            "Saint Kitts and Nevis": "St. Kitts",
            "São Tomé and Príncipe": "São Tomé",
            "Saint Lucia": "St. Lucia",
            "Bosnia and Herzegovina": "Bosnia",
            "Dominican Republic": "Dominican Rep."
        };

        // আপনার দেওয়া সমস্ত নিখোঁজ দেশের মাস্টার-লিস্ট (এরা কখনো ডিলিট হবে না)
        const mustShowCountries = [
            "Vatican", "Holy See", "San Marino", "Monaco", "Andorra", "Liechtenstein", "Luxembourg", "Malta", "Cyprus",
            "Fiji", "Tuvalu", "Nauru", "Kiribati", "Samoa", "Tonga", "Palau", "Vanuatu", "Micronesia", "Marshall Islands", "Solomon Islands",
            "Bahamas", "Barbados", "Dominica", "Grenada", "Saint Lucia", "Saint Vincent", "Antigua", "Barbuda", "Saint Kitts", "Nevis", "Trinidad",
            "Cape Verde", "Cabo Verde", "São Tomé", "Sao Tome", "Seychelles", "Mauritius", "Comoros",
            "Maldives", "Bahrain", "Singapore", "Brunei", "Timor", "Timor-Leste", "Lebanon"
        ];

        function isPriorityCountry(name) {
            return mustShowCountries.some(c => name.includes(c));
        }

        // ভেক্টর সোর্স সম্পূর্ণ ফাঁকা রাখা হলো (যাতে উল্টাপাল্টা কিছু আগে লোড না হয়)
        const vectorSource = new ol.source.Vector({ wrapX: false });

        // ডাটা ম্যানুয়ালি ব্যাকগ্রাউন্ডে ডাউনলোড করে ফিল্টার করার লজিক
        fetch('https://cdn.jsdelivr.net/gh/datasets/geo-countries@master/data/countries.geojson')
            .then(res => res.json())
            .then(data => {
                const format = new ol.format.GeoJSON();
                const features = format.readFeatures(data, { featureProjection: 'EPSG:3857' });

                const countryMap = {};

                // ১. প্রতিটি দেশের নাম পড়ে শুধুমাত্র সবচেয়ে বড় ভূখণ্ডটিকে আলাদা করা হচ্ছে
                features.forEach(f => {
                    const name = f.get('ADMIN') || f.get('name') || f.get('NAME') || "";
                    if (!name) return;

                    const geom = f.getGeometry();
                    if (!geom) return;

                    const area = geom.getArea();
                    if (!countryMap[name] || area > countryMap[name].area) {
                        countryMap[name] = { area: area, feature: f };
                    }
                    
                    // শুরুতে সব দ্বীপের নামের পারমিশন বাতিল করা হলো
                    f.set('isLabel', false);
                });

                // ২. শুধুমাত্র প্রতিটি দেশের সবচেয়ে বড় ভূখণ্ডটিকে নাম দেখানোর সিল (isLabel = true) দেওয়া হলো
                Object.values(countryMap).forEach(item => {
                    item.feature.set('isLabel', true);
                });

                // ৩. ১০০% ফিল্টার হওয়ার পর ডাটাগুলো ওপেনলেয়ার্সকে দেওয়া হলো (কোনো ফ্ল্যাশিং বা আগে-পরে হওয়ার সুযোগ নেই)
                vectorSource.addFeatures(features);
            });

        const styleFunction = function(feature, resolution) {
            // সবার জন্য বর্ডার আঁকা
            const baseStyle = new ol.style.Style({
                stroke: new ol.style.Stroke({
                    color: 'rgba(255, 255, 255, 0.4)', 
                    width: 1.2
                })
            });

            // যদি এই টুকরোটি ওই দেশের সবচেয়ে বড় ভূখণ্ড না হয়, তবে শুধু বর্ডার দেখাবে, কোনো নাম বসাবে না!
            if (feature.get('isLabel') !== true) {
                return baseStyle; 
            }

            const rawName = feature.get('ADMIN') || feature.get('name') || feature.get('NAME') || "";
            const displayName = shortNames[rawName] || rawName;
            
            const geom = feature.getGeometry();
            const area = geom.getArea();
            const currentZoom = Math.round(Math.log2(40075016.686 / (256 * resolution)));

            let fontSize = Math.min(22, Math.max(9, Math.sqrt(area) / (resolution * 10)));
            
            // আপনার লিস্টের দেশগুলো রক্ষার লজিক (এরা যেকোনো জুমেই ম্যাপে থাকবে)
            if (isPriorityCountry(rawName) || isPriorityCountry(displayName)) {
                fontSize = 10; 
            } else if (area < 5000000000) { 
                // অন্যান্য সাধারণ ছোট দেশগুলো খুব বেশি জুম আউট করলে হিজিবিজি কমাতে হাইড হবে
                if (currentZoom < 3) return baseStyle; 
                fontSize = 11;
            }

            baseStyle.setText(new ol.style.Text({
                text: displayName,
                font: `bold ${fontSize}px "Arial Black", sans-serif`,
                fill: new ol.style.Fill({ color: '#FFFFFF' }),
                stroke: new ol.style.Stroke({ color: '#000000', width: 2.5 }),
                placement: 'point',
                geometry: function(f) {
                    const g = f.getGeometry();
                    if (g.getType() === 'MultiPolygon') {
                        const polygons = g.getPolygons();
                        let largestPolygon = polygons[0];
                        for (let i = 1; i < polygons.length; i++) {
                            if (polygons[i].getArea() > largestPolygon.getArea()) {
                                largestPolygon = polygons[i];
                            }
                        }
                        return largestPolygon.getInteriorPoint(); 
                    }
                    return g.getInteriorPoint(); 
                },
                overflow: true // ওভারল্যাপের কারণে আপনার কোনো দেশ গায়েব হবে না
            }));

            return baseStyle;
        };

        const countryLayer = new ol.layer.Vector({
            source: vectorSource,
            style: styleFunction,
            declutter: false 
        });

        const map = new ol.Map({
            target: 'map',
            layers: [
                new ol.layer.Tile({ 
                    source: new ol.source.XYZ({ 
                        url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
                        wrapX: false 
                    }) 
                }),
                countryLayer
            ],
            view: new ol.View({ 
                center: ol.proj.fromLonLat([20, 15]), 
                zoom: 3, 
                minZoom: 2.5, 
                maxZoom: 8,   
                enableRotation: false 
            })
        });
    </script>
</body>
</html>
