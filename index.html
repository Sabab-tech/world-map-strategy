<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global Map - Ultimate Version</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/openlayers/8.2.0/dist/ol.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/openlayers/8.2.0/ol.css">
    <style>body, html, #map { width: 100%; height: 100%; margin: 0; padding: 0; background-color: #0b1521; }</style>
</head>
<body>
    <div id="map"></div>
    <script>
        // বড় নামগুলোর সঠিক সংক্ষেপ রূপ
        const shortNames = {
            "Democratic Republic of the Congo": "DR Congo",
            "Central African Republic": "C.A.R.",
            "Republic of the Congo": "Congo",
            "Equatorial Guinea": "Eq. Guinea",
            "Saint Vincent and the Grenadines": "St. Vincent",
            "Federated States of Micronesia": "Micronesia",
            "Papua New Guinea": "PNG",
            "Solomon Islands": "Solomons",
            "Marshall Islands": "Marshalls",
            "United States of America": "USA",
            "United Kingdom": "UK",
            "Saudi Arabia": "S. Arabia",
            "United Arab Emirates": "UAE",
            "Trinidad and Tobago": "Trinidad",
            "Antigua and Barbuda": "Antigua",
            "Saint Kitts and Nevis": "St. Kitts",
            "São Tomé and Príncipe": "São Tomé",
            "Saint Lucia": "St. Lucia",
            "Bosnia and Herzegovina": "Bosnia",
            "Dominican Republic": "Dominican Rep."
        };

        // প্রতিটি ফিচারের ইউনিক আইডি ট্র্যাক করার জন্য গ্লোবাল অবজেক্ট
        let renderedFeatures = {};

        const styleFunction = function(feature, resolution) {
            const rawName = feature.get('admin') || feature.get('name') || "";
            const displayName = shortNames[rawName] || rawName; 

            // ওপেনলেয়ার্সের নিজস্ব অবজেক্ট আইডি বা ইউনিক নাম তৈরি করা
            const featureId = feature.get('iso_a3') || rawName;
            const currentZoom = Math.round(Math.log2(40075016.686 / (256 * resolution)));
            const area = feature.getGeometry().getArea();

            // ডুপ্লিকেট নাম প্রতিরোধ: এই ফিচারের নাম যদি অলরেডি এই রেন্ডারে বসে থাকে, তবে আর বসবে না
            if (renderedFeatures[featureId] && renderedFeatures[featureId] !== feature) {
                return new ol.style.Style({
                    stroke: new ol.style.Stroke({ color: 'rgba(255, 255, 255, 0.4)', width: 1.2 })
                });
            }
            renderedFeatures[featureId] = feature;

            // আনুপাতিক হারে স্পষ্ট ফন্ট সাইজ নির্ধারণ
            let fontSize = Math.min(22, Math.max(10, Math.sqrt(area) / (resolution * 10)));

            // আপনার দেওয়া দেশগুলো যাতে বাদ না পড়ে, তার জন্য জুম ফিল্টার লজিক
            if (area < 500000000) { // ভ্যাটিকান, মোনাকো, মালদ্বীপ ইত্যাদি ক্ষুদ্র দেশ
                if (currentZoom < 4) return null; // জুম ৪ এর নিচে জটলা এড়াতে দেখাবে না, জুম করলেই স্পষ্ট আসবে
                fontSize = 10;
            } else if (area < 5000000000) { // বাহামাস, লেবানন, ফিজি, সাইপ্রাস ইত্যাদি
                if (currentZoom < 3) return null; 
                fontSize = 11;
            }

            return new ol.style.Style({
                stroke: new ol.style.Stroke({
                    color: 'rgba(255, 255, 255, 0.4)', // হুবহু আগের বর্ডার
                    width: 1.2
                }),
                text: new ol.style.Text({
                    text: displayName,
                    font: `bold ${fontSize}px "Arial Black", sans-serif`,
                    fill: new ol.style.Fill({ color: '#FFFFFF' }),
                    stroke: new ol.style.Stroke({ color: '#000000', width: 2.5 }),
                    placement: 'point',
                    geometry: function(f) {
                        const geom = f.getGeometry();
                        // মাল্টি-পলিগন হলে শুধুমাত্র প্রধান মূল ভূখণ্ডের মাঝখানে নাম বসবে
                        if (geom.getType() === 'MultiPolygon') {
                            const polygons = geom.getPolygons();
                            let largestPolygon = polygons[0];
                            for (let i = 1; i < polygons.length; i++) {
                                if (polygons[i].getArea() > largestPolygon.getArea()) {
                                    largestPolygon = polygons[i];
                                }
                            }
                            return largestPolygon.getInteriorPoint();
                        }
                        return geom.getInteriorPoint(); 
                    },
                    overflow: true // নামের কারণে দেশ গায়েব হওয়া বন্ধ করবে
                })
            });
        };

        const countryLayer = new ol.layer.Vector({
            source: new ol.source.Vector({ 
                url: 'https://d2ad6b4ur7yvpq.cloudfront.net/naturalearth-3.3.0/ne_50m_admin_0_countries.geojson', 
                format: new ol.format.GeoJSON(),
                wrapX: false // ম্যাপ ডানে-বামে লুপ হওয়া বন্ধ করবে
            }),
            style: styleFunction
        });

        // প্রতিবার জুম বা প্যান করার সময় ট্র্যাকার অবজেক্ট রিফ্রেশ হবে
        countryLayer.on('prerender', function() {
            renderedFeatures = {};
        });

        const map = new ol.Map({
            target: 'map',
            layers: [
                new ol.layer.Tile({ 
                    source: new ol.source.XYZ({ 
                        url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
                        wrapX: false 
                    }) 
                }),
                countryLayer
            ],
            view: new ol.View({ 
                center: ol.proj.fromLonLat([20, 15]), 
                zoom: 3, 
                minZoom: 2.5, // পারফেক্ট জুম আউট সীমা
                maxZoom: 8,   // পারফেক্ট জুম ইন সীমা
                enableRotation: false 
            })
        });
    </script>
</body>
</html>
