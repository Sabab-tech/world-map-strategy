<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Age 3 - Tactical Overlay System</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #050b14; }
        #map { width: 100%; height: 100vh; }
        
        /* HUD Control Panel */
        .hud-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(5, 11, 20, 0.9);
            border: 1px solid #3a4d5c;
            color: #8fa0af;
            padding: 12px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 11px;
            z-index: 1000;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
            pointer-events: none; /* যাতে প্যানেলের ওপর ক্লিক না পড়ে */
        }
    </style>
</head>
<body>

    <div id="map"></div>
    
    <div class="hud-panel">
        <b style="color:#fff;">MODERN AGE III: OVERLAY SYSTEM</b><br><br>
        • TEXT: DISABLED<br>
        • BORDERS: INVISIBLE (DEFAULT)<br>
        • TACTICAL TOUCH: WHITE HIGHLIGHT ON
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // ১. কোর ইঞ্জিন চালুকরণ (জুম লেভেল ৩ থেকে ৫-এ লকড)
        const map = L.map('map', {
            center: [25.0, 40.0],
            zoom: 4,
            minZoom: 3,
            maxZoom: 5,
            zoomControl: true,
            maxBoundsViscosity: 1.0
        });

        // ২. পরিষ্কার স্যাটেলাইট ইমেজ লেয়ার
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Esri, Maxar'
        }).addTo(map);

        // ৩. ইন্টারেক্টিভ অদৃশ্য বর্ডার ইঞ্জিন
        let geojsonLayer;

        // ডিফল্ট স্টাইল (অদৃশ্য বর্ডার)
        const defaultStyle = {
            color: "transparent",
            weight: 0,
            fillOpacity: 0
        };

        // টাচ বা ক্লিক করলে যে স্টাইল হবে (সাদা স্মুথ বর্ডার)
        const highlightStyle = {
            color: "#ffffff",     // একদম সলিড সাদা রেখা
            weight: 1.5,          // অত্যন্ত স্মুথ রেখা
            fillColor: "#ffffff", 
            fillOpacity: 0.1      // ভেতরের অংশে হালকা সাদা গ্লো
        };

        // হাই-রেজোলিউশন ভেক্টর ডাটাবেজ ফেচ করা
        fetch('https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson')
            .then(res => res.json())
            .then(geoData => {
                geojsonLayer = L.geoJSON(geoData, {
                    style: defaultStyle, // ম্যাপ লোড হওয়ার সময় সব অদৃশ্য থাকবে
                    onEachFeature: function (feature, layer) {
                        
                        // টাচ/ক্লিক ইভেন্ট লিসেনার
                        layer.on('click', function (e) {
                            L.DomEvent.stopPropagation(e); // ফিক্স: ক্লিক ইভেন্ট ম্যাপে ছড়ানো বন্ধ করা হলো
                            
                            // নতুন দেশে টাচ করার সাথে সাথে আগের সব বর্ডার আবার অদৃশ্য হয়ে যাবে
                            geojsonLayer.resetStyle();
                            
                            // যে দেশে টাচ করা হয়েছে, শুধু সেটি হাইলাইট হবে
                            layer.setStyle(highlightStyle);
                            
                            // হাইলাইট করা বর্ডারটিকে সবার ওপরে নিয়ে আসা
                            if (!L.Browser.ie && !L.Browser.opera && !L.Browser.edge) {
                                layer.bringToFront();
                            }
                        });
                    }
                }).addTo(map);
                
                // ম্যাপের ফাঁকা জায়গায় (সাগরে) ক্লিক করলে সিলেকশন মুছে যাবে
                map.on('click', function(e) {
                    if (geojsonLayer) {
                        geojsonLayer.resetStyle();
                    }
                });

            }).catch(err => console.log("Border Engine Error: ", err));

    </script>
</body>
</html>
