<!DOCTYPE html>
<html>
<head>
    <title>Interactive Strategy Map Engine</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; }
        #map { height: 100vh; width: 100%; background: #000; }
        
        /* দেশের নামগুলোর প্রিমিয়াম গেম স্টাইল */
        .country-label {
            background: none !important;
            border: none !important;
            box-shadow: none !important;
            color: rgba(255, 255, 255, 0.85);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 11px;
            font-weight: bold;
            text-shadow: 0px 2px 4px #000, 0px -1px 2px #000;
            white-space: nowrap;
            pointer-events: none;
        }

        /* জিপিইউ এক্সিলারেশন লকিং */
        .leaflet-zoom-animated, .leaflet-pane {
            will-change: transform, opacity;
            transform-style: preserve-3d;
            backface-visibility: hidden;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var ultimateRenderer = L.canvas({ padding: 0.1, tolerance: 5 });

        var map = L.map('map', { 
            zoomControl: false,
            minZoom: 3,       // পরিবর্তন: সর্বোচ্চ উচ্চতা নির্ধারণ করা হলো (আর বেশি উপরে ওঠা যাবে না)
            maxZoom: 9,
            zoomSnap: 1,
            zoomDelta: 1,
            inertia: false,
            renderer: ultimateRenderer
        }).setView([20, 0], 3);

        // স্যাটেলাইট বেস লেয়ার
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Strategy Map',
            maxNativeZoom: 19,
            keepBuffer: 4,
            updateWhenIdle: true
        }).addTo(map);

        var geojsonLayer;
        var selectedLayer = null; // বর্তমানে সিলেক্টেড দেশ ধরে রাখার জন্য

        // জেসন ডেটা ইঞ্জিন
        fetch('https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson')
            .then(res => res.json())
            .then(data => {
                geojsonLayer = L.geoJSON(data, {
                    filter: function(feature) {
                        var name = feature.properties.ADMIN;
                        var code = feature.properties.ISO_A3;
                        return code !== "-99" && name !== "Somaliland" && name !== "Western Sahara";
                    },
                    style: function(feature) {
                        return {
                            color: "#ffffff",
                            weight: map.getZoom() > 5 ? 2.5 : 1.0, // ডায়নামিক বর্ডার রুল
                            opacity: 0.5,
                            fillColor: "#ffffff",
                            fillOpacity: 0.05 // টাচ বা ক্লিক ডিটেক্ট করার জন্য হালকা ওপাটিসিটি জরুরি
                        };
                    },
                    onEachFeature: function(feature, layer) {
                        var countryName = feature.properties.ADMIN;
                        
                        // দেশের নাম বসানো
                        if (layer.getBounds) {
                            layer.bindTooltip(countryName, {
                                permanent: true,
                                direction: 'center',
                                className: 'country-label',
                                opacity: 0.85
                            }).openTooltip();
                        }

                        // টাচ/ক্লিক ইন্টারঅ্যাকশন (দেশ সিলেক্ট করার লজিক)
                        layer.on({
                            click: function(e) {
                                // আগের সিলেক্ট করা দেশ থাকলে তা রিসেট করি
                                if (selectedLayer) {
                                    geojsonLayer.resetStyle(selectedLayer);
                                }

                                // নতুন দেশ সিলেক্ট এবং হাইলাইট (নিওন রেড বর্ডার)
                                selectedLayer = e.target;
                                selectedLayer.setStyle({
                                    color: "#ff3333",
                                    weight: map.getZoom() > 5 ? 3.5 : 2.5,
                                    opacity: 1.0,
                                    fillOpacity: 0.2
                                });

                                if (!L.Browser.ie && !L.Browser.opera && !L.Browser.edge) {
                                    selectedLayer.bringToFront();
                                }

                                console.log("Selected Country: " + countryName);
                                // এখানে আপনি ভবিষ্যতে আপনার 'Economy' বা 'Military' ইঞ্জিন যুক্ত করতে পারবেন
                            }
                        });
                    }
                }).addTo(map);
            });

        // জুম লেভেলের ওপর ভিত্তি করে বর্ডার মোটা বা চিকন করার রিয়েল-টাইম লজিক
        map.on('zoomend', function() {
            if (geojsonLayer) {
                var currentZoom = map.getZoom();
                geojsonLayer.eachLayer(function(layer) {
                    // যদি এই লেয়ারটি বর্তমানে সিলেক্টেড দেশ না হয়, তবেই সাধারণ জুম স্টাইল পাবে
                    if (layer !== selectedLayer) {
                        layer.setStyle({
                            weight: currentZoom > 5 ? 2.5 : 1.0 // জুম ৫ এর বেশি হলে বর্ডার বোল্ড (২.৫) হবে
                        });
                    }
                });
            }
        });
    </script>
</body>
</html>
