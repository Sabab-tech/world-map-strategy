<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Map - V36 Strict Border Fit Mechanics</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/openlayers/8.2.0/ol.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/openlayers/8.2.0/dist/ol.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #0b1521; overflow: hidden; touch-action: none; }
        #map { width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script>
        // সংক্ষেপণ তালিকা
        const shortNames = {
            "Democratic Republic of the Congo": "DR Congo",
            "Central African Republic": "C.A.R.",
            "Republic of the Congo": "Congo",
            "Equatorial Guinea": "Eq. Guinea",
            "United States of America": "USA",
            "United Kingdom": "UK",
            "Saudi Arabia": "S. Arabia",
            "United Arab Emirates": "UAE",
            "Dominican Republic": "Dominican Rep.",
            "The Bahamas": "Bahamas",
            "South Korea": "S. Korea",
            "North Korea": "N. Korea",
            "Russian Federation": "Russia",
            "Papua New Guinea": "PNG",
            "Bosnia and Herzegovina": "Bosnia",
            "Trinidad and Tobago": "Trinidad"
        };

        const manualCenters = {
            "South Korea": [127.90, 36.30],
            "North Korea": [127.10, 40.20],
            "Lebanon": [35.86, 33.85],
            "Vietnam": [108.00, 14.00],
            "Chile": [-71.50, -35.00],
            "Israel": [34.85, 31.04]
        };

        const borderSource = new ol.source.Vector({ wrapX: false }); 
        const labelSource = new ol.source.Vector({ wrapX: false });  

        // ডেটাবেজ ফেচ ও জ্যামিতিক বিশ্লেষণ
        fetch('https://d2ad6b4ur7yvpq.cloudfront.net/naturalearth-3.3.0/ne_50m_admin_0_countries.geojson')
            .then(res => res.json())
            .then(data => {
                const format = new ol.format.GeoJSON();
                const features = format.readFeatures(data, { featureProjection: 'EPSG:3857' });

                borderSource.addFeatures(features);

                const countryMaxPolygon = {};
                features.forEach(f => {
                    const name = f.get('admin') || f.get('name') || "";
                    if (!name) return;
                    const area = f.getGeometry().getArea();
                    if (!countryMaxPolygon[name] || area > countryMaxPolygon[name].area) {
                        countryMaxPolygon[name] = { area: area, feature: f };
                    }
                });

                const labelFeatures = [];

                Object.values(countryMaxPolygon).forEach(item => {
                    const rawName = item.feature.get('admin') || item.feature.get('name') || "";
                    const geom = item.feature.getGeometry();
                    let centerPoint;
                    let largestPolyGeom = geom;

                    // সবচেয়ে বড় ভূখণ্ড (Largest Landmass) বের করার লজিক (যাতে ছড়ানো দ্বীপের কারণে সাইজ ভুল না হয়)
                    if (geom.getType() === 'MultiPolygon') {
                        const polygons = geom.getPolygons();
                        let largest = polygons[0];
                        for (let i = 1; i < polygons.length; i++) {
                            if (polygons[i].getArea() > largest.getArea()) largest = polygons[i];
                        }
                        largestPolyGeom = largest;
                        centerPoint = largest.getInteriorPoint(); 
                    } else {
                        centerPoint = geom.getInteriorPoint();
                    }

                    // শুধুমাত্র মূল ভূখণ্ডের উচ্চতা ও প্রস্থ মাপা হচ্ছে
                    const extent = largestPolyGeom.getExtent();
                    const width = extent[2] - extent[0];
                    const height = extent[3] - extent[1];
                    const isVerticalCountry = (height / width) > 1.25; 

                    if (manualCenters[rawName] || manualCenters[shortNames[rawName]]) {
                        const coords = manualCenters[rawName] || manualCenters[shortNames[rawName]];
                        centerPoint = new ol.geom.Point(ol.proj.fromLonLat(coords));
                    } 

                    if (centerPoint) {
                        labelFeatures.push(new ol.Feature({ 
                            geometry: centerPoint, 
                            name: rawName, 
                            area: item.area,
                            isVertical: isVerticalCountry,
                            polyWidth: width,   // আসল প্রস্থ ডেটাবেজে সেভ করা হলো
                            polyHeight: height  // আসল উচ্চতা ডেটাবেজে সেভ করা হলো
                        }));
                    }
                });

                labelSource.addFeatures(labelFeatures);
            });

        const borderLayer = new ol.layer.Vector({
            source: borderSource,
            style: new ol.style.Style({ stroke: new ol.style.Stroke({ color: 'rgba(255, 255, 255, 0.35)', width: 1.5 }) })
        });

        // 🟢 মেইন গেম-চেঞ্জিং টেক্সট রেন্ডার ইঞ্জিন
        const labelStyleFunction = function(feature, resolution) {
            const rawName = feature.get('name') || "";
            const displayName = shortNames[rawName] || rawName;
            const area = feature.get('area') || 0;
            const isVertical = feature.get('isVertical');
            
            // রেজোলিউশন অনুযায়ী স্ক্রিনে দেশের সাইজ পিক্সেল হিসেবে কনভার্ট করা
            const polyWidth = feature.get('polyWidth');
            const polyHeight = feature.get('polyHeight');
            const widthPx = polyWidth / resolution;
            const heightPx = polyHeight / resolution;

            // বর্ডারের ভেতরে রাখার জন্য ফাঁকা জায়গার হিসেব (৮০% জায়গা ব্যবহার করবে, ২০% গ্যাপ থাকবে)
            let availableSpacePx = widthPx * 0.80; 
            if (isVertical) {
                // দেশ লম্বা বা কাত হলে ডায়াগোনাল জায়গা হিসাব করবে
                availableSpacePx = Math.sqrt(widthPx * widthPx + heightPx * heightPx) * 0.65;
            }

            // ক্যারেক্টার অনুযায়ী সর্বোচ্চ ফন্ট সাইজের কঠোর ম্যাথ (যাতে বর্ডার ক্রস না করে)
            const charCount = displayName.length;
            const maxAllowedFontSize = availableSpacePx / (charCount * 0.52);

            const currentZoom = Math.round(Math.log2(40075016.686 / (256 * resolution)));

            let minZoomToShow = 5; 
            let baseSize = 10; 

            if (["Russia", "Canada", "China", "USA", "Brazil", "Australia"].includes(displayName)) {
                minZoomToShow = 2.5; baseSize = 14;
            } else if (area > 200000000000) { 
                minZoomToShow = 3.5; baseSize = 11;
            } else if (area > 50000000000) {  
                minZoomToShow = 4.5; baseSize = 9;
            } else { 
                minZoomToShow = 5; baseSize = 8;
            }

            if (currentZoom < minZoomToShow) return null;

            // জুম ইন সাইজ ক্যালকুলেশন
            let dynamicFontSize = baseSize + ((currentZoom - minZoomToShow) * 1.5);

            // ⛔ বর্ডার-ক্রসিং আটকানোর চূড়ান্ত ফিল্টার
            dynamicFontSize = Math.min(dynamicFontSize, maxAllowedFontSize);
            dynamicFontSize = Math.min(dynamicFontSize, baseSize + 6); // ওভারসাইজ আটকানো

            // যদি লেখা এত ছোট হয়ে যায় যে পড়া যাবে না, তবে লেয়ারটি লুকিয়ে ফেলবে (হিজিবিজি রোধ)
            if (dynamicFontSize < 6) return null;

            let textRotation = 0;
            if (isVertical) {
                textRotation = -0.60; 
            }

            // কালো বর্ডারের পুরুত্ব ফন্ট সাইজের সাথে মানানসই করা হলো
            let strokeWidth = Math.max(1.8, dynamicFontSize * 0.12);

            return new ol.style.Style({
                text: new ol.style.Text({
                    text: displayName.toUpperCase(), 
                    font: `900 ${dynamicFontSize}px "Impact", "Arial Narrow", sans-serif`,
                    fill: new ol.style.Fill({ color: '#FFFDF0' }), 
                    stroke: new ol.style.Stroke({ color: '#000000', width: strokeWidth }), 
                    rotation: textRotation,
                    overflow: false 
                }),
                zIndex: Math.round(100 - dynamicFontSize) 
            });
        };

        const labelLayer = new ol.layer.Vector({ source: labelSource, style: labelStyleFunction, declutter: true });

        const map = new ol.Map({
            target: 'map',
            layers: [
                new ol.layer.Tile({ 
                    source: new ol.source.XYZ({ url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', wrapX: false }) 
                }),
                borderLayer, 
                labelLayer 
            ],
            view: new ol.View({ 
                center: ol.proj.fromLonLat([20, 15]), 
                zoom: 3, 
                minZoom: 2.5, 
                maxZoom: 12, 
                enableRotation: false 
            })
        });

        // সিলেকশন মেকানিজম
        const selectStyle = new ol.style.Style({
            fill: new ol.style.Fill({ color: 'rgba(255, 255, 255, 0.22)' }),
            stroke: new ol.style.Stroke({ color: '#00FFFF', width: 2.5 })
        });

        const selectInteraction = new ol.interaction.Select({
            layers: [borderLayer], style: selectStyle, multi: false, hitTolerance: 15
        });
        map.addInteraction(selectInteraction);

        selectInteraction.on('select', function(e) {
            const selectedFeaturesCollection = selectInteraction.getFeatures();
            if (e.selected.length > 0) {
                const clickedFeature = e.selected[0];
                const countryName = clickedFeature.get('admin') || clickedFeature.get('name');
                selectedFeaturesCollection.clear(); 
                if (countryName) {
                    borderSource.getFeatures().forEach(f => {
                        const fName = f.get('admin') || f.get('name');
                        if (fName === countryName) selectedFeaturesCollection.push(f);
                    });
                }
            }
        });
    </script>
</body>
</html>
