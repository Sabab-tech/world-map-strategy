<!DOCTYPE html>
<html>
<head>
    <title>Perfect World Map with Country Names</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #000; }
        #map { height: 100vh; width: 100%; }
        
        /* দেশের নামগুলোর স্টাইল: একদম ক্লিন, ব্যাকগ্রাউন্ড ছাড়া শুধু টেক্সট */
        .country-label {
            background: none !important;
            border: none !important;
            box-shadow: none !important;
            color: rgba(255, 255, 255, 0.85);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 10px;
            font-weight: bold;
            text-shadow: 1px 1px 2px #000, -1px -1px 2px #000; /* লেখা সহজে পড়ার জন্য শ্যাডো */
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // হার্ডওয়্যার এক্সিলারেশন এবং SVG স্মুথ রেন্ডারার চালু করা
        var svgRenderer = L.svg({ padding: 0.1 });

        var map = L.map('map', { 
            zoomControl: false,
            minZoom: 2,  
            maxZoom: 9,
            zoomSnap: 1,
            zoomDelta: 1,
            preferCanvas: false, // SVG ব্যবহার করব নিখুঁত শার্পনেসের জন্য
            renderer: svgRenderer
        }).setView([20, 0], 2);

        // স্যাটেলাইট বেস লেয়ার
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Satellite Map',
            keepBuffer: 4,
            updateWhenIdle: false // স্ক্রোল করার সময়ই যেন লোড হয়, অলস বসে থাকবে না
        }).addTo(map);

        // জিও-জেসন বর্ডার ও নাম লোড করার ইঞ্জিন
        fetch('https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson')
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, {
                    filter: function(feature) {
                        var name = feature.properties.ADMIN;
                        var code = feature.properties.ISO_A3;
                        // জাতিসংঘ অ-স্বীকৃত দেশ ফিল্টার
                        if (code === "-99" || name === "Somaliland" || name === "Western Sahara") {
                            return false;
                        }
                        return true;
                    },
                    style: {
                        color: "#ffffff",
                        weight: 1.0,      // একদম চিকন ও সূক্ষ্ম বর্ডার
                        opacity: 0.5,      // হালকা সাদা ধোঁয়াশা লুক
                        fillOpacity: 0
                    },
                    onEachFeature: function(feature, layer) {
                        // প্রতিটি দেশের নাম বের করা হচ্ছে
                        var countryName = feature.properties.ADMIN;
                        
                        // দেশের সীমানার কেন্দ্রবিন্দু (Center) বের করার লজিক
                        if (layer.getBounds) {
                            var center = layer.getBounds().getCenter();
                            
                            // ম্যাপে দেশের নাম স্থায়ীভাবে বসানো (Permanent Tooltip)
                            layer.bindTooltip(countryName, {
                                permanent: true,
                                direction: 'center',
                                className: 'country-label'
                            }).openTooltip();
                        }
                    }
                }).addTo(map);
            });
    </script>
</body>
</html>
