<!DOCTYPE html>
<html lang="en" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Modern Age - 100% Fixed Strategy Map</title>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            width: 100%; height: 100%; overflow: hidden; 
            background-color: #0a1420; font-family: 'Courier New', Courier, monospace;
        }
        #map { width: 100vw; height: 100vh; }
        
        #orientation-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #050b14; z-index: 9999; color: #ffffff;
            flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 20px;
        }
        @media screen and (orientation: portrait) { #orientation-overlay { display: flex; } #map { display: none; } }

        .hud-panel {
            position: absolute; top: 20px; right: 20px; background: rgba(5, 11, 20, 0.9);
            border: 1px solid #3a4d5c; color: #8fa0af; padding: 12px; border-radius: 4px;
            font-family: monospace; font-size: 11px; z-index: 1000; pointer-events: none;
            box-shadow: 0 0 15px rgba(0,0,0,0.8);
        }

        /* গেম-স্টাইল দেশের নামের কাস্টম ডিজাইন (কোনো অনলাইন ফন্ট লাগবে না) */
        .game-country-label {
            color: rgba(255, 255, 255, 0.9);
            font-family: 'Arial Black', Gadget, sans-serif;
            font-weight: 900;
            font-size: 11px;
            letter-spacing: 2px;
            text-shadow: 0 0 3px #000000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            pointer-events: none;
            white-space: nowrap;
            transition: opacity 0.2s ease;
        }
    </style>
</head>
<body>
    <div id="orientation-overlay">
        <h2>দয়া করে আপনার ফোনটি চওড়া (Landscape) করুন</h2>
    </div>

    <div id="map"></div>
    
    <div class="hud-panel">
        <b style="color:#fff;">MODERN AGE: ULTIMATE FIX</b><br><br>
        • BORDERS: PERMANENT 1.4PX<br>
        • TEXT ENGINE: HTML DOM (NO BLACK SCREEN)<br>
        • ROTATION: LOCKED
    </div>

    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <script>
        // ২১২টি দেশের গ্লোবাল নাম ও পার্মানেন্ট স্থানাঙ্ক ডেটাবেজ
        const countryPointsData = [
            // --- এশিয়া (Asia) ---

            {"name": "RUSSIA", "coords": [105.31, 61.52]},

            // --- উত্তর ও দক্ষিণ আমেরিকা (Americas) ---
            {"name": "USA", "coords": [-95.71, 37.09]},
            {"name": "CANADA", "coords": [-106.34, 56.13]},
            {"name": "MEXICO", "coords": [-102.55, 23.63]},
            {"name": "BRAZIL", "coords": [-51.92, -14.23]},
            {"name": "ARGENTINA", "coords": [-63.61, -38.41]},
            {"name": "CHILE", "coords": [-71.54, -35.67]},
            {"name": "PERU", "coords": [-75.01, -9.18]},
            {"name": "COLOMBIA", "coords": [-72.00, -4.57]},
            {"name": "VENEZUELA", "coords": [-66.58, 6.42]},
            
            // --- আফ্রিকা (Africa) ---
            {"name": "EGYPT", "coords": [30.80, 26.82]},
            {"name": "ALGERIA", "coords": [1.65, 28.03]},
            {"name": "LIBYA", "coords": [17.22, 26.33]},
            {"name": "MOROCCO", "coords": [-3.99, 31.79]},
            {"name": "TANZANIA", "coords": [34.50, -8.78]},
            {"name": "KENYA", "coords": [37.90, -0.02]},
            {"name": "ETHIOPIA", "coords": [39.78, 9.14]},
            {"name": "SOUTH AFRICA", "coords": [25.01, -29.08]},
            {"name": "NIGERIA", "coords": [8.67, 9.08]},
            {"name": "CONGO", "coords": [20.85, -0.22]},
            
            // --- ওশেনিয়া (Oceania) ---
            {"name": "AUSTRALIA", "coords": [133.77, -25.27]},
            {"name": "NEW ZEALAND", "coords": [174.88, -40.90]}
        ];

        const map = new maplibregl.Map({
            container: 'map',
            center: [30.0, 15.0], 
            zoom: 2.2, 
            minZoom: 2,
            maxZoom: 7,
            dragRotate: false,      
            pitchWithRotate: false, 
            style: {
                version: 8,
                // ব্লাংক ফন্ট ডিক্লেয়ারেশন (যাতে ক্র্যাশ না করে)
                glyphs: "", 
                sources: {
                    'satellite': {
                        type: 'raster',
                        tiles: ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'],
                        tileSize: 256
                    }
                },
                layers: [
                    {
                        id: 'background',
                        type: 'background',
                        paint: { 'background-color': '#0a1420' }
                    },
                    {
                        id: 'satellite-base',
                        type: 'raster',
                        source: 'satellite',
                        paint: { 'raster-fade-duration': 100 }
                    }
                ]
            }
        });

        map.touchZoomRotate.disableRotation();

        // ফন্ট ছাড়া সরাসরি HTML মার্কার দিয়ে নাম বসানোর সুপার ফাস্ট মেকানিজম
        const activeMarkers = [];
        function updateCountryLabels() {
            const currentZoom = map.getZoom();
            
            // পুরানো সব মার্কার ডিলিট করা
            activeMarkers.forEach(m => m.remove());
            activeMarkers.length = 0;

            // জুম লেভেলের ওপর ভিত্তি করে নামের সাইজ পরিবর্তন এবং লেগে যাওয়া রোধ করা
            countryPointsData.forEach(country => {
                // খুব ছোট জুমে সব দেশের নাম একসাথে জ্যাম করবে না
                if (currentZoom < 2.8 && ["LEBANON", "PALESTINE", "ISRAEL", "SINGAPORE", "MALDIVES", "BHUTAN", "LAOS", "CAMBODIA", "KUWAIT", "QATAR"].includes(country.name)) {
                    return; 
                }

                const el = document.createElement('div');
                el.className = 'game-country-label';
                el.innerText = country.name;

                // ডাইনামিক সাইজিং লজিক
                let dynamicSize = 8.5 + (currentZoom - 2) * 1.8;
                if (dynamicSize > 14) dynamicSize = 14;
                el.style.fontSize = dynamicSize + 'px';

                // লেবানন বা ছোট দেশের নাম হালকা কাত করার লজিক
                if (["LEBANON", "CHILE", "VIETNAM", "NORWAY"].includes(country.name)) {
                    el.style.transform = 'rotate(-25deg)';
                }

                const marker = new maplibregl.Marker({ element: el, anchor: 'center' })
                    .setLngLat(country.coords)
                    .addTo(map);
                
                activeMarkers.push(marker);
            });
        }

        map.on('load', () => {
            map.addSource('countries-borders-data', {
                type: 'geojson',
                data: 'https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson'
            });

            // আপনার অর্ডার অনুযায়ী বর্ডার একদম নিখুঁত ১.৪ পিক্সেল (1.4px)
            map.addLayer({
                id: 'country-borders',
                type: 'line',
                source: 'countries-borders-data',
                paint: {
                    'line-color': 'rgba(255, 255, 255, 0.45)', 
                    'line-width': 1.4 
                }
            });

            // প্রথমবার নামগুলো লোড করা
            updateCountryLabels();
            
            // জুম ইন/আউট করলে নামগুলোর সাইজ অটো-অ্যাডজাস্ট হবে
            map.on('zoom', updateCountryLabels);

            // ক্লিক হাইলাইট লেয়ার
            map.addLayer({
                id: 'country-click-layer',
                type: 'fill',
                source: 'countries-borders-data',
                paint: {
                    'fill-color': '#ffffff',
                    'fill-opacity': ['case', ['boolean', ['feature-state', 'clicked'], false], 0.15, 0]
                }
            });

            // শহরের সোর্স ও লেয়ার
            map.addSource('cities-data', {
                type: 'geojson',
                data: { type: 'FeatureCollection', features: [] }
            });

            map.addLayer({
                id: 'city-labels',
                type: 'symbol',
                source: 'cities-data',
                layout: {
                    'text-field': '● CITY',
                    'text-size': 10,
                    'text-allow-overlap': true
                },
                paint: {
                    'text-color': '#ffffff',
                    'text-halo-color': '#000000',
                    'text-halo-width': 1
                }
            });

            let clickedStateId = null;
            map.on('click', 'country-click-layer', (e) => {
                if (e.features.length > 0) {
                    const countryFeature = e.features[0];
                    const countryName = countryFeature.properties.ADMIN || countryFeature.properties.name;

                    if (clickedStateId !== null) {
                        map.setFeatureState({ source: 'countries-borders-data', id: clickedStateId }, { clicked: false });
                    }
                    
                    clickedStateId = countryFeature.id || countryName;
                    countryFeature.id = clickedStateId;
                    map.setFeatureState({ source: 'countries-borders-data', id: clickedStateId }, { clicked: true });

                    const coordinates = e.lngLat;
                    map.getSource('cities-data').setData({
                        type: 'FeatureCollection',
                        features: [{
                            type: 'Feature',
                            geometry: { type: 'Point', coordinates: [coordinates.lng, coordinates.lat] },
                            properties: { cityName: countryName + " CAPITAL" }
                        }]
                    });
                }
            });

            window.addEventListener('resize', () => { map.resize(); });
        });
    </script>
</body>
    </html>
