<!DOCTYPE html>
<html>
<head>
    <title>Global Map</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/openlayers/8.2.0/ol.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/openlayers/8.2.0/ol.css">
    <style>
        body, html, #map { width: 100%; height: 100%; margin: 0; padding: 0; background-color: #f0f0f0; } /* কালো ব্যাকগ্রাউন্ড সরিয়ে হালকা গ্রে দেওয়া হয়েছে */
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        const map = new ol.Map({
            target: 'map',
            layers: [
                new ol.layer.Tile({ source: new ol.source.OSM() }) // সরাসরি OSM টাইলস ব্যবহার করা হয়েছে যেন সহজে লোড হয়
            ],
            view: new ol.View({ center: [0, 0], zoom: 2 })
        });
    </script>
</body>
</html>
