<!DOCTYPE html>
<html>
<head>
    <title>Ultimate 3D Strategy Map Engine</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; }
        #map { height: 100vh; width: 100%; background: #000; }
        
        /* ডাইনামিক ৩ডি গেম টেক্সট স্টাইল */
        .game-country-label {
            background: none !important; border: none !important; box-shadow: none !important;
            color: #f1f5f9; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            font-weight: 900; letter-spacing: 1px;
            white-space: nowrap; pointer-events: none; display: block; text-align: center;
            text-shadow: 
                1px 1px 0px #334155,
                2px 2px 0px #1e293b,
                3px 3px 6px rgba(0, 0, 0, 0.95);
        }

        /* স্ট্র্যাটেজি গেম থিম পপআপ (১০০% স্পষ্ট ও বড় টেক্সট) */
        .game-popup .leaflet-popup-content-wrapper {
            background: #0f172a !important; color: #f8fafc !important;
            border: 2px solid #38bdf8 !important; border-radius: 8px !important;
            font-family: 'Segoe UI', Roboto, sans-serif !important; 
            box-shadow: 0 6px 20px rgba(0,0,0,0.7) !important;
            padding: 12px 16px !important;
        }
        .game-popup .leaflet-popup-tip { background: #0f172a !important; border: 2px solid #38bdf8 !important; }
        
        /* পপআপ ইন্টারনাল টেক্সট কন্ট্রোল */
        .game-popup-title { font-size: 19px; font-weight: bold; color: #ffffff; display: block; margin-bottom: 4px; }
        .role-capital { color: #38bdf8; font-weight: bold; font-size: 14px; text-transform: uppercase; }
        .role-economic { color: #eab308; font-weight: bold; font-size: 14px; text-transform: uppercase; }
        .role-military { color: #ef4444; font-weight: bold; font-size: 14px; text-transform: uppercase; }
        .role-secret { color: #a855f7; font-weight: bold; font-size: 14px; text-transform: uppercase; }
        .game-popup-desc { font-size: 14px; color: #cbd5e1; display: block; margin-top: 6px; line-height: 1.4; }
        .game-popup-status { color: #f87171; font-size: 12px; font-weight: bold; display: block; margin-top: 4px; }

        /* জিপিইউ লকিং */
        .leaflet-zoom-animated, .leaflet-pane {
            will-change: transform, opacity; transform-style: preserve-3d; backface-visibility: hidden;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // গেম গ্রিডের সম্পূর্ণ এশিয়ান দেশের তালিকা
        const gameCountries = [
            "Bangladesh", "India", "Pakistan", "Nepal", "Sri Lanka", "Bhutan", "Maldives", "Afghanistan",
            "Indonesia", "Vietnam", "Thailand", "Malaysia", "Singapore", "Philippines", "Myanmar", "Cambodia", "Laos", "Brunei", "Timor-Leste",
            "China", "Japan", "South Korea", "North Korea", "Mongolia", "Taiwan", "Iran", "Saudi Arabia", "Turkey"
        ];

        var locationsRegistry = {}; 
        var labelMarkersList = []; // দেশের নামগুলোর ডাইনামিক ট্র্যাকার
        var currentActiveCountry = null; 
        
        var bounds = L.latLngBounds(L.latLng(-60, -180), L.latLng(85, 180));
        var map = L.map('map', { 
            zoomControl: false, minZoom: 3.8, maxZoom: 9, zoomSnap: 0.1, zoomDelta: 1,
            maxBounds: bounds, maxBoundsViscosity: 1.0, inertia: false
        }).setView([22, 80], 3.8);

        // স্যাটেলাইট লেয়ার
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Strategy Map Engine', maxNativeZoom: 19, keepBuffer: 4, updateWhenIdle: true
        }).addTo(map);

        // শহর বা পয়েন্টের জন্য ডেডিকেটেড গ্রুপ লেয়ার (বর্ডারের ওপরে রাখার জন্য)
        var hubsGroupLayer = L.layerGroup().addTo(map);
        var geojsonLayer, selectedLayer = null;
        var renderedCountries = new Set();

        // ১. জুম লেভেল অনুযায়ী দেশের নামের ফন্ট সাইজ ডাইনামিক পরিবর্তন ফাংশন
        function getFontSizeForZoom(zoom, isSmall) {
            let baseSize = isSmall ? 9 : 12;
            if (zoom > 3.8) baseSize += (zoom - 3.8) * 4.5; 
            return baseSize;
        }

        // ২. জুম লেভেল অনুযায়ী শহরের ডট বা মার্কারের ব্যাসার্ধ নির্ধারণ ফাংশন
        function getMarkerRadiusForZoom(zoom) {
            if (zoom <= 4.2) return 5;
            if (zoom <= 5.5) return 7;
            if (zoom <= 7.0) return 10;
            return 13; 
        }

        // লম্বা দেশের বর্ডার বাঁচিয়ে নাম ঘুরিয়ে দেওয়ার ক্যালকুলেটর
        function calculateTextRotation(layerBounds) {
            var northEast = layerBounds.getNorthEast(), southWest = layerBounds.getSouthWest();
            var latDiff = northEast.lat - southWest.lat;
            var lngDiff = northEast.lng - southWest.lng;
            if (latDiff > lngDiff * 1.3) { return 45; }
            return 0;
        }

        // `cities.json` থেকে ডাটা রিড করা
        function loadGameCities() {
            fetch('cities.json')
                .then(res => res.json())
                .then(data => {
                    if(data.regions) {
                        locationsRegistry = {};
                        for (let reg in data.regions) { Object.assign(locationsRegistry, data.regions[reg].countries); }
                    } else if(data.countries) {
                        locationsRegistry = {};
                        data.countries.forEach(c => { locationsRegistry[c.name] = c; });
                    } else { locationsRegistry = data; }
                    console.log("Cities engine successfully linked.");
                })
                .catch(err => console.log("Waiting for database sync..."));
        }

        // শহরের পয়েন্ট বা ডট রেন্ডারিং ইঞ্জিন
        function renderCountryHubs() {
            hubsGroupLayer.clearLayers(); 
            if (!currentActiveCountry) return;

            const countryData = locationsRegistry[currentActiveCountry];
            if (!countryData) return;

            let hubs = [];
            if (countryData.capital) hubs.push({ ...countryData.capital, role: 'capital' });
            if (countryData.economic) countryData.economic.forEach(h => hubs.push({ ...h, role: 'economic' }));
            if (countryData.military) countryData.military.forEach(h => hubs.push({ ...h, role: 'military' }));
            if (countryData.secret) countryData.secret.forEach(h => hubs.push({ ...h, role: 'secret' }));

            var currentRadius = getMarkerRadiusForZoom(map.getZoom());

            hubs.forEach(hub => {
                var latitude = hub.lat, longitude = hub.lon || hub.lng;
                if (!latitude || !longitude) return;

                var color = '#38bdf8';
                if (hub.role === 'economic') color = '#eab308';
                if (hub.role === 'military') color = '#ef4444';
                if (hub.role === 'secret') color = '#a855f7';

                var hubMarker = L.circleMarker([latitude, longitude], {
                    radius: currentRadius, 
                    fillColor: color, color: '#ffffff', weight: 2.5, fillOpacity: 0.95
                });

                var popupContent = `
                    <div class="game-popup">
                        <span class="game-popup-title">${hub.name}</span>
                        <span class="role-${hub.role || 'economic'}">${hub.role}</span>
                        <span class="game-popup-desc">${hub.description || ''}</span>
                        ${hub.status ? `<span class="game-popup-status">STATUS: ${hub.status.toUpperCase()}</span>` : ''}
                    </div>
                `;
                
                hubMarker.bindPopup(popupContent, { maxWidth: 350, className: 'game-popup' });
                hubsGroupLayer.addLayer(hubMarker);
            });
        }

        // জিও-জেসন বর্ডার ও দেশের নাম লকার মেকানিজম
        fetch('https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson')
            .then(res => res.json())
            .then(data => {
                geojsonLayer = L.geoJSON(data, {
                    filter: function(feature) {
                        var name = feature.properties.ADMIN || feature.properties.name;
                        return gameCountries.includes(name);
                    },
                    style: function() {
                        return { color: "#ffffff", weight: map.getZoom() > 5.5 ? 2.3 : 0.9, opacity: 0.4, fillColor: "#ffffff", fillOpacity: 0.01 };
                    },
                    onEachFeature: function(feature, layer) {
                        var countryName = feature.properties.ADMIN || feature.properties.name;
                        
                        if (layer.getBounds) {
                            var countryBounds = layer.getBounds();
                            var centerLatLng = countryBounds.getCenter(); // পারফেক্ট জ্যামিতিক মাঝখান

                            if (!renderedCountries.has(countryName)) {
                                renderedCountries.add(countryName);
                                
                                var rotationAngle = calculateTextRotation(countryBounds);
                                var isSmallCountry = (countryBounds.getNorthEast().lat - countryBounds.getSouthWest().lat < 4.5);
                                var fontSizeNum = getFontSizeForZoom(map.getZoom(), isSmallCountry);

                                // ডম থেকে আইডি উধাও হয়ে যাওয়া রুখতে মার্কার অবজেক্টের ভেতরেই ডাইনামিক স্টাইল রেন্ডার
                                var labelMarker = L.marker(centerLatLng, {
                                    icon: L.divIcon({
                                        className: 'game-country-label',
                                        html: `<div class="txt-render" style="transform: rotate(${rotationAngle}deg); font-size: ${fontSizeNum}px;">${countryName}</div>`,
                                        iconSize: [160, 30], iconAnchor: [80, 15]
                                    }),
                                    interactive: false 
                                });

                                if (!isSmallCountry || map.getZoom() > 5.2) {
                                    labelMarker.addTo(map);
                                }
                                
                                labelMarkersList.push({ country: countryName, marker: labelMarker, isSmall: isSmallCountry, angle: rotationAngle });
                            }

                            // দেশের সীমানায় টাচ/ক্লিক ইভেন্ট লকিং
                            layer.on({
                                click: function(e) {
                                    L.DomEvent.stopPropagation(e); // ইভেন্ট ব্লকার জ্যামিং প্রতিরোধ
                                    
                                    if (selectedLayer) geojsonLayer.resetStyle(selectedLayer);
                                    selectedLayer = e.target;
                                    
                                    selectedLayer.setStyle({ 
                                        color: "#e6fffa", weight: map.getZoom() > 5.5 ? 3.5 : 2.5, opacity: 0.9, fillColor: "#e6fffa", fillOpacity: 0.1 
                                    });
                                    
                                    currentActiveCountry = countryName;
                                    renderCountryHubs(); // শহর লোড করা
                                }
                            });
                        }
                    }
                }).addTo(map);

                loadGameCities();
            });

        // গলোবাল জুম পরিবর্তন হ্যান্ডলার (নামের ফন্ট ও শহর একসাথে লাইভ স্কেল করার লুপ)
        map.on('zoomend', function() {
            var currentZoom = map.getZoom();
            
            // ১. বর্ডার উইথ আপডেট
            if (geojsonLayer) {
                geojsonLayer.eachLayer(function(layer) {
                    layer.setStyle({ weight: layer === selectedLayer ? (currentZoom > 5.5 ? 3.5 : 2.5) : (currentZoom > 5.5 ? 2.3 : 0.9) });
                });
            }

            // ২. দেশের নামের টেক্সট রিয়েল-টাইম রেন্ডারিং (শতভাগ ফিক্সড!)
            labelMarkersList.forEach(function(item) {
                if (item.isSmall) {
                    if (currentZoom > 5.2) {
                        if (!map.hasLayer(item.marker)) item.marker.addTo(map);
                    } else {
                        if (map.hasLayer(item.marker)) map.removeLayer(item.marker);
                    }
                }
                
                var size = getFontSizeForZoom(currentZoom, item.isSmall);
                // লিফলেটের মার্কার আইকনকে সরাসরি ইন্টারনাল কোড দিয়ে রি-রাইট করা হচ্ছে যেন আইডি ক্র্যাশ না করে
                item.marker.setIcon(L.divIcon({
                    className: 'game-country-label',
                    html: `<div style="transform: rotate(${item.angle}deg); font-size: ${size}px;">${item.country}</div>`,
                    iconSize: [160, 30], iconAnchor: [80, 15]
                }));
            });

            // ৩. শহরগুলোকে নতুন ব্যাসার্ধের সাথে সাথে ইনস্ট্যান্ট রি-রেন্ডার
            if (currentActiveCountry) {
                renderCountryHubs();
            }
        });

        // ম্যাপের ফাঁকা জায়গায় ক্লিক করলে রিসেট করার ব্যাকগ্রাউন্ড লুপ
        map.on('click', function() {
            if (selectedLayer) {
                geojsonLayer.resetStyle(selectedLayer);
                selectedLayer = null;
            }
            currentActiveCountry = null;
            hubsGroupLayer.clearLayers();
        });
    </script>
</body>
    </html>
