<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Age 3 - Core Strategy Engine</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #050b14; }
        #map { width: 100%; height: 100vh; }
        
        /* Tactical Game Cartography Typography - Fixed Permanently */
        .ground-label {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            color: rgba(230, 235, 240, 0.75) !important; /* Muted Bone-White for high immersion */
            font-family: 'Segoe UI', Arial, sans-serif;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 4px; /* Game-style letter spacing */
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.9);
            text-align: center;
            pointer-events: none;
            white-space: nowrap;
        }

        /* Tooltip Arrow Reset */
        .leaflet-tooltip-top:before, .leaflet-tooltip-bottom:before, 
        .leaflet-tooltip-left:before, .leaflet-tooltip-right:before {
            display: none !important;
        }
        
        /* Muted Tactical Gold for Cities and Capitals */
        .city-text {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            color: rgba(240, 190, 100, 0.85); 
            font-family: 'Segoe UI', sans-serif;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.9);
            white-space: nowrap;
            pointer-events: none;
        }

        /* HUD Control Panel */
        .hud-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(5, 11, 20, 0.9);
            border: 1px solid #3a4d5c;
            color: #8fa0af;
            padding: 12px;
            border-radius: 4px;
            font-family: sans-serif;
            font-size: 11px;
            z-index: 1000;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>

    <div id="map"></div>
    <div class="hud-panel">
        <b style="color:#fff;">MODERN AGE III ENGINE</b><br>
        • Locked Zoom: Level 3 - 5<br>
        • Cartography: 100% English Muted 2D<br>
        • Database: Consolidated Global Vector Boundary
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // ১. কোর ইঞ্জিন চালুকরণ এবং জুম লেভেল ৩ থেকে ৫-এ কঠোরভাবে লক
        const map = L.map('map', {
            center: [25.0, 40.0],
            zoom: 4,
            minZoom: 3,
            maxZoom: 5,
            zoomControl: true
        });

        // ২. প্রিমিয়াম স্যাটেলাইট ইমেজ লেয়ার
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Esri, Maxar'
        }).addTo(map);

        // ৩. গ্লোবাল হাই-রেজোলিউশন ভেক্টর সীমানা ও ২D টেক্সট একীকরণ
        fetch('https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson')
            .then(res => res.json())
            .then(geoData => {
                L.geoJSON(geoData, {
                    style: function () {
                        return {
                            color: "rgba(130, 150, 170, 0.35)", // মিলিটারি ব্লু-গ্রে থিন বর্ডার লাইন
                            weight: 1.0,
                            fillColor: "transparent",
                            fillOpacity: 0
                        };
                    },
                    onEachFeature: function (feature, layer) {
                        if (feature.properties && feature.properties.ADMIN) {
                            let countryName = feature.properties.ADMIN.toUpperCase();
                            
                            // ফিলিস্তিন রাষ্ট্রকে কোডের মেইন আর্কিটেকচারে লক করা হলো
                            if (countryName === "ISRAEL") {
                                countryName = "PALESTINE";
                            }

                            // দেশ অনুযায়ী স্কেলড ফন্ট সাইজ নির্ধারণ
                            let fontSize = "10px";
                            if (countryName === "RUSSIA" || countryName === "CHINA" || countryName === "UNITED STATES OF AMERICA" || countryName === "CANADA" || countryName === "BRAZIL" || countryName === "AUSTRALIA") {
                                fontSize = "15px";
                            } else if (countryName === "INDIA" || countryName === "SAUDI ARABIA" || countryName === "EGYPT" || countryName === "ALGERIA" || countryName === "ARGENTINA") {
                                fontSize = "12px";
                            }

                            let center = layer.getBounds().getCenter();

                            // একই লেভেলে সরাসরি ভূমির ওপর খোদাই করা ২D নাম রেন্ডার
                            layer.bindTooltip(`<span style="font-size: ${fontSize};">${countryName}</span>`, {
                                permanent: true,
                                direction: 'center',
                                className: 'ground-label',
                                interactive: false
                            });
                        }
                    }
                }).addTo(map);
            }).catch(err => console.log("Engine Load Error: ", err));

        // ৪. স্ট্র্যাটেজিক দেশের রাজধানী এবং শহরের ডাটাবেজ (১০০% ইংরেজি)
        const tacticalDatabase = [
            { name: "JERUSALEM (CAPITAL)", lat: 31.7683, lng: 35.2137, type: "capital" },
            { name: "GAZA", lat: 31.5016, lng: 34.4668, type: "city" },
            { name: "DHAKA (CAPITAL)", lat: 23.8103, lng: 90.4125, type: "capital" },
            { name: "NEW DELHI (CAPITAL)", lat: 28.6139, lng: 77.2090, type: "capital" },
            { name: "BEIJING (CAPITAL)", lat: 39.9042, lng: 116.4074, type: "capital" },
            { name: "RIYADH (CAPITAL)", lat: 24.7136, lng: 46.6753, type: "capital" },
            { name: "CAIRO (CAPITAL)", lat: 30.0444, lng: 31.2357, type: "capital" },
            { name: "MOSCOW (CAPITAL)", lat: 55.7558, lng: 37.6173, type: "capital" },
            { name: "WASHINGTON D.C. (CAPITAL)", lat: 38.9072, lng: -77.0369, type: "capital" }
        ];

        // ৫. প্রফেশনাল ট্যাকটিক্যাল সিম্বল রেন্ডারিং
        tacticalDatabase.forEach(item => {
            let dotColor = (item.type === "capital") ? "#ff4444" : "#00ffcc";
            let dotRadius = (item.type === "capital") ? 4 : 3;

            // নিখুঁত ডট নোড
            L.circleMarker([item.lat, item.lng], {
                radius: dotRadius,
                color: 'rgba(255,255,255,0.7)',
                weight: 1,
                fillColor: dotColor,
                fillOpacity: 1
            }).addTo(map);

            // ডটের পাশে সরাসরি ২D টেক্সট
            L.marker([item.lat, item.lng], {
                icon: L.divIcon({
                    className: 'city-text',
                    html: item.name,
                    iconSize: [160, 20],
                    iconAnchor: [-10, 6]
                }),
                interactive: false
            }).addTo(map);
        });
    </script>
</body>
    </html>
