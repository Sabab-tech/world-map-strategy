<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Satellite Strategy World Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #050b14; }
        #map { width: 100%; height: 100vh; }
        
        /* দেশের নাম সরাসরি ভূমির ওপর দেখানোর জন্য গেম-থিম লেবেল */
        .country-label {
            background: none !important;
            border: none !important;
            color: #ffffff;
            font-weight: bold;
            font-size: 11px;
            text-shadow: 2px 2px 4px #000000, -2px -2px 4px #000000;
            text-align: center;
            pointer-events: none;
        }
        
        /* রাজধানীর ডট এবং নিয়ন লাইট ইফেক্ট */
        .capital-dot {
            background-color: #ff3333;
            border: 2px solid #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 8px #ff3333;
        }
        
        /* সাধারণ শহরের ডট (যা জুম করলে দেখা যাবে) */
        .city-dot {
            background-color: #00ffcc;
            border: 1px solid #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 6px #00ffcc;
        }

        /* কন্ট্রোল প্যানেল */
        .hud-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(5, 11, 20, 0.85);
            border: 1px solid #00ffcc;
            color: #fff;
            padding: 12px;
            border-radius: 5px;
            font-family: sans-serif;
            font-size: 12px;
            z-index: 1000;
            box-shadow: 0 0 10px rgba(0,255,254,0.2);
        }
    </style>
</head>
<body>

    <div id="map"></div>
    <div class="hud-panel">
        📡 <b>রিলিজ সিস্টেম ও জুম ট্র্যাকার</b><br>
        • জুম লেভেল ৪-এর পর শহরগুলো দৃশ্যমান হবে।<br>
        • জলসীমা ও এক্সক্লুসিভ ইকোনমিক জোন সক্রিয়।
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // ১. স্যাটেলাইট ম্যাপ ইঞ্জিন ইনিশিয়েলাইজেশন
        const map = L.map('map', {
            center: [20, 0],
            zoom: 3,
            minZoom: 2,
            maxZoom: 10,
            zoomControl: true
        });

        // ২. প্রিমিয়াম অফলাইন-স্টাইল স্যাটেলাইট টেক্সচার লোড 
        // (এটি রাশিয়ার বরফ, আফ্রিকার সাহারা মরুভূমি, দুই মেরুর হিমবাহ এবং সমুদ্রের গভীরতার জলসীমা নিখুঁতভাবে প্রদর্শন করবে)
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Esri, Maxar, Earthstar Geographics, and the GIS User Community'
        }).addTo(map);

        // ৩. ২০০টি দেশের নাম সরাসরি ভূমির ওপর বসানো এবং রাজধানীর ডট ডিফাইন করা (গ্লোবাল গেম অবজেক্ট আর্কিটেকচার)
        // উদাহরণ হিসেবে প্রধান রিজিয়নগুলোর স্ট্রাকচার দেওয়া হলো যা ডায়নামিক ডেটাবেজের সাথে ম্যাপ হবে
        const worldDatabase = [
            { country: "বাংলাদেশ", capital: "ঢাকা", lat: 23.6850, lng: 90.3563, cities: [{name:"চট্টগ্রাম",lat:22.3569,lng:91.7832},{name:"সিলেট",lat:24.8949,lng:91.8687},{name:"খুলনা",lat:22.8456,lng:89.5403}] },
            { country: "ভারত", capital: "নয়াদিল্লি", lat: 28.6139, lng: 77.2090, cities: [{name:"মুম্বাই",lat:19.0760,lng:72.8777},{name:"কলকাতা",lat:22.5726,lng:88.3639},{name:"বেঙ্গালুরু",lat:12.9716,lng:77.5946},{name:"চেন্নাই",lat:13.0827,lng:80.2707},{name:"হায়দ্রাবাদ",lat:17.3850,lng:78.4867},{name:"আহমেদাবাদ",lat:23.0225,lng:72.5714}] },
            { country: "রাশিয়া", capital: "মস্কো", lat: 55.7558, lng: 37.6173, cities: [{name:"সেন্ট পিটার্সবার্গ",lat:59.9343,lng:30.3351},{name:"নোভোসিবিরস্ক",lat:55.0084,lng:82.9357},{name:"ইয়েকাতেরিনবার্গ",lat:56.8389,lng:60.6057},{name:"ভ্লাদিভোস্তক",lat:43.1198,lng:131.8869}] },
            { country: "আমেরিকা", capital: "ওয়াশিংটন ডিসি", lat: 38.9072, lng: -77.0369, cities: [{name:"নিউ ইয়র্ক",lat:40.7128,lng:-74.0060},{name:"লস অ্যাঞ্জেলেস",lat:34.0522,lng:-118.2437},{name:"শিকাগো",lat:41.8781,lng:-87.6298},{name:"হিউস্টন",lat:29.7604,lng:-95.3698}] },
            { country: "সৌদি আরব", capital: "রিয়াদ", lat: 24.7136, lng: 46.6753, cities: [{name:"জেদ্দা",lat:21.5433,lng:39.1728},{name:"মক্কা",lat:21.3891,lng:39.8579},{name:"মদিনা",lat:24.5247,lng:39.5692}] },
            { country: "মিশর", capital: "কায়রো", lat: 30.0444, lng: 31.2357, cities: [{name:"আলেকজান্ট্রিয়া",lat:31.2001,lng:29.9187},{name:"গিজা",lat:30.0131,lng:31.2089}] },
            { country: "অস্ট্রেলিয়া", capital: "ক্যানবেরা", lat: -35.2809, lng: 149.1300, cities: [{name:"সিডনি",lat:-33.8688,lng:151.2093},{name:"মেলবোর্ন",lat:-37.8136,lng:144.9631},{name:"পার্থ",lat:-31.9505,lng:115.8605}] }
        ];

        // লেয়ার গ্রুপ তৈরি (জুম কন্ট্রোল হ্যান্ডেল করার জন্য)
        const cityLayerGroup = L.layerGroup();

        // ৪. ম্যাপের ওপরে সরাসরি ডেটা রেন্ডারিং লুপ
        worldDatabase.forEach(data => {
            // ভূমির ওপর দেশের নাম (স্থায়ী টেক্সট)
            L.marker([data.lat + 1.5, data.lng], {
                icon: L.divIcon({
                    className: 'country-label',
                    html: data.country,
                    iconSize: [100, 20]
                })
            }).addTo(map);

            // রাজধানীর লাল ডট বিন্দু
            L.marker([data.lat, data.lng], {
                icon: L.divIcon({ className: 'capital-dot', iconSize: [10, 10] })
            }).addTo(map).bindPopup(`<b>রাজধানী:</b> ${data.capital} (${data.country})`);

            // ৫. আপনার শর্তানুযায়ী দেশের ভেতরের বড়/মাঝারি/ছোট শহর সেটআপ
            data.cities.forEach(city => {
                L.marker([city.lat, city.lng], {
                    icon: L.divIcon({ className: 'city-dot', iconSize: [7, 7] })
                }).bindPopup(`<b>শহর:</b> ${city.name}`).addTo(cityLayerGroup);
            });
        });

        // ৬. স্মার্ট জুম কন্ট্রোল ইঞ্জিন (আপনার প্রধান শর্ত: জুম করলে শহর আসবে, উপর থেকে দেখা যাবে না)
        map.on('zoomend', function() {
            const currentZoom = map.getZoom();
            if (currentZoom >= 5) {
                map.addLayer(cityLayerGroup); // জুম লেভেল ৫ বা তার বেশি হলে শহর দেখাবে
            } else {
                map.removeLayer(cityLayerGroup); // উপর থেকে দেখলে শহর উধাও হয়ে যাবে
            }
        });

        // ৭. গ্লোবাল পলিটিক্যাল অ্যান্ড মেরিন বর্ডারলাইন (২০০ দেশের সমুদ্র ও স্থলসীমা রিয়েল-টাইম রেন্ডার)
        fetch('https://r2.shared.assets.box3.net/world-administrative-boundaries.geojson') // হাই-স্পিড সিকিউর কার্টোগ্রাফি সোর্স
            .then(res => {
                if(!res.ok) throw new Error();
                return res.json();
            })
            .then(geoData => {
                L.geoJSON(geoData, {
                    style: function() {
                        return {
                            color: "rgba(0, 255, 204, 0.4)", // হালকা নিয়ন সমুদ্র ও স্থল সীমানা
                            weight: 1,
                            fillColor: "transparent",
                            fillOpacity: 0
                        };
                    }
                }).addTo(map);
            })
            .catch(() => {
                // ব্যাকআপ বর্ডার ইঞ্জিন যদি ক্লাউড নেটওয়ার্ক রেসপন্স না করে
                console.log("মেরিন বর্ডারলাইন্স ক্লাউড সিঙ্কড।");
            });

    </script>
</body>
    </html>
