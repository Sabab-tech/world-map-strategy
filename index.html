<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Modern Age 3 - Interactive Map</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/openlayers/8.2.0/dist/ol.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/openlayers/8.2.0/ol.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html, #map { width: 100%; height: 100%; overflow: hidden; background-color: #0b1521; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        const vectorSource = new ol.source.Vector({
            url: 'https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson',
            format: new ol.format.GeoJSON()
        });

        // সিলেকশন স্টাইল (ক্লিক করলে যা হবে)
        const selectStyle = new ol.style.Style({
            fill: new ol.style.Fill({ color: 'rgba(255, 255, 255, 0.3)' }),
            stroke: new ol.style.Stroke({ color: '#ffffff', width: 3 })
        });

        const map = new ol.Map({
            target: 'map',
            layers: [
                new ol.layer.Tile({ source: new ol.source.XYZ({ url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}' }) }),
                new ol.layer.Vector({
                    source: vectorSource,
                    style: new ol.style.Style({
                        stroke: new ol.style.Stroke({ color: 'rgba(255, 255, 255, 0.3)', width: 1.2 })
                    })
                })
            ],
            view: new ol.View({ center: ol.proj.fromLonLat([25.0, 42.0]), zoom: 3.8, minZoom: 3.8, maxZoom: 8.5 })
        });

        // ক্লিক লিসেনার
        const select = new ol.interaction.Select({
            style: selectStyle
        });
        map.addInteraction(select);

        // ক্লিক করলে কনসোলে নাম দেখাবে (আপনি চাইলে এখানে দেশের তথ্য বা অন্য কিছু দেখানোর সিস্টেম করতে পারেন)
        select.on('select', function(e) {
            if (e.selected.length > 0) {
                const feature = e.selected[0];
                console.log("Selected Country: " + (feature.get('ADMIN') || feature.get('name')));
            }
        });
    </script>
</body>
</html>
