<!DOCTYPE html>
<html>
<head>
    <title>Advanced World Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; background: #000; }
        /* বর্ডার লকিং এবং পারফরম্যান্স অপ্টিমাইজেশন */
        .leaflet-tile-pane { z-index: 2; }
        .leaflet-overlay-pane { z-index: 3; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map', { 
            zoomControl: false,
            minZoom: 2,  
            maxZoom: 10,
            zoomAnimation: false, 
            fadeAnimation: false 
        }).setView([20, 0], 2);

        // স্যাটেলাইট বেস লেয়ার (ESRI)
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Satellite Map'
        }).addTo(map);

        // ডিটেইলড GeoJSON ফাইল (বাহারাইন, পানামা, মালদ্বীপ সহ)
        fetch('https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson')
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, {
                    style: {
                        color: "#ffffff",
                        weight: 1.2,
                        opacity: 0.7,
                        fillOpacity: 0
                    },
                    pane: 'overlayPane'
                }).addTo(map);
            });
    </script>
</body>
</html>
